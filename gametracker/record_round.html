<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="images/icon.png">
  <link rel="icon" type="image/png" sizes="180x180" href="images/icon.png">
  <link rel="shortcut icon" href="images/icon.png">
  <link rel="icon" type="image/png" href="images/icon.png">
  
  <title>Record Round</title>
  <link rel="stylesheet" href="styles.css">
  <script src="utils.js"></script>
  <script src="auth.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
</head>
<body>
<div id="loadingOverlay" class="loading-overlay"><div class="loading-box"><div class="spinner"></div><p>Loading...</p></div></div>
<div class="container" id="mainApp" style="display:none">
  <div class="header"><button class="back-btn" onclick="history.back()">←</button><h1>📝 Record Round</h1></div>
  <div class="card" id="sessionInfo"></div>
  <div class="card">
    <div class="card-title">New Round</div>
    <div id="roundForm"></div>
    <button class="submit-btn" id="saveRoundBtn">Save Round</button>
  </div>
  <div class="card">
    <div class="card-title">Previous Rounds</div>
    <div id="roundsList"></div>
  </div>
</div>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const sessionId = urlParams.get('session');
  let session = null;
  let participants = [];
  let games = [];
  let allPlayers = [];
  let allTeams = [];
  let rounds = [];

  async function loadSession() {
    if (!sessionId) { alert('No session specified'); return; }
    const sessions = await loadSessions();
    session = sessions.find(s => s.SessionID === sessionId);
    if (!session) { alert('Session not found'); return; }
    games = await loadGames();
    allPlayers = await loadPlayers();
    allTeams = await loadTeams();
    const participantsRaw = await loadSessionParticipants();
    participants = participantsRaw.filter(p => p.SessionID === sessionId);
    if (session.Type === 'Individual') {
      await loadRoundsIndividual();
      renderIndividualForm();
    } else {
      await loadRoundsTeam();
      renderTeamForm();
    }
    const game = games.find(g => g.GameID === session.GameID);
    document.getElementById('sessionInfo').innerHTML = `<div><strong>${game.GameName}</strong> (${session.Type}) - Session ${sessionId}<br>Date: ${session.Date}</div>`;
  }

  async function loadRoundsIndividual() {
    const allRounds = await loadRoundsIndividual();
    rounds = allRounds.filter(r => r.SessionID === sessionId);
    renderRoundsList();
  }

  async function loadRoundsTeam() {
    const allRounds = await loadRoundsTeam();
    rounds = allRounds.filter(r => r.SessionID === sessionId);
    renderRoundsList();
  }

  function renderIndividualForm() {
    const playerIds = participants.map(p => p.ParticipantID);
    let html = `<div class="form-group"><label>Round Number</label><input type="number" id="roundNumber" value="${rounds.length+1}" readonly></div>`;
    for (let i=0; i<playerIds.length; i++) {
      const player = allPlayers.find(p => p.PlayerID === playerIds[i]);
      const name = player ? player.PlayerName : playerIds[i];
      html += `<div class="form-group"><label>${escapeHtml(name)} Points</label><input type="number" id="points_${playerIds[i]}" step="0.5" value="0"></div>`;
    }
    document.getElementById('roundForm').innerHTML = html;
  }

  function renderTeamForm() {
    const teamIds = participants.map(p => p.ParticipantID);
    const teamA = allTeams.find(t => t.TeamID === teamIds[0]);
    const teamB = allTeams.find(t => t.TeamID === teamIds[1]);
    const html = `<div class="form-group"><label>Round Number</label><input type="number" id="roundNumber" value="${rounds.length+1}" readonly></div>
      <div class="form-group"><label>${escapeHtml(teamA?.TeamName || teamIds[0])} Points</label><input type="number" id="pointsA" step="0.5" value="0"></div>
      <div class="form-group"><label>${escapeHtml(teamB?.TeamName || teamIds[1])} Points</label><input type="number" id="pointsB" step="0.5" value="0"></div>`;
    document.getElementById('roundForm').innerHTML = html;
  }

  function renderRoundsList() {
    if (session?.Type === 'Individual') {
      let html = '';
      for (let r of rounds) {
        let line = `Round ${r.RoundNumber}: `;
        for (let i=1; i<=4; i++) {
          let pid = r[`Player${i}_ID`];
          if (pid) {
            let name = allPlayers.find(p => p.PlayerID === pid)?.PlayerName || pid;
            line += `${name} ${r[`Points${i}`]} `;
          }
        }
        html += `<div class="expense-item"><div>${line}</div></div>`;
      }
      document.getElementById('roundsList').innerHTML = html || '<div class="empty-state">No rounds yet</div>';
    } else {
      let html = '';
      for (let r of rounds) {
        const teamA = allTeams.find(t => t.TeamID === r.TeamA_ID);
        const teamB = allTeams.find(t => t.TeamID === r.TeamB_ID);
        html += `<div class="expense-item"><div>Round ${r.RoundNumber}: ${teamA?.TeamName || r.TeamA_ID} ${r.PointsA} - ${teamB?.TeamName || r.TeamB_ID} ${r.PointsB}</div></div>`;
      }
      document.getElementById('roundsList').innerHTML = html || '<div class="empty-state">No rounds yet</div>';
    }
  }

  window.onload = async () => {
    await initPageAuth({
      onNeedLogin: () => { window.location.href = 'index.html'; },
      onReady: async () => {
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        await loadSession();
      }
    });
    document.getElementById('saveRoundBtn').onclick = async () => {
      const roundNumber = parseInt(document.getElementById('roundNumber').value);
      if (session.Type === 'Individual') {
        const playerIds = participants.map(p => p.ParticipantID);
        const points = [];
        for (let pid of playerIds) {
          points.push(parseFloat(document.getElementById(`points_${pid}`).value) || 0);
        }
        const players4 = [...playerIds, null, null, null].slice(0,4);
        const points4 = [...points, 0, 0, 0].slice(0,4);
        await addRoundIndividual(sessionId, roundNumber, players4, points4);
      } else {
        const teamA = participants[0].ParticipantID;
        const teamB = participants[1].ParticipantID;
        const pointsA = parseFloat(document.getElementById('pointsA').value) || 0;
        const pointsB = parseFloat(document.getElementById('pointsB').value) || 0;
        await addRoundTeam(sessionId, roundNumber, teamA, teamB, pointsA, pointsB);
      }
      await loadSession();
    };
  };
</script>
</body>
</html>
