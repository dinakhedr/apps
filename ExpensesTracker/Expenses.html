<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>📋 All Expenses</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 0;
            padding-top: 60px;
            padding-bottom: 40px;
        }

        @supports (padding-top: env(safe-area-inset-top)) {
            body {
                padding-top: calc(60px + env(safe-area-inset-top));
            }
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 16px;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }

        .back-btn:active {
            background: rgba(255,255,255,0.3);
            transform: scale(0.97);
        }

        /* Filter Card */
        .filter-card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .filter-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-row {
            display: flex;
            gap: 12px;
        }

        .filter-group {
            flex: 1;
        }

        .filter-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #666;
            margin-bottom: 6px;
        }

        .filter-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e8e8ed;
            border-radius: 14px;
            font-size: 16px;
            font-family: inherit;
            background: #fafafc;
            cursor: pointer;
        }

        .filter-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        /* Stats Card */
        .stats-card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }

        .stats-label {
            font-size: 14px;
            font-weight: 500;
            color: #666;
        }

        .stats-total {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .expense-count {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
        }

        /* Expenses Card */
        .expenses-card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .expenses-header {
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }

        .expenses-header h3 {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
        }

        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .expense-item:last-child {
            border-bottom: none;
        }

        .expense-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .category-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .expense-details {
            flex: 1;
        }

        .expense-category {
            font-weight: 600;
            font-size: 15px;
            color: #1a1a2e;
        }

        .expense-date {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }

        .expense-note {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
        }

        .expense-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .expense-amount {
            font-weight: 700;
            font-size: 16px;
            color: #1a1a2e;
        }

        .action-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .edit-btn:active {
            background: #e8e8ed;
        }

        .delete-btn:active {
            background: #ffe5e5;
            color: #ff4757;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state span {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* Status Message */
        .status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 30px;
            font-size: 14px;
            transform: translateY(100px);
            transition: transform 0.3s;
            z-index: 1000;
        }

        .status.show {
            transform: translateY(0);
        }

        .status.success {
            background: #10b981;
        }

        .status.error {
            background: #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 All Expenses</h1>
            <button class="back-btn" onclick="goBack()">← Back</button>
        </div>

        <!-- Filter Card -->
        <div class="filter-card">
            <div class="filter-title">
                <span>📅</span>
                Select Month
            </div>
            <div class="filter-row">
                <div class="filter-group">
                    <label>Month</label>
                    <select id="monthSelect">
                        <option value="0">January</option>
                        <option value="1">February</option>
                        <option value="2">March</option>
                        <option value="3">April</option>
                        <option value="4">May</option>
                        <option value="5">June</option>
                        <option value="6">July</option>
                        <option value="7">August</option>
                        <option value="8">September</option>
                        <option value="9">October</option>
                        <option value="10">November</option>
                        <option value="11">December</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Year</label>
                    <select id="yearSelect"></select>
                </div>
            </div>
        </div>

        <!-- Stats Card -->
        <div class="stats-card" id="statsCard" style="display: none;">
            <div class="stats-row">
                <span class="stats-label">Total Spent</span>
                <span class="stats-total" id="totalAmount">EGP 0</span>
            </div>
            <div class="expense-count" id="expenseCount">0 expenses</div>
        </div>

        <!-- Expenses Card -->
        <div class="expenses-card">
            <div class="expenses-header">
                <h3>📋 Expenses by Day</h3>
            </div>
            <div id="expensesList">
                <div class="empty-state">
                    <span>📭</span>
                    <p>No expenses for this month</p>
                    <p style="font-size: 12px; margin-top: 8px;">Add expenses from the main page</p>
                </div>
            </div>
        </div>
    </div>

    <div class="status" id="statusMsg"></div>

    <script>
        // Load expenses from localStorage
        let expenses = [];
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();

        // Get icon for category
        function getCategoryIcon(category) {
            const icons = {
                'Car Repairs': '🚗',
                'Cafe': '☕',
                'Clothes': '👕',
                'Entertainment': '🎬',
                'Electronics': '📱',
                'Games': '🎮',
                'Gym': '🏋️',
                'Health': '💊',
                'Home Repairs': '🛠️',
                'Internet': '📶',
                'Personal Care': '🧴',
                'Pets': '🐾',
                'Petrol': '⛽',
                'Ride Hailing': '🚕',
                'Smoking': '🚬',
                'Subscriptions': '💻',
                'Supermarket': '🛒',
                'Travel': '✈️',
                'Utilities': '⚡'
            };
            return icons[category] || '💰';
        }

        // Get background color for category icon
        function getCategoryColor(category) {
            const colors = {
                'Car Repairs': '#ffd1d1',
                'Cafe': '#d4e8d4',
                'Clothes': '#e8d5b7',
                'Entertainment': '#d4b8ff',
                'Electronics': '#d4e8ff',
                'Games': '#d4b8ff',
                'Gym': '#ffe5b4',
                'Health': '#ffccd9',
                'Home Repairs': '#ffd1d1',
                'Internet': '#cce0ff',
                'Personal Care': '#ffccd9',
                'Pets': '#e8d5b7',
                'Petrol': '#ffd1d1',
                'Ride Hailing': '#ffe5b4',
                'Smoking': '#e0e0e0',
                'Subscriptions': '#cce7ff',
                'Supermarket': '#ffe0b5',
                'Travel': '#d4e8ff',
                'Utilities': '#ffe5b4'
            };
            return colors[category] || '#f0f0f0';
        }

        // Load expenses from localStorage
        function loadExpenses() {
            const saved = localStorage.getItem('private_expenses');
            if (saved) {
                expenses = JSON.parse(saved);
            }
            renderExpenses();
        }

        // Save expenses to localStorage
        function saveExpenses() {
            localStorage.setItem('private_expenses', JSON.stringify(expenses));
            renderExpenses();
        }

        // Format date for display
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        // Get day number from date
        function getDayNumber(dateString) {
            return new Date(dateString).getDate();
        }

        // Filter expenses by selected month and year
        function getFilteredExpenses() {
            const year = parseInt(document.getElementById('yearSelect').value);
            const month = parseInt(document.getElementById('monthSelect').value);
            
            return expenses.filter(exp => {
                const expDate = new Date(exp.date);
                return expDate.getFullYear() === year && expDate.getMonth() === month;
            });
        }

        // Sort expenses by day (ascending)
        function sortExpensesByDay(expensesList) {
            return [...expensesList].sort((a, b) => {
                const dayA = getDayNumber(a.date);
                const dayB = getDayNumber(b.date);
                return dayA - dayB;
            });
        }

        // Group expenses by day
        function groupExpensesByDay(expensesList) {
            const grouped = {};
            expensesList.forEach(exp => {
                const day = getDayNumber(exp.date);
                if (!grouped[day]) {
                    grouped[day] = [];
                }
                grouped[day].push(exp);
            });
            return grouped;
        }

        // Calculate total for filtered expenses
        function calculateTotal(expensesList) {
            return expensesList.reduce((sum, exp) => sum + exp.amount, 0);
        }

        // Update stats
        function updateStats() {
            const filtered = getFilteredExpenses();
            const total = calculateTotal(filtered);
            const statsCard = document.getElementById('statsCard');
            
            if (filtered.length === 0) {
                statsCard.style.display = 'none';
            } else {
                statsCard.style.display = 'block';
                document.getElementById('totalAmount').textContent = `EGP ${total.toFixed(2)}`;
                document.getElementById('expenseCount').textContent = `${filtered.length} ${filtered.length === 1 ? 'expense' : 'expenses'}`;
            }
        }

        // Show status message
        function showStatus(message, isError = false) {
            const statusDiv = document.getElementById('statusMsg');
            statusDiv.textContent = message;
            statusDiv.className = `status show ${isError ? 'error' : 'success'}`;
            setTimeout(() => {
                statusDiv.classList.remove('show');
            }, 2000);
        }

        // Delete expense
        function deleteExpense(id) {
            if (confirm('Delete this expense?')) {
                expenses = expenses.filter(exp => exp.id !== id);
                saveExpenses();
                showStatus('🗑️ Expense deleted');
            }
        }

        // Edit expense
        function editExpense(id) {
            const expense = expenses.find(exp => exp.id === id);
            if (expense) {
                const newAmount = prompt('Edit amount (EGP):', expense.amount);
                if (newAmount !== null && !isNaN(newAmount) && parseFloat(newAmount) > 0) {
                    expense.amount = parseFloat(newAmount);
                    const newNotes = prompt('Edit notes:', expense.notes);
                    if (newNotes !== null) {
                        expense.notes = newNotes;
                    }
                    saveExpenses();
                    showStatus('✏️ Expense updated');
                }
            }
        }

        // Render expenses list grouped by day
        function renderExpenses() {
            const expensesDiv = document.getElementById('expensesList');
            const filtered = getFilteredExpenses();
            const sorted = sortExpensesByDay(filtered);
            const grouped = groupExpensesByDay(sorted);
            const days = Object.keys(grouped).sort((a, b) => parseInt(a) - parseInt(b));
            
            updateStats();
            
            if (days.length === 0) {
                expensesDiv.innerHTML = `
                    <div class="empty-state">
                        <span>📭</span>
                        <p>No expenses for this month</p>
                        <p style="font-size: 12px; margin-top: 8px;">Add expenses from the main page</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            
            days.forEach(day => {
                const dayExpenses = grouped[day];
                const dayTotal = calculateTotal(dayExpenses);
                
                html += `
                    <div style="margin-bottom: 20px;">
                        <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #e8e8ed;">
                            <span style="font-weight: 600; font-size: 16px; color: #667eea;">📅 Day ${day}</span>
                            <span style="font-size: 13px; font-weight: 500; color: #666;">Total: EGP ${dayTotal.toFixed(2)}</span>
                        </div>
                `;
                
                dayExpenses.forEach(exp => {
                    html += `
                        <div class="expense-item">
                            <div class="expense-left">
                                <div class="category-icon" style="background: ${getCategoryColor(exp.category)};">
                                    ${getCategoryIcon(exp.category)}
                                </div>
                                <div class="expense-details">
                                    <div class="expense-category">${exp.category}</div>
                                    ${exp.notes ? `<div class="expense-note">📝 ${exp.notes.substring(0, 30)}${exp.notes.length > 30 ? '...' : ''}</div>` : ''}
                                </div>
                            </div>
                            <div class="expense-right">
                                <div class="expense-amount">EGP ${exp.amount.toFixed(2)}</div>
                                <button class="action-btn edit-btn" onclick="editExpense(${exp.id})">✏️</button>
                                <button class="action-btn delete-btn" onclick="deleteExpense(${exp.id})">🗑️</button>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>`;
            });
            
            expensesDiv.innerHTML = html;
        }

        // Populate year dropdown (current year - 5 to current year + 1)
        function populateYears() {
            const yearSelect = document.getElementById('yearSelect');
            const currentYear = new Date().getFullYear();
            
            for (let year = currentYear - 5; year <= currentYear + 1; year++) {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                if (year === currentYear) {
                    option.selected = true;
                }
                yearSelect.appendChild(option);
            }
        }

        // Set current month in dropdown
        function setCurrentMonth() {
            const currentMonth = new Date().getMonth();
            document.getElementById('monthSelect').value = currentMonth;
        }

        // Go back to main page
        function goBack() {
            window.location.href = 'index.html';
        }

        // Event listeners
        document.getElementById('monthSelect').addEventListener('change', renderExpenses);
        document.getElementById('yearSelect').addEventListener('change', renderExpenses);
        
        // Initialize
        populateYears();
        setCurrentMonth();
        loadExpenses();
    </script>
</body>
</html>
