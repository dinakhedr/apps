<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Daily Expenses</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <link rel="icon" type="image/png" sizes="180x180" href="icon.png">
  <link rel="shortcut icon" href="icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="utils.js"></script>
  <script src="auth.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    /* ── Header ── */
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header h1 { font-family: 'Sora', sans-serif; font-size: 24px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }

    /* ── Filter bar (month/year only) ── */
    .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    
    /* ── Stats band ── */
    .stats-band {
      background: var(--brand-grad); border-radius: var(--radius-lg);
      padding: 20px 22px; margin-bottom: 18px;
      box-shadow: 0 8px 32px rgba(91,94,244,0.22);
      display: flex; justify-content: space-between; align-items: center;
    }
    .stats-band-left .lbl { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.65); text-transform: uppercase; letter-spacing: 0.06em; }
    .stats-band-left .val { font-family: 'Sora', sans-serif; font-size: 32px; font-weight: 800; color: #fff; line-height: 1.1; margin-top: 4px; }
    .stats-band-right { text-align: right; }
    .stats-band-right .cnt { font-size: 13px; color: rgba(255,255,255,0.75); font-weight: 600; }
    .stats-band-right .avg { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 3px; }
    .stats-comparison { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 6px; font-weight: 500; }
    .stats-comparison.positive { color: #c8e6c9; }
    .stats-comparison.negative { color: #ffcdd2; }

    /* ── Pill-style tabs ── */
    .tabs { display: flex; gap: 6px; margin-bottom: 18px; }
    .tabs .tab-btn {
      flex: 1; padding: 11px 6px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.25) !important;
      border-radius: 30px; font-size: 13px; font-weight: 700;
      color: rgba(255,255,255,0.85); cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: all 0.2s;
    }
    .tabs .tab-btn.active { background: #fff; color: var(--brand); border-color: transparent !important; box-shadow: 0 4px 14px rgba(0,0,0,0.10); }

    /* ── Category summary rows (replaces chart) ── */
    .category-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 0; border-bottom: 1px solid var(--border);
      cursor: pointer; border-radius: 8px; transition: background 0.12s;
    }
    .category-row:hover { background: var(--surface-2); padding-left: 6px; padding-right: 6px; }
    .category-row:active { background: #ededff; }
    .cat-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .cat-icon-sm { width: 36px; height: 36px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .cat-name { font-weight: 600; font-size: 14px; color: var(--text); }
    .cat-count { font-size: 11px; color: var(--text-3); }
    .cat-amt { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 15px; color: var(--brand); flex-shrink: 0; }
    .cat-bar-wrap { height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 4px; width: 90px; }
    .cat-bar { height: 100%; border-radius: 3px; }

    /* ── Daily Expenses Summary Section (inspired by Installment Summary) ── */
    .summary-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      margin-top: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .summary-header {
      background: var(--brand-grad);
      color: #fff;
      padding: 16px 20px;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .summary-header h3 {
      font-family: 'Sora', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin: 0;
    }
    .summary-year-header {
      background: linear-gradient(135deg, #f5f5fa 0%, #ffffff 100%);
      color: var(--text);
      padding: 14px 20px;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 15px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .summary-year-total {
      font-size: 13px;
      font-weight: 600;
      background: var(--brand-grad);
      color: #fff;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .summary-month-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
    }
    .summary-month-row:hover { background: var(--surface-2); }
    .summary-month-row:active { background: #ededff; }
    .summary-month-left {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }
    .summary-month-name {
      font-weight: 600;
      font-size: 15px;
      color: var(--text);
    }
    .summary-month-count {
      font-size: 11px;
      color: var(--text-3);
    }
    .summary-month-amount {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: var(--brand);
    }
    .year-dropdown {
      position: relative;
      margin: 16px 20px 20px 20px;
    }
    .year-dropdown-btn {
      background: var(--surface-2);
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
    }
    .year-dropdown-btn:hover { border-color: var(--brand); background: #fff; }
    .year-dropdown-arrow { font-size: 12px; color: var(--text-2); transition: transform 0.2s; }
    .year-dropdown.open .year-dropdown-arrow { transform: rotate(180deg); }
    .year-dropdown-menu {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #fff;
      border-radius: var(--radius-md);
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      z-index: 100;
      display: none;
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid var(--border);
    }
    .year-dropdown.open .year-dropdown-menu { display: block; }
    .year-dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .year-dropdown-item.selected { background: #e8f5e9; }
    .year-dropdown-item:hover { background: var(--surface-2); }
    .year-dropdown-item input {
      width: 18px;
      height: 18px;
      margin: 0;
      cursor: pointer;
      accent-color: var(--brand);
    }
    .year-dropdown-item label {
      flex: 1;
      cursor: pointer;
      margin: 0;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }
    .year-dropdown-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      background: #fff;
      position: sticky;
      bottom: 0;
    }
    .year-dropdown-footer-left { display: flex; gap: 12px; }
    .year-dropdown-footer button {
      background: none;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
    }
    .year-select-all { color: var(--brand); }
    .year-clear-all { color: var(--danger); }
    .year-done-btn { background: var(--brand); color: white; padding: 6px 16px; border-radius: 20px; }

    /* Modal for monthly breakdown (by category) */
    .modal-cat-breakdown .cat-break-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .cat-break-left { display: flex; align-items: center; gap: 10px; }
    .cat-break-name { font-weight: 600; font-size: 14px; }
    .cat-break-amount { font-family: 'Sora', sans-serif; font-weight: 700; color: var(--brand); }
    .empty-state { text-align: center; padding: 40px; color: var(--text-3); }
  </style>
</head>
<body>

<div id="loadingScreen" class="screen">
  <div class="screen-box">
    <span style="font-size:52px;display:block;margin-bottom:14px">📊</span>
    <h2>Loading…</h2>
    <p>Fetching your expenses</p>
    <div class="spinner"></div>
  </div>
</div>

<div class="container" id="mainApp" style="display:none">
  <div class="header">
    <h1>📋 Daily Expenses</h1>
    <div class="header-actions">
      <button class="hdr-icon-btn" id="exportBtn" title="Export">⬇️</button>
      <button class="hdr-icon-btn" id="refreshBtn" title="Sync">↻</button>
      <button class="hdr-icon-btn" onclick="window.location.href='Settings.html'" title="Settings">⚙️</button>
      <button class="hdr-icon-btn danger" onclick="logout()" title="Logout">⏻</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span class="card-title-icon">📅</span> Filter Expenses</div>
    <div class="filter-grid">
      <div><label>Month</label><select id="monthSelect"></select></div>
      <div><label>Year</label><select id="yearSelect"></select></div>
    </div>
    <div class="sync-strip" id="syncStatus">✅ Connected to Google Drive</div>
  </div>

  <div class="stats-band" id="statsBand" style="display:none">
    <div class="stats-band-left">
      <div class="lbl" id="statsBandLabel">Total Daily Spent</div>
      <div class="val" id="totalAmount">EGP 0</div>
      <div class="stats-comparison" id="comparisonText"></div>
    </div>
    <div class="stats-band-right">
      <div class="cnt" id="expenseCount">0 expenses</div>
      <div class="avg" id="expenseAvg"></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="summary">📊 By Category</button>
    <button class="tab-btn" data-tab="byday">📅 By Day</button>
  </div>

  <div id="summaryTab" class="tab-content active">
    <div class="card">
      <div class="card-title"><span class="card-title-icon">📋</span> Breakdown by Category</div>
      <div id="categoryList"></div>
    </div>
  </div>

  <div id="bydayTab" class="tab-content">
    <div class="card">
      <div class="card-title"><span class="card-title-icon">📅</span> Daily Expenses</div>
      <div id="bydayList"></div>
    </div>
  </div>

  <!-- Daily Expenses Summary Section (like Installment Summary) -->
  <div class="summary-card">
    <div class="summary-header">
      <h3>📊 Daily Expenses Summary</h3>
    </div>
    <div class="year-dropdown" id="yearDropdownSummary">
      <div class="year-dropdown-btn" onclick="toggleYearDropdownSummary()">
        <span id="selectedYearsTextSummary">Select years</span>
        <span class="year-dropdown-arrow">▼</span>
      </div>
      <div class="year-dropdown-menu" id="yearDropdownMenuSummary">
        <div id="yearCheckboxListSummary"></div>
        <div class="year-dropdown-footer">
          <div class="year-dropdown-footer-left">
            <button class="year-select-all" onclick="selectAllYearsSummary(); event.stopPropagation();">Select All</button>
            <button class="year-clear-all" onclick="clearAllYearsSummary(); event.stopPropagation();">Clear All</button>
          </div>
          <button class="year-done-btn" onclick="closeYearDropdownSummary(); event.stopPropagation();">Done</button>
        </div>
      </div>
    </div>
    <div id="summaryContainer"></div>
  </div>
</div>

<div id="bottomNavMount"></div>
<div class="toast" id="toast"></div>

<!-- Monthly breakdown modal (by category) -->
<div class="modal-backdrop" id="monthBreakdownModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="breakdownModalTitle">Category Breakdown</div>
    <div id="breakdownList"></div>
    <div class="modal-footer">
      <button class="btn-primary" id="closeBreakdownBtn">Close</button>
    </div>
  </div>
</div>

<script>
// ======================== STATE ===========================
let expenses = [];
let currentUserEmail = null;
let spreadsheetId = null;
let activeCategory = '';
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

// Summary years state
const AVAILABLE_YEARS = [2026, 2027, 2028, 2029, 2030];
let selectedYearsSummary = new Set([2026]);

// ======================== HELPERS =========================
function parseLocalDate(str) {
  if (!str) return new Date();
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function formatMoney(amount) { return `EGP ${Number(amount).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`; }

function getFilteredExpenses() {
  const year = parseInt(document.getElementById('yearSelect').value);
  const month = parseInt(document.getElementById('monthSelect').value);
  return expenses.filter(exp => {
    const d = parseLocalDate(exp.date);
    return d.getFullYear() === year && d.getMonth() === month;
  });
}

function getPreviousMonthTotal(year, month) {
  let prevYear = year, prevMonth = month - 1;
  if (prevMonth < 0) { prevMonth = 11; prevYear--; }
  const prevExpenses = expenses.filter(exp => {
    const d = parseLocalDate(exp.date);
    return d.getFullYear() === prevYear && d.getMonth() === prevMonth;
  });
  return prevExpenses.reduce((s, e) => s + e.amount, 0);
}

function updateStats(list) {
  const band = document.getElementById('statsBand');
  if (!list.length) { band.style.display = 'none'; return; }
  band.style.display = 'flex';
  const total = list.reduce((s, e) => s + e.amount, 0);
  const avg = total / list.length;
  const monthName = MONTH_NAMES[parseInt(document.getElementById('monthSelect').value)];
  const year = parseInt(document.getElementById('yearSelect').value);
  document.getElementById('statsBandLabel').textContent = `Total Daily Spent in ${monthName} ${year}`;
  document.getElementById('totalAmount').textContent = formatMoney(total);
  document.getElementById('expenseCount').textContent = `${list.length} ${list.length === 1 ? 'expense' : 'expenses'}`;
  document.getElementById('expenseAvg').textContent = `Avg: ${formatMoney(avg)}`;
  
  // Comparison with previous month
  const prevTotal = getPreviousMonthTotal(year, parseInt(document.getElementById('monthSelect').value));
  if (prevTotal > 0) {
    const diff = total - prevTotal;
    const percent = (diff / prevTotal * 100).toFixed(1);
    const diffAbs = formatMoney(Math.abs(diff));
    const compEl = document.getElementById('comparisonText');
    if (diff > 0) {
      compEl.innerHTML = `⬆️ ${diffAbs} more than previous month (+${percent}%)`;
      compEl.className = 'stats-comparison negative';
    } else if (diff < 0) {
      compEl.innerHTML = `⬇️ ${diffAbs} less than previous month (${percent}%)`;
      compEl.className = 'stats-comparison positive';
    } else {
      compEl.innerHTML = `↔️ Same as previous month`;
      compEl.className = 'stats-comparison';
    }
  } else {
    document.getElementById('comparisonText').innerHTML = '';
  }
}

function getCategoryTotals(list) {
  const t = {};
  list.forEach(e => { t[e.category] = (t[e.category] || 0) + e.amount; });
  return t;
}

function renderCategorySummary(list) {
  const container = document.getElementById('categoryList');
  const totals = getCategoryTotals(list);
  const cats = Object.keys(totals).sort((a, b) => totals[b] - totals[a]);
  if (!cats.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>No expenses for this period</p></div>';
    return;
  }
  const max = Math.max(...cats.map(c => totals[c]));
  const counts = {};
  list.forEach(e => { counts[e.category] = (counts[e.category] || 0) + 1; });
  container.innerHTML = cats.map(cat => {
    const pct = (totals[cat] / max * 100).toFixed(0);
    return `
      <div class="category-row" onclick="openCategoryDetail('${cat.replace(/'/g, "\\'")}')">
        <div class="cat-left">
          <div class="cat-icon-sm" style="background:${getCategoryColor(cat)}">${getCategoryIcon(cat)}</div>
          <div>
            <div class="cat-name">${cat}</div>
            <div class="cat-bar-wrap"><div class="cat-bar" style="width:${pct}%;background:${getChartColor(cat)}"></div></div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="text-align:right">
            <div class="cat-amt">${formatMoney(totals[cat])}</div>
            <div class="cat-count">${counts[cat]} ${counts[cat] === 1 ? 'expense' : 'expenses'}</div>
          </div>
          <span style="color:var(--text-3);font-size:14px">›</span>
        </div>
      </div>`;
  }).join('') + `<div class="tap-hint">Tap any category to see details</div>`;
}

function renderByDay(list) {
  const container = document.getElementById('bydayList');
  if (!list.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>No expenses for this period</p></div>';
    return;
  }
  const grouped = {};
  list.forEach(e => { if (!grouped[e.date]) grouped[e.date] = []; grouped[e.date].push(e); });
  const sortedDates = Object.keys(grouped).sort((a, b) => new Date(a) - new Date(b));
  container.innerHTML = sortedDates.map(dateKey => {
    const dayExps = grouped[dateKey];
    const dayTotal = dayExps.reduce((s, e) => s + e.amount, 0);
    return `<div class="day-group">
      <div class="day-header"><span class="day-title">📅 ${formatDayHeader(dateKey)}</span><span class="day-total">${formatMoney(dayTotal)}</span></div>
      ${dayExps.map(e => `<div class="expense-item">
        <div class="cat-icon" style="background:${getCategoryColor(e.category)}">${getCategoryIcon(e.category)}</div>
        <div class="exp-details"><div class="exp-cat">${e.category}</div>${e.notes ? `<div class="exp-note">📝 ${e.notes.substring(0,40)}</div>` : ''}</div>
        <div class="exp-amt">${formatMoney(e.amount)}</div>
      </div>`).join('')}
    </div>`;
  }).join('');
}

function renderAll() {
  const filtered = getFilteredExpenses();
  updateStats(filtered);
  renderCategorySummary(filtered);
  renderByDay(filtered);
  renderDailySummary(); // update summary section
}

// ======================== DAILY SUMMARY SECTION ==========================
function getYearSummary(year) {
  const monthlyTotals = {};
  const monthlyCounts = {};
  for (let i = 0; i < 12; i++) { monthlyTotals[i] = 0; monthlyCounts[i] = 0; }
  expenses.forEach(exp => {
    const d = parseLocalDate(exp.date);
    if (d.getFullYear() === year) {
      monthlyTotals[d.getMonth()] += exp.amount;
      monthlyCounts[d.getMonth()]++;
    }
  });
  return { monthlyTotals, monthlyCounts };
}

function getYearTotal(year) {
  const summary = getYearSummary(year);
  return Object.values(summary.monthlyTotals).reduce((sum, val) => sum + val, 0);
}

function buildYearCheckboxListSummary() {
  const container = document.getElementById('yearCheckboxListSummary');
  container.innerHTML = AVAILABLE_YEARS.map(year => {
    const isSelected = selectedYearsSummary.has(year);
    return `<div class="year-dropdown-item ${isSelected ? 'selected' : ''}" onclick="toggleYearCheckboxSummary(${year})">
      <input type="checkbox" id="year_summary_${year}" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleYearCheckboxSummary(${year})">
      <label for="year_summary_${year}" onclick="event.stopPropagation(); toggleYearCheckboxSummary(${year})">${year}</label>
    </div>`;
  }).join('');
}

function updateSelectedYearsTextSummary() {
  const textSpan = document.getElementById('selectedYearsTextSummary');
  const selected = Array.from(selectedYearsSummary).sort((a,b)=>a-b);
  if (selected.length === 0) textSpan.textContent = 'No years selected';
  else if (selected.length === AVAILABLE_YEARS.length) textSpan.textContent = 'All years (2026-2030)';
  else textSpan.textContent = selected.join(', ');
}

function toggleYearCheckboxSummary(year) {
  if (selectedYearsSummary.has(year)) selectedYearsSummary.delete(year);
  else selectedYearsSummary.add(year);
  buildYearCheckboxListSummary();
  updateSelectedYearsTextSummary();
  renderDailySummary();
}

function selectAllYearsSummary() { AVAILABLE_YEARS.forEach(y => selectedYearsSummary.add(y)); buildYearCheckboxListSummary(); updateSelectedYearsTextSummary(); renderDailySummary(); }
function clearAllYearsSummary() { selectedYearsSummary.clear(); buildYearCheckboxListSummary(); updateSelectedYearsTextSummary(); renderDailySummary(); }
function toggleYearDropdownSummary() { document.getElementById('yearDropdownSummary').classList.toggle('open'); }
function closeYearDropdownSummary() { document.getElementById('yearDropdownSummary').classList.remove('open'); }

function renderDailySummary() {
  const container = document.getElementById('summaryContainer');
  let yearsToShow = AVAILABLE_YEARS.filter(y => selectedYearsSummary.has(y));
  if (yearsToShow.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>No years selected</p><p style="font-size:12px">Select years from dropdown</p></div>`;
    return;
  }
  let html = '';
  yearsToShow.forEach(year => {
    const summary = getYearSummary(year);
    const monthlyTotals = summary.monthlyTotals;
    const monthlyCounts = summary.monthlyCounts;
    const yearTotal = getYearTotal(year);
    let hasData = false;
    for (let i=0;i<12;i++) if (monthlyTotals[i]>0) { hasData=true; break; }
    if (!hasData) return;
    html += `<div class="summary-year-header"><span>📅 ${year}</span><span class="summary-year-total">Total: ${formatMoney(yearTotal)}</span></div>`;
    for (let i=0;i<12;i++) {
      const amount = monthlyTotals[i];
      if (amount > 0) {
        const monthName = MONTH_NAMES[i];
        const count = monthlyCounts[i];
        html += `<div class="summary-month-row" onclick="openMonthBreakdown(${year}, ${i})">
          <div class="summary-month-left">
            <span class="summary-month-name">${monthName}</span>
            <span class="summary-month-count">${count} ${count===1?'expense':'expenses'}</span>
          </div>
          <div class="summary-month-amount">${formatMoney(amount)}</div>
        </div>`;
      }
    }
  });
  if (html === '') container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>No expenses for selected years</p></div>`;
  else container.innerHTML = html;
}

// Monthly breakdown modal (group by category)
function openMonthBreakdown(year, month) {
  const monthExpenses = expenses.filter(exp => {
    const d = parseLocalDate(exp.date);
    return d.getFullYear() === year && d.getMonth() === month;
  });
  const totals = {};
  monthExpenses.forEach(e => { totals[e.category] = (totals[e.category] || 0) + e.amount; });
  const cats = Object.keys(totals).sort((a,b)=>totals[b]-totals[a]);
  document.getElementById('breakdownModalTitle').innerHTML = `📅 ${MONTH_NAMES[month]} ${year} · By Category`;
  const container = document.getElementById('breakdownList');
  if (cats.length === 0) {
    container.innerHTML = '<div class="empty-state">No expenses this month</div>';
  } else {
    container.innerHTML = cats.map(cat => `
      <div class="cat-break-item">
        <div class="cat-break-left">
          <div class="cat-icon-sm" style="background:${getCategoryColor(cat)};width:32px;height:32px;font-size:16px">${getCategoryIcon(cat)}</div>
          <span class="cat-break-name">${cat}</span>
        </div>
        <div class="cat-break-amount">${formatMoney(totals[cat])}</div>
      </div>
    `).join('');
  }
  document.getElementById('monthBreakdownModal').classList.add('open');
}

function closeMonthBreakdown() { document.getElementById('monthBreakdownModal').classList.remove('open'); }

// Category detail modal (simple alert fallback, but reuses existing logic if needed)
function openCategoryDetail(category) {
  const filtered = getFilteredExpenses();
  const catExps = filtered.filter(e => e.category === category);
  const total = catExps.reduce((s,e)=>s+e.amount,0);
  alert(`${category}\nTotal: ${formatMoney(total)}\n${catExps.length} expenses`);
}

// ======================== DATA LOADING ==========================
async function loadExpensesFromSheet(showMsg = false) {
  if (!spreadsheetId) return false;
  try {
    const res = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId, range: 'Daily Log!A2:F' });
    const rows = res.result.values || [];
    expenses = rows.filter(r => r[2] && r[3]).map((r, i) => ({
      id: (r[5] && !isNaN(parseInt(r[5]))) ? parseInt(r[5]) : -(i+1),
      date: r[1] || r[0],
      category: r[2],
      amount: parseFloat(r[3]),
      notes: r[4] || '',
      timestamp: r[0] || new Date().toISOString()
    }));
    const maxId = expenses.reduce((m,e)=>Math.max(m,Number(e.id)||0),0);
    const stored = parseInt(localStorage.getItem('expense_id_counter') || '0');
    if (maxId > stored) localStorage.setItem('expense_id_counter', maxId);
    if (currentUserEmail) localStorage.setItem(`expenses_${currentUserEmail}`, JSON.stringify(expenses));
    renderAll();
    if (showMsg) {
      showToast(`✅ ${expenses.length} expenses loaded`);
      document.getElementById('syncStatus').textContent = '✅ Last synced: ' + new Date().toLocaleTimeString();
    }
    return true;
  } catch(err) { console.error(err); if(showMsg) showToast('❌ Sync failed','error'); return false; }
}

async function manualSync() {
  if (!spreadsheetId) { showToast('⚠️ No Google Sheet connected','error'); return; }
  await loadExpensesFromSheet(true);
}

function populateYearsAndMonths() {
  const yearSel = document.getElementById('yearSelect');
  const currYear = new Date().getFullYear();
  yearSel.innerHTML = '';
  for (let y = currYear-5; y <= currYear+1; y++) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    if (y === currYear) opt.selected = true;
    yearSel.appendChild(opt);
  }
  const monthSel = document.getElementById('monthSelect');
  monthSel.innerHTML = MONTH_NAMES.map((m,i) => `<option value="${i}">${m}</option>`).join('');
  monthSel.value = new Date().getMonth();
}

async function showMain() {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  await ensureCategoriesTab(spreadsheetId);
  await loadExpensesFromSheet(false);
  document.getElementById('syncStatus').textContent = '✅ Last synced: ' + new Date().toLocaleTimeString();
}

async function initPage() {
  await initPageAuth({
    onLoadLocal: (email) => {
      currentUserEmail = email;
      const localRaw = localStorage.getItem(`expenses_${currentUserEmail}`);
      if (localRaw) { expenses = JSON.parse(localRaw); renderAll(); }
    },
    onReady: async (sheetId, email, token) => {
      currentUserEmail = email;
      spreadsheetId = sheetId;
      await showMain();
    }
  });
}

// Event binding
document.getElementById('monthSelect')?.addEventListener('change', renderAll);
document.getElementById('yearSelect')?.addEventListener('change', renderAll);
document.getElementById('refreshBtn')?.addEventListener('click', manualSync);
document.getElementById('closeBreakdownBtn')?.addEventListener('click', closeMonthBreakdown);
document.getElementById('monthBreakdownModal')?.addEventListener('click', e => { if(e.target === e.currentTarget) closeMonthBreakdown(); });
document.addEventListener('click', function(e) {
  const dropdown = document.getElementById('yearDropdownSummary');
  if (dropdown && !dropdown.contains(e.target)) dropdown.classList.remove('open');
});

populateYearsAndMonths();
renderBottomNav('expenses');
initPage();
</script>
