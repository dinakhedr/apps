<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>📋 All Expenses</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 0;
            padding-top: 60px;
            padding-bottom: 40px;
        }

        @supports (padding-top: env(safe-area-inset-top)) {
            body {
                padding-top: calc(60px + env(safe-area-inset-top));
            }
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 16px;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }

        .refresh-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 30px;
            cursor: pointer;
            margin-left: 8px;
        }

        .filter-card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .filter-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-row {
            display: flex;
            gap: 12px;
        }

        .filter-group {
            flex: 1;
        }

        .filter-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #666;
            margin-bottom: 6px;
        }

        .filter-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e8e8ed;
            border-radius: 14px;
            font-size: 16px;
            font-family: inherit;
            background: #fafafc;
            cursor: pointer;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .stats-card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }

        .stats-label {
            font-size: 14px;
            font-weight: 500;
            color: #666;
        }

        .stats-total {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .expense-count {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
        }

        .chart-card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .chart-card h3 {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
        }

        .chart-container {
            position: relative;
            height: 200px;
            margin: 10px 0;
        }

        canvas {
            max-width: 100%;
            height: auto;
        }

        .chart-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .category-summary-card, .day-group-card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .category-summary-card h3, .day-group-card h3 {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .category-row:last-child {
            border-bottom: none;
        }

        .category-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .category-icon-small {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .category-name {
            font-weight: 500;
            font-size: 15px;
            color: #1a1a2e;
        }

        .category-amount {
            font-weight: 700;
            font-size: 16px;
            color: #667eea;
        }

        .day-group {
            margin-bottom: 20px;
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e8e8ed;
        }

        .day-title {
            font-weight: 600;
            font-size: 14px;
            color: #667eea;
        }

        .day-total {
            font-size: 13px;
            font-weight: 500;
            color: #666;
        }

        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .expense-item:last-child {
            border-bottom: none;
        }

        .expense-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .category-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .expense-details {
            flex: 1;
        }

        .expense-category {
            font-weight: 500;
            font-size: 14px;
            color: #1a1a2e;
        }

        .expense-note {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
        }

        .expense-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .expense-amount {
            font-weight: 700;
            font-size: 15px;
            color: #1a1a2e;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state span {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }

        .status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 30px;
            font-size: 14px;
            transform: translateY(100px);
            transition: transform 0.3s;
            z-index: 1000;
        }

        .status.show {
            transform: translateY(0);
        }

        .status.success {
            background: #10b981;
        }

        .status.error {
            background: #ef4444;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 All Expenses</h1>
            <div>
                <button class="refresh-btn" id="refreshBtn">🔄 Sync</button>
                <button class="back-btn" onclick="goBack()">← Back</button>
            </div>
        </div>

        <div class="filter-card">
            <div class="filter-title">
                <span>📅</span>
                Select Month
            </div>
            <div class="filter-row">
                <div class="filter-group">
                    <label>Month</label>
                    <select id="monthSelect">
                        <option value="0">January</option>
                        <option value="1">February</option>
                        <option value="2">March</option>
                        <option value="3">April</option>
                        <option value="4">May</option>
                        <option value="5">June</option>
                        <option value="6">July</option>
                        <option value="7">August</option>
                        <option value="8">September</option>
                        <option value="9">October</option>
                        <option value="10">November</option>
                        <option value="11">December</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Year</label>
                    <select id="yearSelect"></select>
                </div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="summary">📊 Summary</button>
            <button class="tab-btn" data-tab="byday">📅 Expenses by Day</button>
        </div>

        <div id="summaryTab" class="tab-content active">
            <div class="stats-card" id="statsCard" style="display: none;">
                <div class="stats-row">
                    <span class="stats-label">Total Spent</span>
                    <span class="stats-total" id="totalAmount">EGP 0</span>
                </div>
                <div class="expense-count" id="expenseCount">0 expenses</div>
            </div>

            <div class="chart-card" id="chartCard" style="display: none;">
                <h3>📈 Spending by Category</h3>
                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>
                <div id="chartLegend" class="chart-legend"></div>
            </div>

            <div class="category-summary-card">
                <h3>📋 Breakdown by Category</h3>
                <div id="categoryList"></div>
            </div>
        </div>

        <div id="bydayTab" class="tab-content">
            <div class="day-group-card">
                <h3>📅 Daily Expenses</h3>
                <div id="bydayList"></div>
            </div>
        </div>
    </div>

    <div class="status" id="statusMsg"></div>

    <script>
        let expenses = [];
        let categoryChart = null;
        let currentUserEmail = null;
        let spreadsheetId = null;

        const FOLDER_NAME = 'Expense Tracker';
        const SHEET_NAME = 'My Expenses';

        function getUserEmailFromToken(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                const user = JSON.parse(jsonPayload);
                return user.email;
            } catch (e) {
                return null;
            }
        }

        async function loadSheetData() {
            const token = localStorage.getItem('google_token');
            if (!token) {
                showStatus('❌ Please sign in first', true);
                setTimeout(() => goBack(), 1500);
                return;
            }

            currentUserEmail = getUserEmailFromToken(token);
            
            showStatus('🔄 Loading data from Google Drive...');
            
            await new Promise((resolve) => {
                if (gapi.client.sheets) {
                    resolve();
                } else {
                    gapi.load('client', resolve);
                }
            });
            
            await gapi.client.init({
                apiKey: '',
                discoveryDocs: [
                    'https://sheets.googleapis.com/$discovery/rest?version=v4',
                    'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'
                ]
            });
            
            gapi.client.setToken({ access_token: token });
            
            try {
                // Find the spreadsheet
                const query = `name='${SHEET_NAME}' and mimeType='application/vnd.google-apps.spreadsheet' and trashed=false`;
                const response = await gapi.client.drive.files.list({
                    q: query,
                    spaces: 'drive',
                    fields: 'files(id, name, parents)'
                });
                
                const files = response.result.files;
                if (files && files.length > 0) {
                    spreadsheetId = files[0].id;
                    await loadExpensesFromSheet();
                    showStatus('✅ Data loaded from Google Drive');
                } else {
                    showStatus('⚠️ No spreadsheet found. Please add expenses from Home page first.', true);
                    expenses = [];
                    renderAll();
                }
            } catch (error) {
                console.error('Load error:', error);
                showStatus('❌ Failed to load data. Please refresh and try again.', true);
            }
        }

        async function loadExpensesFromSheet() {
            if (!spreadsheetId) return;
            
            try {
                const response = await gapi.client.sheets.spreadsheets.values.get({
                    spreadsheetId: spreadsheetId,
                    range: 'Sheet1!A2:E'
                });
                
                const rows = response.result.values;
                if (rows && rows.length > 0) {
                    expenses = rows.map(row => ({
                        id: row[4] ? parseInt(row[4]) : Date.now(),
                        date: row[0],
                        category: row[1],
                        amount: parseFloat(row[2]),
                        notes: row[3] || '',
                        timestamp: new Date().toISOString()
                    }));
                } else {
                    expenses = [];
                }
                renderAll();
            } catch (error) {
                console.error('Load from sheet error:', error);
            }
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        function formatDayHeader(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        function getFilteredExpenses() {
            const year = parseInt(document.getElementById('yearSelect').value);
            const month = parseInt(document.getElementById('monthSelect').value);
            return expenses.filter(exp => {
                const expDate = new Date(exp.date);
                return expDate.getFullYear() === year && expDate.getMonth() === month;
            });
        }

        function calculateTotal(expensesList) {
            return expensesList.reduce((sum, exp) => sum + exp.amount, 0);
        }

        function getCategoryTotals(expensesList) {
            const totals = {};
            expensesList.forEach(exp => {
                totals[exp.category] = (totals[exp.category] || 0) + exp.amount;
            });
            return totals;
        }

        function getCategoryIcon(category) {
            const icons = {
                'Car Repairs': '🚗', 'Cafe': '☕', 'Clothes': '👕', 'Entertainment': '🎬',
                'Electronics': '📱', 'Games': '🎮', 'Gym': '🏋️', 'Health': '💊',
                'Home Repairs': '🛠️', 'Internet': '📶', 'Personal Care': '🧴', 'Pets': '🐾',
                'Petrol': '⛽', 'Ride Hailing': '🚕', 'Smoking': '🚬', 'Subscriptions': '💻',
                'Supermarket': '🛒', 'Travel': '✈️', 'Utilities': '⚡'
            };
            return icons[category] || '💰';
        }

        function getCategoryColor(category) {
            const colors = {
                'Car Repairs': '#ffd1d1', 'Cafe': '#d4e8d4', 'Clothes': '#e8d5b7',
                'Entertainment': '#d4b8ff', 'Electronics': '#d4e8ff', 'Games': '#d4b8ff',
                'Gym': '#ffe5b4', 'Health': '#ffccd9', 'Home Repairs': '#ffd1d1',
                'Internet': '#cce0ff', 'Personal Care': '#ffccd9', 'Pets': '#e8d5b7',
                'Petrol': '#ffd1d1', 'Ride Hailing': '#ffe5b4', 'Smoking': '#e0e0e0',
                'Subscriptions': '#cce7ff', 'Supermarket': '#ffe0b5', 'Travel': '#d4e8ff',
                'Utilities': '#ffe5b4'
            };
            return colors[category] || '#f0f0f0';
        }

        function getChartColor(category, index) {
            const chartColors = {
                'Car Repairs': '#e57373', 'Cafe': '#81c784', 'Clothes': '#d4a574',
                'Entertainment': '#b39ddb', 'Electronics': '#7986cb', 'Games': '#b39ddb',
                'Gym': '#f4c542', 'Health': '#f48fb1', 'Home Repairs': '#e57373',
                'Internet': '#4fc3f7', 'Personal Care': '#f48fb1', 'Pets': '#d4a574',
                'Petrol': '#e57373', 'Ride Hailing': '#f4c542', 'Smoking': '#9e9e9e',
                'Subscriptions': '#64b5f6', 'Supermarket': '#ffb74d', 'Travel': '#4fc3f7',
                'Utilities': '#f4c542'
            };
            return chartColors[category] || `hsl(${index * 30}, 70%, 60%)`;
        }

        function updatePieChart(expensesList) {
            const chartCard = document.getElementById('chartCard');
            const totals = getCategoryTotals(expensesList);
            const categories = Object.keys(totals);
            
            if (categories.length === 0) {
                chartCard.style.display = 'none';
                return;
            }
            
            chartCard.style.display = 'block';
            const amounts = categories.map(cat => totals[cat]);
            const totalAmount = amounts.reduce((a, b) => a + b, 0);
            const colors = categories.map((cat, idx) => getChartColor(cat, idx));
            const ctx = document.getElementById('categoryChart').getContext('2d');
            
            if (categoryChart) categoryChart.destroy();
            
            categoryChart = new Chart(ctx, {
                type: 'pie',
                data: { labels: categories, datasets: [{ data: amounts, backgroundColor: colors, borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } } }
            });
            
            const legendDiv = document.getElementById('chartLegend');
            legendDiv.innerHTML = categories.map((cat, idx) => {
                const percentage = ((totals[cat] / totalAmount) * 100).toFixed(1);
                return `<div class="legend-item"><div class="legend-color" style="background: ${colors[idx]}"></div><span>${cat} (${percentage}%)</span></div>`;
            }).join('');
        }

        function renderCategorySummary(expensesList) {
            const container = document.getElementById('categoryList');
            const totals = getCategoryTotals(expensesList);
            const categories = Object.keys(totals).sort();
            
            if (categories.length === 0) {
                container.innerHTML = '<div class="empty-state"><span>📭</span><p>No expenses for this month</p></div>';
                return;
            }
            
            let html = '';
            categories.forEach(cat => {
                html += `
                    <div class="category-row">
                        <div class="category-left">
                            <div class="category-icon-small" style="background: ${getCategoryColor(cat)};">${getCategoryIcon(cat)}</div>
                            <span class="category-name">${cat}</span>
                        </div>
                        <div class="category-amount">EGP ${totals[cat].toFixed(2)}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function renderByDay(expensesList) {
            const container = document.getElementById('bydayList');
            
            if (expensesList.length === 0) {
                container.innerHTML = '<div class="empty-state"><span>📭</span><p>No expenses for this month</p></div>';
                return;
            }
            
            const grouped = {};
            expensesList.forEach(exp => {
                const dateKey = exp.date;
                if (!grouped[dateKey]) grouped[dateKey] = [];
                grouped[dateKey].push(exp);
            });
            
            const sortedDates = Object.keys(grouped).sort((a, b) => new Date(a) - new Date(b));
            
            let html = '';
            sortedDates.forEach(dateKey => {
                const dayExpenses = grouped[dateKey];
                const dayTotal = calculateTotal(dayExpenses);
                const displayDate = formatDayHeader(dateKey);
                
                html += `
                    <div class="day-group">
                        <div class="day-header">
                            <span class="day-title">📅 ${displayDate}</span>
                            <span class="day-total">Total: EGP ${dayTotal.toFixed(2)}</span>
                        </div>
                `;
                
                dayExpenses.forEach(exp => {
                    html += `
                        <div class="expense-item">
                            <div class="expense-left">
                                <div class="category-icon" style="background: ${getCategoryColor(exp.category)};">${getCategoryIcon(exp.category)}</div>
                                <div class="expense-details">
                                    <div class="expense-category">${exp.category}</div>
                                    ${exp.notes ? `<div class="expense-note">📝 ${exp.notes.substring(0, 30)}</div>` : ''}
                                </div>
                            </div>
                            <div class="expense-right">
                                <div class="expense-amount">EGP ${exp.amount.toFixed(2)}</div>
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
            });
            container.innerHTML = html;
        }

        function updateStats(expensesList) {
            const total = calculateTotal(expensesList);
            const statsCard = document.getElementById('statsCard');
            
            if (expensesList.length === 0) {
                statsCard.style.display = 'none';
            } else {
                statsCard.style.display = 'block';
                document.getElementById('totalAmount').textContent = `EGP ${total.toFixed(2)}`;
                document.getElementById('expenseCount').textContent = `${expensesList.length} ${expensesList.length === 1 ? 'expense' : 'expenses'}`;
            }
        }

        function renderAll() {
            const filtered = getFilteredExpenses();
            updateStats(filtered);
            updatePieChart(filtered);
            renderCategorySummary(filtered);
            renderByDay(filtered);
        }

        function showStatus(message, isError = false) {
            const statusDiv = document.getElementById('statusMsg');
            statusDiv.textContent = message;
            statusDiv.className = `status show ${isError ? 'error' : 'success'}`;
            setTimeout(() => statusDiv.classList.remove('show'), 2000);
        }

        function populateYears() {
            const yearSelect = document.getElementById('yearSelect');
            const currentYear = new Date().getFullYear();
            for (let year = currentYear - 5; year <= currentYear + 1; year++) {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                if (year === currentYear) option.selected = true;
                yearSelect.appendChild(option);
            }
        }

        function setCurrentMonth() {
            document.getElementById('monthSelect').value = new Date().getMonth();
        }

        function setupTabs() {
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const tabId = tab.getAttribute('data-tab');
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById('summaryTab').classList.remove('active');
                    document.getElementById('bydayTab').classList.remove('active');
                    if (tabId === 'summary') {
                        document.getElementById('summaryTab').classList.add('active');
                    } else {
                        document.getElementById('bydayTab').classList.add('active');
                    }
                });
            });
        }

        async function refreshData() {
            showStatus('🔄 Syncing from Google Drive...');
            await loadExpensesFromSheet();
            renderAll();
            showStatus('✅ Data synced from Google Drive');
        }

        function goBack() {
            window.location.href = 'Home.html';
        }

        document.getElementById('monthSelect').addEventListener('change', renderAll);
        document.getElementById('yearSelect').addEventListener('change', renderAll);
        document.getElementById('refreshBtn').addEventListener('click', refreshData);

        populateYears();
        setCurrentMonth();
        setupTabs();
        loadSheetData();
    </script>
</body>
</html>
