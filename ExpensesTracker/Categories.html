<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>⚙️ Manage Categories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <script src="utils.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --brand:        #5b5ef4;
      --brand-2:      #8b5cf6;
      --brand-grad:   linear-gradient(135deg, #5b5ef4 0%, #8b5cf6 100%);
      --surface:      #ffffff;
      --surface-2:    #f5f5fa;
      --border:       #e8e8f0;
      --text:         #14142b;
      --text-2:       #6e6e8a;
      --text-3:       #a8a8c0;
      --success:      #10b981;
      --warning:      #f59e0b;
      --danger:       #ef4444;
      --radius-lg:    24px;
      --radius-md:    16px;
      --radius-sm:    10px;
      --shadow:       0 8px 32px rgba(91,94,244,0.10);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--brand-grad);
      min-height: 100vh;
      padding-top: 60px;
      padding-bottom: 60px;
    }
    @supports (padding-top: env(safe-area-inset-top)) {
      body { padding-top: calc(60px + env(safe-area-inset-top)); }
    }

    .container { max-width: 520px; margin: 0 auto; padding: 0 18px; }

    /* ── Header ── */
    .header {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .back-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.30);
      color: #fff; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.35); }
    .header h1 {
      font-family: 'Sora', sans-serif; font-size: 22px;
      font-weight: 800; color: #fff; letter-spacing: -0.5px;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface); border-radius: var(--radius-lg);
      padding: 20px; margin-bottom: 18px; box-shadow: var(--shadow);
    }
    .card-title {
      font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 700;
      color: var(--text); margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-title-icon {
      width: 28px; height: 28px; border-radius: 9px;
      background: var(--brand-grad);
      display: inline-flex; align-items: center; justify-content: center; font-size: 14px;
    }

    /* ── Add custom category button ── */
    .add-cat-btn {
      width: 100%; padding: 13px;
      background: var(--brand-grad); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-size: 15px; font-weight: 700;
      font-family: 'Sora', sans-serif; cursor: pointer;
      box-shadow: 0 4px 16px rgba(91,94,244,0.28);
      transition: opacity 0.15s, transform 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-bottom: 18px;
    }
    .add-cat-btn:hover  { opacity: 0.92; }
    .add-cat-btn:active { transform: scale(0.97); }

    /* ── Category row ── */
    .cat-row {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 0; border-bottom: 1px solid var(--border);
    }
    .cat-row:last-child { border-bottom: none; }
    .cat-icon-preview {
      width: 42px; height: 42px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .cat-info { flex: 1; min-width: 0; }
    .cat-name-text { font-weight: 600; font-size: 14px; color: var(--text); }
    .cat-budget-text { font-size: 11px; color: var(--text-3); margin-top: 2px; }
    .cat-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

    /* toggle switch */
    .toggle-wrap { display: flex; align-items: center; }
    .toggle {
      position: relative; width: 40px; height: 22px;
      background: var(--border); border-radius: 11px;
      cursor: pointer; transition: background 0.2s; flex-shrink: 0;
      border: none; padding: 0;
    }
    .toggle.on { background: var(--success); }
    .toggle::after {
      content: ''; position: absolute;
      width: 18px; height: 18px; border-radius: 50%;
      background: #fff; top: 2px; left: 2px;
      transition: transform 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.18);
    }
    .toggle.on::after { transform: translateX(18px); }

    .action-btn {
      background: none; border: none;
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 15px; transition: background 0.15s;
    }
    .action-btn:hover { background: var(--surface-2); }

    /* hidden / faded row */
    .cat-row.hidden-cat { opacity: 0.4; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--text); color: #fff; padding: 11px 22px; border-radius: 30px;
      font-size: 13px; font-weight: 600; z-index: 9999; white-space: nowrap;
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none; max-width: 90vw;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--success); }
    .toast.error   { background: var(--danger); }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      z-index: 3000; display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; transition: opacity 0.25s; pointer-events: none;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal {
      background: #fff; border-radius: 28px 28px 0 0;
      padding: 24px 20px 36px; width: 100%; max-width: 520px;
      transform: translateY(40px);
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
      max-height: 90vh; overflow-y: auto;
    }
    .modal-backdrop.open .modal { transform: translateY(0); }
    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 4px; margin: 0 auto 18px; }
    .modal-title { font-family: 'Sora', sans-serif; font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 20px; }
    .modal-footer { display: flex; gap: 10px; margin-top: 20px; }
    .btn-cancel {
      flex: 1; padding: 13px; background: var(--surface-2); color: var(--text-2);
      border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
    }
    .btn-save {
      flex: 2; padding: 13px; background: var(--brand-grad); color: #fff;
      border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: 'Sora', sans-serif;
      box-shadow: 0 4px 14px rgba(91,94,244,0.28);
    }
    .btn-save:hover { opacity: 0.90; }
    .btn-danger {
      flex: 1; padding: 13px; background: #fee2e2; color: #991b1b;
      border: 1.5px solid #fca5a5; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 700; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    /* ── Form inside modal ── */
    .form-group { display: flex; flex-direction: column; margin-bottom: 14px; }
    .form-group label {
      font-size: 11px; font-weight: 700; color: var(--text-2);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
    }
    .form-group input, .form-group select {
      width: 100%; padding: 11px 13px;
      border: 2px solid var(--border); border-radius: var(--radius-sm);
      font-size: 15px; font-family: 'DM Sans', sans-serif;
      background: var(--surface-2); color: var(--text);
      -webkit-appearance: none; appearance: none;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none; border-color: var(--brand); background: #fff;
    }

    /* ── Icon picker ── */
    .icon-picker-label { font-size: 11px; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; display: block; }
    .icon-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 14px;
    }
    .icon-option {
      width: 100%; aspect-ratio: 1; border-radius: 10px;
      background: var(--surface-2); border: 2px solid transparent;
      font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .icon-option.selected { border-color: var(--brand); background: #ededff; }
    .icon-option:active { transform: scale(0.92); }

    /* ── Color picker ── */
    .color-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 14px;
    }
    .color-option {
      width: 100%; aspect-ratio: 1; border-radius: 10px;
      border: 2.5px solid transparent; cursor: pointer;
      transition: all 0.15s; position: relative;
    }
    .color-option.selected::after {
      content: '✓'; position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }
    .color-option.selected { border-color: var(--text); }

    /* ── Budget input ── */
    .budget-input-wrap { position: relative; }
    .budget-input-wrap input { padding-left: 44px; }
    .budget-curr-label {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      font-size: 12px; color: var(--text-3); pointer-events: none; font-weight: 600;
    }

    /* ── Preview ── */
    .cat-preview {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; background: var(--surface-2);
      border-radius: var(--radius-sm); margin-bottom: 14px;
    }
    .cat-preview-icon {
      width: 44px; height: 44px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center; font-size: 22px;
    }
    .cat-preview-name { font-weight: 700; font-size: 15px; color: var(--text); }
    .cat-preview-sub  { font-size: 11px; color: var(--text-3); margin-top: 2px; }

    /* ── Section divider ── */
    .section-divider {
      font-size: 11px; font-weight: 700; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 10px 0 6px; border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <button class="back-btn" onclick="window.location.href='Home.html'">←</button>
      <h1>⚙️ Categories</h1>
    </div>
  </div>

  <!-- Add custom category -->
  <button class="add-cat-btn" onclick="openAddModal()">＋ Add Custom Category</button>

  <!-- Built-in categories -->
  <div class="card">
    <div class="card-title"><span class="card-title-icon">📋</span> Default Categories</div>
    <div class="section-divider">Toggle visibility · Set budget · Rename</div>
    <div id="defaultCatList"></div>
  </div>

  <!-- Custom categories -->
  <div class="card" id="customCatCard" style="display:none">
    <div class="card-title"><span class="card-title-icon">✨</span> Custom Categories</div>
    <div id="customCatList"></div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ── Add / Edit Modal ── -->
<div class="modal-backdrop" id="catModalBackdrop">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="catModalTitle">✨ New Category</div>

    <!-- Live preview -->
    <div class="cat-preview" id="catPreview">
      <div class="cat-preview-icon" id="previewIcon" style="background:#ededff">❓</div>
      <div>
        <div class="cat-preview-name" id="previewName">Category Name</div>
        <div class="cat-preview-sub" id="previewBudget">No budget limit</div>
      </div>
    </div>

    <!-- Name -->
    <div class="form-group">
      <label>Category Name</label>
      <input type="text" id="catName" placeholder="e.g. Dining Out" maxlength="30" oninput="updatePreview()">
    </div>

    <!-- Icon picker -->
    <span class="icon-picker-label">Icon</span>
    <div class="icon-grid" id="iconGrid"></div>

    <!-- Color picker -->
    <span class="icon-picker-label">Background Color</span>
    <div class="color-grid" id="colorGrid"></div>

    <!-- Budget limit -->
    <div class="form-group">
      <label>Monthly Budget Limit (optional)</label>
      <div class="budget-input-wrap">
        <span class="budget-curr-label">EGP</span>
        <input type="number" id="catBudget" placeholder="No limit" min="0" step="1" inputmode="numeric" oninput="updatePreview()">
      </div>
    </div>

    <div class="modal-footer" id="catModalFooter">
      <button class="btn-cancel" onclick="closeCatModal()">Cancel</button>
      <button class="btn-save" onclick="saveCategory()">Save</button>
    </div>
  </div>
</div>

<!-- ── Edit Built-in Modal (rename + budget only) ── -->
<div class="modal-backdrop" id="editBuiltinBackdrop">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="editBuiltinTitle">✏️ Edit Category</div>

    <div class="cat-preview" id="builtinPreview">
      <div class="cat-preview-icon" id="builtinPreviewIcon"></div>
      <div>
        <div class="cat-preview-name" id="builtinPreviewName"></div>
        <div class="cat-preview-sub" id="builtinPreviewBudget">No budget limit</div>
      </div>
    </div>

    <div class="form-group">
      <label>Display Name</label>
      <input type="text" id="builtinName" placeholder="Rename…" maxlength="30" oninput="updateBuiltinPreview()">
    </div>

    <div class="form-group">
      <label>Monthly Budget Limit (optional)</label>
      <div class="budget-input-wrap">
        <span class="budget-curr-label">EGP</span>
        <input type="number" id="builtinBudget" placeholder="No limit" min="0" step="1" inputmode="numeric" oninput="updateBuiltinPreview()">
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeBuiltinModal()">Cancel</button>
      <button class="btn-save" onclick="saveBuiltin()">Save</button>
    </div>
  </div>
</div>

<script>
// ── Constants ─────────────────────────────────────────────
const ICON_OPTIONS = [
  '🍕','🍔','🍣','🥗','🍜','☕','🧃',
  '🚗','✈️','🚕','⛽','🚂','🛳️','🚲',
  '👕','👟','👜','💄','💍','🧥','🕶️',
  '🏋️','⚽','🎮','🎬','🎵','🎨','📚',
  '💊','🏥','🧴','🧘','🩺','💉','🌿',
  '🛒','🏠','🛠️','💡','📶','💻','📱',
  '🐾','🐶','🐱','🌱','🎁','💰','⚡',
  '📝','🎓','💼','🏦','🔑','📦','🌍',
];

const COLOR_OPTIONS = [
  { bg: '#ffd1d1', chart: '#e57373' },
  { bg: '#ffccd9', chart: '#f48fb1' },
  { bg: '#ffe5b4', chart: '#f4c542' },
  { bg: '#ffe0b5', chart: '#ffb74d' },
  { bg: '#d4e8d4', chart: '#81c784' },
  { bg: '#d4e8ff', chart: '#4fc3f7' },
  { bg: '#cce0ff', chart: '#7986cb' },
  { bg: '#d4b8ff', chart: '#b39ddb' },
  { bg: '#e8d5b7', chart: '#d4a574' },
  { bg: '#e0e0e0', chart: '#9e9e9e' },
  { bg: '#cce7ff', chart: '#64b5f6' },
  { bg: '#d1fae5', chart: '#34d399' },
  { bg: '#fce7f3', chart: '#f472b6' },
  { bg: '#ede9fe', chart: '#a78bfa' },
];

// ── State ─────────────────────────────────────────────────
// catSettings: { [originalValue]: { name, hidden, budget } }  — for built-ins
// customCats:  [{ value, icon, bg, chart, hidden, budget }]    — user-added
let catSettings = {};
let customCats  = [];
let editingCustomIndex = null; // null = new, number = editing existing
let editingBuiltinKey  = null;
let selectedIcon  = ICON_OPTIONS[0];
let selectedColor = COLOR_OPTIONS[0];

// ── Load / Save ───────────────────────────────────────────
function loadSettings() {
  const s = localStorage.getItem('cat_settings');
  catSettings = s ? JSON.parse(s) : {};
  const c = localStorage.getItem('custom_cats');
  customCats = c ? JSON.parse(c) : [];
}

function saveSettings() {
  localStorage.setItem('cat_settings', JSON.stringify(catSettings));
  localStorage.setItem('custom_cats',  JSON.stringify(customCats));
  // Rebuild the live CATEGORIES array so Home/Expenses pages pick up changes on next load
  rebuildCategoriesArray();
}

function rebuildCategoriesArray() {
  // Overwrite global CATEGORIES with merged built-in + custom
  // Built-ins: apply renames, hide flags
  // This affects the same session if navigated back without reload — but
  // main effect is via localStorage which Home/Expenses read on load.
  localStorage.setItem('categories_override', JSON.stringify(getMergedCategories()));
}

function getMergedCategories() {
  const merged = CATEGORIES
    .filter(c => {
      const s = catSettings[c.value];
      return !(s && s.hidden);
    })
    .map(c => {
      const s = catSettings[c.value];
      return { ...c, value: (s && s.name) ? s.name : c.value, originalValue: c.value };
    });
  const custom = customCats.filter(c => !c.hidden);
  return [...merged, ...custom];
}

// ── Toast ─────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Render ────────────────────────────────────────────────
function render() {
  renderDefaultList();
  renderCustomList();
}

function renderDefaultList() {
  const el = document.getElementById('defaultCatList');
  el.innerHTML = CATEGORIES.map(cat => {
    const s       = catSettings[cat.value] || {};
    const name    = s.name   || cat.value;
    const hidden  = s.hidden || false;
    const budget  = s.budget || null;
    const budgetTxt = budget ? `EGP ${Number(budget).toLocaleString('en-US')} / month` : 'No budget limit';
    return `
      <div class="cat-row ${hidden ? 'hidden-cat' : ''}" id="row-${cat.value.replace(/\s/g,'_')}">
        <div class="cat-icon-preview" style="background:${cat.bg}">${cat.icon}</div>
        <div class="cat-info">
          <div class="cat-name-text">${name}${s.name && s.name !== cat.value ? ` <span style="font-size:10px;color:var(--text-3)">(${cat.value})</span>` : ''}</div>
          <div class="cat-budget-text">${budgetTxt}</div>
        </div>
        <div class="cat-actions">
          <button class="action-btn" onclick="openEditBuiltin('${cat.value}')" title="Edit">✏️</button>
          <button class="toggle ${hidden ? '' : 'on'}" onclick="toggleHide('${cat.value}')" title="${hidden ? 'Show' : 'Hide'}"></button>
        </div>
      </div>`;
  }).join('');
}

function renderCustomList() {
  const card = document.getElementById('customCatCard');
  const el   = document.getElementById('customCatList');
  if (!customCats.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  el.innerHTML = customCats.map((cat, i) => {
    const budget    = cat.budget || null;
    const budgetTxt = budget ? `EGP ${Number(budget).toLocaleString('en-US')} / month` : 'No budget limit';
    return `
      <div class="cat-row ${cat.hidden ? 'hidden-cat' : ''}">
        <div class="cat-icon-preview" style="background:${cat.bg}">${cat.icon}</div>
        <div class="cat-info">
          <div class="cat-name-text">${cat.value}</div>
          <div class="cat-budget-text">${budgetTxt}</div>
        </div>
        <div class="cat-actions">
          <button class="action-btn" onclick="openEditCustom(${i})" title="Edit">✏️</button>
          <button class="toggle ${cat.hidden ? '' : 'on'}" onclick="toggleHideCustom(${i})"></button>
          <button class="action-btn" onclick="deleteCustom(${i})" title="Delete" style="color:var(--danger)">🗑️</button>
        </div>
      </div>`;
  }).join('');
}

// ── Toggle hide ───────────────────────────────────────────
function toggleHide(originalValue) {
  if (!catSettings[originalValue]) catSettings[originalValue] = {};
  catSettings[originalValue].hidden = !catSettings[originalValue].hidden;
  saveSettings();
  render();
  showToast(catSettings[originalValue].hidden ? '👁 Category hidden' : '👁 Category visible');
}

function toggleHideCustom(i) {
  customCats[i].hidden = !customCats[i].hidden;
  saveSettings();
  render();
  showToast(customCats[i].hidden ? '👁 Category hidden' : '👁 Category visible');
}

// ── Delete custom ─────────────────────────────────────────
function deleteCustom(i) {
  if (!confirm(`Delete "${customCats[i].value}"? This won't affect existing expenses.`)) return;
  customCats.splice(i, 1);
  saveSettings();
  render();
  showToast('🗑️ Category deleted');
}

// ── Edit built-in ─────────────────────────────────────────
function openEditBuiltin(originalValue) {
  editingBuiltinKey = originalValue;
  const cat = CATEGORIES.find(c => c.value === originalValue);
  const s   = catSettings[originalValue] || {};

  document.getElementById('editBuiltinTitle').textContent = `✏️ Edit — ${originalValue}`;
  document.getElementById('builtinPreviewIcon').textContent  = cat.icon;
  document.getElementById('builtinPreviewIcon').style.background = cat.bg;
  document.getElementById('builtinPreviewName').textContent  = s.name || originalValue;
  document.getElementById('builtinPreviewBudget').textContent = s.budget ? `EGP ${Number(s.budget).toLocaleString('en-US')} / month` : 'No budget limit';
  document.getElementById('builtinName').value   = s.name   || '';
  document.getElementById('builtinBudget').value = s.budget || '';

  document.getElementById('editBuiltinBackdrop').classList.add('open');
}

function updateBuiltinPreview() {
  const name   = document.getElementById('builtinName').value.trim();
  const budget = document.getElementById('builtinBudget').value;
  const cat    = CATEGORIES.find(c => c.value === editingBuiltinKey);
  document.getElementById('builtinPreviewName').textContent   = name || (cat ? cat.value : '');
  document.getElementById('builtinPreviewBudget').textContent = budget ? `EGP ${Number(budget).toLocaleString('en-US')} / month` : 'No budget limit';
}

function closeBuiltinModal() {
  document.getElementById('editBuiltinBackdrop').classList.remove('open');
  editingBuiltinKey = null;
}

function saveBuiltin() {
  const name   = document.getElementById('builtinName').value.trim();
  const budget = parseFloat(document.getElementById('builtinBudget').value);
  if (!catSettings[editingBuiltinKey]) catSettings[editingBuiltinKey] = {};
  if (name) catSettings[editingBuiltinKey].name   = name;
  else      delete catSettings[editingBuiltinKey].name;
  if (budget > 0) catSettings[editingBuiltinKey].budget = budget;
  else            delete catSettings[editingBuiltinKey].budget;
  saveSettings();
  render();
  closeBuiltinModal();
  showToast('✅ Category updated');
}

// ── Add / Edit custom category modal ─────────────────────
function buildIconGrid() {
  document.getElementById('iconGrid').innerHTML = ICON_OPTIONS.map(icon => `
    <button class="icon-option ${icon === selectedIcon ? 'selected' : ''}"
      onclick="selectIcon('${icon}')">${icon}</button>`).join('');
}

function buildColorGrid() {
  document.getElementById('colorGrid').innerHTML = COLOR_OPTIONS.map((c, i) => `
    <div class="color-option ${c.bg === selectedColor.bg ? 'selected' : ''}"
      style="background:${c.bg}" onclick="selectColor(${i})"></div>`).join('');
}

function selectIcon(icon) {
  selectedIcon = icon;
  buildIconGrid();
  updatePreview();
}

function selectColor(i) {
  selectedColor = COLOR_OPTIONS[i];
  buildColorGrid();
  updatePreview();
}

function updatePreview() {
  const name   = document.getElementById('catName').value.trim();
  const budget = document.getElementById('catBudget').value;
  document.getElementById('previewIcon').textContent        = selectedIcon;
  document.getElementById('previewIcon').style.background   = selectedColor.bg;
  document.getElementById('previewName').textContent        = name || 'Category Name';
  document.getElementById('previewBudget').textContent      = budget ? `EGP ${Number(budget).toLocaleString('en-US')} / month` : 'No budget limit';
}

function openAddModal() {
  editingCustomIndex = null;
  selectedIcon  = ICON_OPTIONS[0];
  selectedColor = COLOR_OPTIONS[0];
  document.getElementById('catModalTitle').textContent = '✨ New Category';
  document.getElementById('catName').value   = '';
  document.getElementById('catBudget').value = '';
  // Reset footer — no delete button
  document.getElementById('catModalFooter').innerHTML = `
    <button class="btn-cancel" onclick="closeCatModal()">Cancel</button>
    <button class="btn-save" onclick="saveCategory()">Save</button>`;
  buildIconGrid();
  buildColorGrid();
  updatePreview();
  document.getElementById('catModalBackdrop').classList.add('open');
}

function openEditCustom(i) {
  editingCustomIndex = i;
  const cat = customCats[i];
  selectedIcon  = cat.icon;
  selectedColor = COLOR_OPTIONS.find(c => c.bg === cat.bg) || COLOR_OPTIONS[0];
  document.getElementById('catModalTitle').textContent = '✏️ Edit Category';
  document.getElementById('catName').value   = cat.value;
  document.getElementById('catBudget').value = cat.budget || '';
  document.getElementById('catModalFooter').innerHTML = `
    <button class="btn-danger" onclick="deleteCustom(${i});closeCatModal()">Delete</button>
    <button class="btn-cancel" onclick="closeCatModal()">Cancel</button>
    <button class="btn-save" onclick="saveCategory()">Save</button>`;
  buildIconGrid();
  buildColorGrid();
  updatePreview();
  document.getElementById('catModalBackdrop').classList.add('open');
}

function closeCatModal() {
  document.getElementById('catModalBackdrop').classList.remove('open');
  editingCustomIndex = null;
}

function saveCategory() {
  const name   = document.getElementById('catName').value.trim();
  const budget = parseFloat(document.getElementById('catBudget').value);
  if (!name) { showToast('❌ Please enter a name', 'error'); return; }

  // Check for duplicate names across all categories
  const allNames = [
    ...CATEGORIES.map(c => (catSettings[c.value]?.name || c.value).toLowerCase()),
    ...customCats.map((c, i) => i === editingCustomIndex ? '' : c.value.toLowerCase())
  ];
  if (allNames.includes(name.toLowerCase())) {
    showToast('❌ Name already exists', 'error'); return;
  }

  const cat = {
    value:  name,
    icon:   selectedIcon,
    bg:     selectedColor.bg,
    chart:  selectedColor.chart,
    budget: budget > 0 ? budget : null,
    hidden: false,
  };

  if (editingCustomIndex !== null) {
    cat.hidden = customCats[editingCustomIndex].hidden;
    customCats[editingCustomIndex] = cat;
  } else {
    customCats.push(cat);
  }

  saveSettings();
  render();
  closeCatModal();
  showToast(editingCustomIndex !== null ? '✅ Category updated' : '✅ Category added');
}

// ── Init ──────────────────────────────────────────────────
loadSettings();
render();
</script>

<script>
(function() {
  try {
    const c = document.createElement('canvas');
    c.width = c.height = 180;
    const ctx = c.getContext('2d');
    const g = ctx.createLinearGradient(0, 0, 180, 180);
    g.addColorStop(0, '#5b5ef4');
    g.addColorStop(1, '#8b5cf6');
    const r = 36;
    ctx.beginPath();
    ctx.moveTo(r, 0); ctx.lineTo(180-r, 0);
    ctx.quadraticCurveTo(180, 0, 180, r);
    ctx.lineTo(180, 180-r);
    ctx.quadraticCurveTo(180, 180, 180-r, 180);
    ctx.lineTo(r, 180);
    ctx.quadraticCurveTo(0, 180, 0, 180-r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fillStyle = g; ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 96px -apple-system, Helvetica, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$', 90, 96);
    const link = document.querySelector('link[rel="apple-touch-icon"]') || document.createElement('link');
    link.rel = 'apple-touch-icon';
    link.href = c.toDataURL('image/png');
    document.head.appendChild(link);
  } catch(e) {}
})();
</script>
</body>
