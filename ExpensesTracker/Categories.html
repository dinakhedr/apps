<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>⚙️ Manage Categories</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="utils.js"></script>
  <script src="auth.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    /* ── Page layout ── */
    .header {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header h1 {
      font-family: 'Sora', sans-serif; font-size: 22px;
      font-weight: 800; color: #fff; letter-spacing: -0.5px;
    }

    /* ── Add custom category button — white style matching Installments ── */
    .add-cat-btn {
      width: 100%; padding: 13px;
      background: #fff; color: var(--brand);
      border: none; border-radius: var(--radius-sm);
      font-size: 15px; font-weight: 700;
      font-family: 'Sora', sans-serif; cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
      transition: opacity 0.15s, transform 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-bottom: 18px;
    }
    .add-cat-btn:hover  { opacity: 0.92; }
    .add-cat-btn:active { transform: scale(0.97); }

    /* ── Category row ── */
    .cat-row {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 0; border-bottom: 1px solid var(--border);
    }
    .cat-row:last-child { border-bottom: none; }
    .cat-icon-preview {
      width: 42px; height: 42px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .cat-info { flex: 1; min-width: 0; }
    .cat-name-text { font-weight: 600; font-size: 14px; color: var(--text); }
    .cat-budget-text { font-size: 11px; color: var(--text-3); margin-top: 2px; }
    .cat-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .cat-row.hidden-cat { opacity: 0.4; }

    /* ── Toggle switch ── */
    .toggle-wrap { display: flex; align-items: center; }
    .toggle {
      position: relative; width: 40px; height: 22px;
      background: var(--border); border-radius: 11px;
      cursor: pointer; transition: background 0.2s; flex-shrink: 0;
      border: none; padding: 0;
    }
    .toggle.on { background: var(--success); }
    .toggle::after {
      content: ''; position: absolute;
      width: 18px; height: 18px; border-radius: 50%;
      background: #fff; top: 2px; left: 2px;
      transition: transform 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.18);
    }
    .toggle.on::after { transform: translateX(18px); }

    /* ── Form inside modal ── */
    .form-group { display: flex; flex-direction: column; margin-bottom: 14px; }
    .form-group label {
      font-size: 11px; font-weight: 700; color: var(--text-2);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
      display: block;
    }
    .form-group input, .form-group select {
      width: 100%; padding: 11px 13px;
      border: 2px solid var(--border); border-radius: var(--radius-sm);
      font-size: 15px; font-family: 'DM Sans', sans-serif;
      background: var(--surface-2); color: var(--text);
      -webkit-appearance: none; appearance: none;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none; border-color: var(--brand); background: #fff;
    }

    /* ── Icon picker ── */
    .icon-picker-label {
      font-size: 11px; font-weight: 700; color: var(--text-2);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; display: block;
    }
    .icon-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 14px;
    }
    .icon-option {
      width: 100%; aspect-ratio: 1; border-radius: 10px;
      background: var(--surface-2); border: 2px solid transparent;
      font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .icon-option.selected { border-color: var(--brand); background: #ededff; }
    .icon-option:active { transform: scale(0.92); }

    /* ── Color picker ── */
    .color-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 14px;
    }
    .color-option {
      width: 100%; aspect-ratio: 1; border-radius: 10px;
      border: 2.5px solid transparent; cursor: pointer;
      transition: all 0.15s; position: relative;
    }
    .color-option.selected::after {
      content: '✓'; position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }
    .color-option.selected { border-color: var(--text); }

    /* ── Budget input (with EGP prefix) ── */
    .budget-input-wrap { position: relative; }
    .budget-input-wrap input { padding-left: 44px; }
    .budget-curr-label {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      font-size: 12px; color: var(--text-3); pointer-events: none; font-weight: 600;
    }

    /* ── Category preview ── */
    .cat-preview {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; background: var(--surface-2);
      border-radius: var(--radius-sm); margin-bottom: 14px;
    }
    .cat-preview-icon {
      width: 44px; height: 44px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center; font-size: 22px;
    }
    .cat-preview-name { font-weight: 700; font-size: 15px; color: var(--text); }
    .cat-preview-sub  { font-size: 11px; color: var(--text-3); margin-top: 2px; }

    /* ── Section divider ── */
    .section-divider {
      font-size: 11px; font-weight: 700; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 10px 0 6px; border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    /* ── Spinner (brand colour, used inside loading-box) ── */
    .spinner-brand {
      display: inline-block; width: 28px; height: 28px;
      border: 3px solid #ededff; border-top-color: var(--brand);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-box">
      <div class="spinner-brand"></div>
      <p>Loading categories…</p>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <h1>⚙️ Categories</h1>
    <div class="header-actions">
      <button class="hdr-icon-btn danger" onclick="logout()" title="Logout">⏻</button>
    </div>
  </div>

  <!-- Add custom category -->
  <button class="add-cat-btn" onclick="openAddModal()">＋ Add Custom Category</button>

  <!-- Built-in categories -->
  <div class="card">
    <div class="card-title"><span class="card-title-icon">📋</span> Default Categories</div>
    <div class="section-divider">Toggle visibility · Set budget · Rename</div>
    <div id="defaultCatList"></div>
  </div>

  <!-- Custom categories -->
  <div class="card" id="customCatCard" style="display:none">
    <div class="card-title"><span class="card-title-icon">✨</span> Custom Categories</div>
    <div id="customCatList"></div>
  </div>

</div>

<!-- Toast -->

<div id="bottomNavMount"></div>

<div class="toast" id="toast"></div>

<!-- ── Add / Edit Modal ── -->
<div class="modal-backdrop" id="catModalBackdrop">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="catModalTitle">✨ New Category</div>

    <!-- Live preview -->
    <div class="cat-preview" id="catPreview">
      <div class="cat-preview-icon" id="previewIcon" style="background:#ededff">❓</div>
      <div>
        <div class="cat-preview-name" id="previewName">Category Name</div>
        <div class="cat-preview-sub" id="previewBudget">No budget limit</div>
      </div>
    </div>

    <!-- Name -->
    <div class="form-group">
      <label>Category Name</label>
      <input type="text" id="catName" placeholder="e.g. Dining Out" maxlength="30" oninput="updatePreview()">
    </div>

    <!-- Icon picker -->
    <span class="icon-picker-label">Icon</span>
    <div class="icon-grid" id="iconGrid"></div>

    <!-- Color picker -->
    <span class="icon-picker-label">Background Color</span>
    <div class="color-grid" id="colorGrid"></div>

    <!-- Budget limit -->
    <div class="form-group">
      <label>Monthly Budget Limit (optional)</label>
      <div class="budget-input-wrap">
        <span class="budget-curr-label">EGP</span>
        <input type="number" id="catBudget" placeholder="No limit" min="0" step="1" inputmode="numeric" oninput="updatePreview()">
      </div>
    </div>

    <div class="modal-footer" id="catModalFooter">
      <button class="btn-cancel" onclick="closeCatModal()">Cancel</button>
      <button class="btn-save" onclick="saveCategory()">Save</button>
    </div>
  </div>
</div>

<!-- ── Edit Built-in Modal (rename + budget only) ── -->
<div class="modal-backdrop" id="editBuiltinBackdrop">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="editBuiltinTitle">✏️ Edit Category</div>

    <div class="cat-preview" id="builtinPreview">
      <div class="cat-preview-icon" id="builtinPreviewIcon"></div>
      <div>
        <div class="cat-preview-name" id="builtinPreviewName"></div>
        <div class="cat-preview-sub" id="builtinPreviewBudget">No budget limit</div>
      </div>
    </div>
<!-- Icon picker -->
    <span class="icon-picker-label">Icon</span>
    <div class="icon-grid" id="builtinIconGrid"></div>

    <!-- Color picker -->
    <span class="icon-picker-label">Background Color</span>
    <div class="color-grid" id="builtinColorGrid"></div>

    <div class="form-group">
      <label>Display Name</label>
      <input type="text" id="builtinName" placeholder="Rename…" maxlength="30" oninput="updateBuiltinPreview()">
    </div>

    <div class="form-group">
      <label>Monthly Budget Limit (optional)</label>
      <div class="budget-input-wrap">
        <span class="budget-curr-label">EGP</span>
        <input type="number" id="builtinBudget" placeholder="No limit" min="0" step="1" inputmode="numeric" oninput="updateBuiltinPreview()">
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeBuiltinModal()">Cancel</button>
      <button class="btn-save" onclick="saveBuiltin()">Save</button>
    </div>
  </div>
</div>

<script>
// ── Constants ─────────────────────────────────────────────
const ICON_OPTIONS = [
  '🍕','🍔','🍣','🥗','🍜','☕','🧃',
  '🚗','✈️','🚕','⛽','🚂','🛳️','🚲',
  '👕','👟','👜','💄','💍','🧥','🕶️',
  '🏋️','⚽','🎮','🎬','🎵','🎨','📚',
  '💊','🏥','🧴','🧘','🩺','💉','🌿',
  '🛒','🏠','🛠️','💡','📶','💻','📱',
  '🐾','🐶','🐱','🌱','🎁','💰','⚡',
  '📝','🎓','💼','🏦','🔑','📦','🌍',
];

const COLOR_OPTIONS = [
  { bg: '#ffd1d1', chart: '#e57373' },
  { bg: '#ffccd9', chart: '#f48fb1' },
  { bg: '#ffe5b4', chart: '#f4c542' },
  { bg: '#ffe0b5', chart: '#ffb74d' },
  { bg: '#d4e8d4', chart: '#81c784' },
  { bg: '#d4e8ff', chart: '#4fc3f7' },
  { bg: '#cce0ff', chart: '#7986cb' },
  { bg: '#d4b8ff', chart: '#b39ddb' },
  { bg: '#e8d5b7', chart: '#d4a574' },
  { bg: '#e0e0e0', chart: '#9e9e9e' },
  { bg: '#cce7ff', chart: '#64b5f6' },
  { bg: '#d1fae5', chart: '#34d399' },
  { bg: '#fce7f3', chart: '#f472b6' },
  { bg: '#ede9fe', chart: '#a78bfa' },
];

// ── State ─────────────────────────────────────────────────
let allCats = [];          // full list including hidden (from sheet)
let spreadsheetId  = null;
let currentUserEmail = null;
let currentAccessToken = null;
let editingIndex   = null; // index in allCats being edited, null = new
let editingBuiltinKey  = null;
let builtinSelectedIcon  = null;
let builtinSelectedColor = null;
let selectedIcon   = ICON_OPTIONS[0];
let selectedColor  = COLOR_OPTIONS[0];
let isSaving = false;

// ── Toast ─────────────────────────────────────────────────
let toastTimer;

// ── Render ────────────────────────────────────────────────
function render() {
  const defaults = allCats.filter(c => c.type === 'default').sort((a, b) => a.value.localeCompare(b.value));
  const customs  = allCats.filter(c => c.type === 'custom').sort((a, b) => a.value.localeCompare(b.value));
  
  document.getElementById('defaultCatList').innerHTML = defaults.map((cat, _) => {
    const i = allCats.indexOf(cat);
    const budget = cat.budget;
    const budgetTxt = budget ? `EGP ${Number(budget).toLocaleString('en-US')} / month` : 'No budget limit';
    const origDef = DEFAULT_CATEGORIES.find(d => d.value === cat.originalValue) || {};
    
    const displayName = cat.value;
    
    return `
      <div class="cat-row ${cat.hidden ? 'hidden-cat' : ''}">
        <div class="cat-icon-preview" style="background:${cat.bg}">${cat.icon}</div>
        <div class="cat-info">
          <div class="cat-name-text">${displayName}</div>
          <div class="cat-budget-text">${budgetTxt}</div>
        </div>
        <div class="cat-actions">
          <button class="action-btn" onclick="openEditBuiltin(${i})" title="Edit">✏️</button>
          <button class="toggle ${cat.hidden ? '' : 'on'}" onclick="toggleHide(${i})"></button>
        </div>
      </div>`;
  }).join('');

  const customCard = document.getElementById('customCatCard');
  const customList = document.getElementById('customCatList');
  if (!customs.length) { customCard.style.display = 'none'; }
  else {
    customCard.style.display = 'block';
    customList.innerHTML = customs.map((cat, _) => {
      const i = allCats.indexOf(cat);
      const budget = cat.budget;
      const budgetTxt = budget ? `EGP ${Number(budget).toLocaleString('en-US')} / month` : 'No budget limit';
      return `
        <div class="cat-row ${cat.hidden ? 'hidden-cat' : ''}">
          <div class="cat-icon-preview" style="background:${cat.bg}">${cat.icon}</div>
          <div class="cat-info">
            <div class="cat-name-text">${cat.value}</div>
            <div class="cat-budget-text">${budgetTxt}</div>
          </div>
          <div class="cat-actions">
            <button class="action-btn" onclick="openEditCustom(${i})" title="Edit">✏️</button>
            <button class="toggle ${cat.hidden ? '' : 'on'}" onclick="toggleHide(${i})"></button>
            <button class="action-btn" onclick="deleteCustom(${i})" title="Delete" style="color:var(--danger)">🗑️</button>
          </div>
        </div>`;
    }).join('');
  }
}

// ── Save to sheet ─────────────────────────────────────────
async function persistToSheet() {
  if (!spreadsheetId) { showToast('⚠️ Not connected to sheet', 'error'); return false; }
  if (isSaving) return false;
  isSaving = true;
  try {
    await saveCategoriesToSheet(spreadsheetId, allCats);
    // Refresh active CATEGORIES for this session
    CATEGORIES = allCats.filter(c => !c.hidden);
    isSaving = false;
    return true;
  } catch(e) {
    console.error(e);
    showToast('❌ Failed to save to sheet', 'error');
    isSaving = false;
    return false;
  }
}

// ── Toggle hide ───────────────────────────────────────────
async function toggleHide(i) {
  allCats[i].hidden = !allCats[i].hidden;
  render();
  const ok = await persistToSheet();
  if (ok) showToast(allCats[i].hidden ? '👁 Category hidden' : '👁 Category visible');
  else allCats[i].hidden = !allCats[i].hidden; // revert on fail
  render();
}

// ── Delete custom ─────────────────────────────────────────
async function deleteCustom(i) {
  if (!confirm(`Delete "${allCats[i].value}"? This won't affect existing expenses.`)) return;
  const removed = allCats.splice(i, 1);
  render();
  const ok = await persistToSheet();
  if (ok) showToast('🗑️ Category deleted');
  else { allCats.splice(i, 0, removed[0]); render(); } // revert
}

// ── Edit built-in ─────────────────────────────────────────
function openEditBuiltin(i) {
  editingIndex     = i;
  editingBuiltinKey = allCats[i].originalValue;
  const cat = allCats[i];

  builtinSelectedIcon  = cat.icon;
  builtinSelectedColor = COLOR_OPTIONS.find(c => c.bg === cat.bg) || COLOR_OPTIONS[0];

  document.getElementById('editBuiltinTitle').textContent        = `✏️ Edit — ${cat.originalValue}`;
  document.getElementById('builtinPreviewIcon').textContent      = builtinSelectedIcon;
  document.getElementById('builtinPreviewIcon').style.background = builtinSelectedColor.bg;
  document.getElementById('builtinPreviewName').textContent      = cat.value;
  document.getElementById('builtinPreviewBudget').textContent    = cat.budget ? `EGP ${Number(cat.budget).toLocaleString('en-US')} / month` : 'No budget limit';
  document.getElementById('builtinName').value   = cat.value !== cat.originalValue ? cat.value : '';
  document.getElementById('builtinBudget').value = cat.budget || '';

  buildBuiltinIconGrid();
  buildBuiltinColorGrid();
  document.getElementById('editBuiltinBackdrop').classList.add('open');
}

function updateBuiltinPreview() {
  const name   = document.getElementById('builtinName').value.trim();
  const budget = document.getElementById('builtinBudget').value;
  const cat    = allCats[editingIndex];
  document.getElementById('builtinPreviewIcon').textContent      = builtinSelectedIcon;
  document.getElementById('builtinPreviewIcon').style.background = builtinSelectedColor ? builtinSelectedColor.bg : cat.bg;
  document.getElementById('builtinPreviewName').textContent      = name || cat.originalValue;
  document.getElementById('builtinPreviewBudget').textContent    = budget ? `EGP ${Number(budget).toLocaleString('en-US')} / month` : 'No budget limit';
}

function buildBuiltinIconGrid() {
  document.getElementById('builtinIconGrid').innerHTML = ICON_OPTIONS.map(icon => `
    <button class="icon-option ${icon === builtinSelectedIcon ? 'selected' : ''}"
      onclick="selectBuiltinIcon('${icon}')">${icon}</button>`).join('');
}
function buildBuiltinColorGrid() {
  document.getElementById('builtinColorGrid').innerHTML = COLOR_OPTIONS.map((c, i) => `
    <div class="color-option ${c.bg === builtinSelectedColor.bg ? 'selected' : ''}"
      style="background:${c.bg}" onclick="selectBuiltinColor(${i})"></div>`).join('');
}
function selectBuiltinIcon(icon) { builtinSelectedIcon = icon; buildBuiltinIconGrid(); updateBuiltinPreview(); }
function selectBuiltinColor(i)   { builtinSelectedColor = COLOR_OPTIONS[i]; buildBuiltinColorGrid(); updateBuiltinPreview(); }

function closeBuiltinModal() {
  document.getElementById('editBuiltinBackdrop').classList.remove('open');
  editingIndex = null; editingBuiltinKey = null;
}

async function saveBuiltin() {
  const name   = document.getElementById('builtinName').value.trim();
  const budget = parseFloat(document.getElementById('builtinBudget').value);
  const cat    = allCats[editingIndex];
  const origDef = DEFAULT_CATEGORIES.find(d => d.value === cat.originalValue);

  allCats[editingIndex] = {
    ...cat,
    value:  name || cat.originalValue,
    icon:   builtinSelectedIcon,
    bg:     builtinSelectedColor.bg,
    chart:  builtinSelectedColor.chart,
    budget: budget > 0 ? budget : null,
  };

  closeBuiltinModal();
  render();
  const ok = await persistToSheet();
  if (ok) showToast('✅ Category updated');
}

// ── Add / Edit custom category modal ─────────────────────
function buildIconGrid() {
  document.getElementById('iconGrid').innerHTML = ICON_OPTIONS.map(icon => `
    <button class="icon-option ${icon === selectedIcon ? 'selected' : ''}"
      onclick="selectIcon('${icon}')">${icon}</button>`).join('');
}
function buildColorGrid() {
  document.getElementById('colorGrid').innerHTML = COLOR_OPTIONS.map((c, i) => `
    <div class="color-option ${c.bg === selectedColor.bg ? 'selected' : ''}"
      style="background:${c.bg}" onclick="selectColor(${i})"></div>`).join('');
}
function selectIcon(icon)  { selectedIcon = icon; buildIconGrid(); updatePreview(); }
function selectColor(i)    { selectedColor = COLOR_OPTIONS[i]; buildColorGrid(); updatePreview(); }

function updatePreview() {
  const name   = document.getElementById('catName').value.trim();
  const budget = document.getElementById('catBudget').value;
  document.getElementById('previewIcon').textContent      = selectedIcon;
  document.getElementById('previewIcon').style.background = selectedColor.bg;
  document.getElementById('previewName').textContent      = name || 'Category Name';
  document.getElementById('previewBudget').textContent    = budget ? `EGP ${Number(budget).toLocaleString('en-US')} / month` : 'No budget limit';
}

function openAddModal() {
  editingIndex  = null;
  selectedIcon  = ICON_OPTIONS[0];
  selectedColor = COLOR_OPTIONS[0];
  document.getElementById('catModalTitle').textContent = '✨ New Category';
  document.getElementById('catName').value   = '';
  document.getElementById('catBudget').value = '';
  document.getElementById('catModalFooter').innerHTML = `
    <button class="btn-cancel" onclick="closeCatModal()">Cancel</button>
    <button class="btn-save" onclick="saveCategory()">Save</button>`;
  buildIconGrid(); buildColorGrid(); updatePreview();
  document.getElementById('catModalBackdrop').classList.add('open');
}

function openEditCustom(i) {
  editingIndex  = i;
  const cat     = allCats[i];
  selectedIcon  = cat.icon;
  selectedColor = COLOR_OPTIONS.find(c => c.bg === cat.bg) || COLOR_OPTIONS[0];
  document.getElementById('catModalTitle').textContent = '✏️ Edit Category';
  document.getElementById('catName').value   = cat.value;
  document.getElementById('catBudget').value = cat.budget || '';
  document.getElementById('catModalFooter').innerHTML = `
    <button class="btn-danger" onclick="deleteCustom(${i});closeCatModal()">Delete</button>
    <button class="btn-cancel" onclick="closeCatModal()">Cancel</button>
    <button class="btn-save" onclick="saveCategory()">Save</button>`;
  buildIconGrid(); buildColorGrid(); updatePreview();
  document.getElementById('catModalBackdrop').classList.add('open');
}

function closeCatModal() {
  document.getElementById('catModalBackdrop').classList.remove('open');
  editingIndex = null;
}

async function saveCategory() {
  const name   = document.getElementById('catName').value.trim();
  const budget = parseFloat(document.getElementById('catBudget').value);
  if (!name) { showToast('❌ Please enter a name', 'error'); return; }

  // Check for duplicate names (excluding current editing)
  const duplicate = allCats.some((c, i) => i !== editingIndex && c.value.toLowerCase() === name.toLowerCase());
  if (duplicate) { showToast('❌ Name already exists', 'error'); return; }

  if (editingIndex !== null) {
    // editing existing custom
    allCats[editingIndex] = {
      ...allCats[editingIndex],
      value:  name,
      icon:   selectedIcon,
      bg:     selectedColor.bg,
      chart:  selectedColor.chart,
      budget: budget > 0 ? budget : null,
    };
  } else {
    allCats.push({
      type: 'custom', originalValue: name, value: name,
      icon: selectedIcon, bg: selectedColor.bg, chart: selectedColor.chart,
      budget: budget > 0 ? budget : null, hidden: false,
    });
  }

  closeCatModal();
  render();
  const ok = await persistToSheet();
  if (ok) showToast(editingIndex !== null ? '✅ Category updated' : '✅ Category added');
}

// ── GAPI bootstrap provided by utils.js ───────────────────


async function loadPage() {
  await initPageAuth({
    onLoadLocal: (email, sheetId) => {
      currentUserEmail = email;
      spreadsheetId    = sheetId;
    },
    onReady: async (sheetId, email, token) => {
      currentUserEmail   = email;
      spreadsheetId      = sheetId;
      currentAccessToken = token;
      allCats = await ensureCategoriesTab(spreadsheetId);
      render();
      document.getElementById('loadingOverlay').style.display = 'none';
    }
  });
}

renderBottomNav('categories');
loadPage();
</script>

<script>
(function() {
  try {
    const c = document.createElement('canvas');
    c.width = c.height = 180;
    const ctx = c.getContext('2d');
    const g = ctx.createLinearGradient(0, 0, 180, 180);
    g.addColorStop(0, '#5b5ef4');
    g.addColorStop(1, '#8b5cf6');
    const r = 36;
    ctx.beginPath();
    ctx.moveTo(r, 0); ctx.lineTo(180-r, 0);
    ctx.quadraticCurveTo(180, 0, 180, r);
    ctx.lineTo(180, 180-r);
    ctx.quadraticCurveTo(180, 180, 180-r, 180);
    ctx.lineTo(r, 180);
    ctx.quadraticCurveTo(0, 180, 0, 180-r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fillStyle = g; ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 96px -apple-system, Helvetica, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$', 90, 96);
    const link = document.querySelector('link[rel="apple-touch-icon"]') || document.createElement('link');
    link.rel = 'apple-touch-icon';
    link.href = c.toDataURL('image/png');
    document.head.appendChild(link);
  } catch(e) {}
})();
</script>
