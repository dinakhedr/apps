<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="images/icon.png">
  <link rel="icon" type="image/png" sizes="180x180" href="images/icon.png">
  <link rel="shortcut icon" href="images/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="utils.js"></script>
  <script src="auth.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .header h1 {
      font-family: 'Sora', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }

    /* ── Month/Year filter ── */
    .dash-filter {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .dash-filter select {
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      background: rgba(255,255,255,0.22);
      color: #fff;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
      text-align: center;
    }
    .dash-filter select option { background: #5b5ef4; color: #fff; }

    /* KPI cards */
    .kpi-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .kpi-card-primary {
      border-radius: var(--radius-lg);
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .kpi-card-primary.income-card {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      box-shadow: 0 4px 20px rgba(16,185,129,0.3);
    }
    .kpi-card-primary.expense-card {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      box-shadow: 0 4px 20px rgba(239,68,68,0.3);
    }
    .kpi-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .kpi-label {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .kpi-value {
      font-family: 'Sora', sans-serif;
      font-size: clamp(16px, 4.5vw, 22px);
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Expenses breakdown */
    .breakdown-section { margin-bottom: 16px; }
    .breakdown-title {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
      padding-left: 4px;
    }
    .kpi-row-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .kpi-card-secondary {
      background: rgba(239,68,68,0.18);
      backdrop-filter: blur(10px);
      border-radius: var(--radius-md);
      padding: 11px 8px;
      border: 1px solid rgba(239,68,68,0.3);
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .kpi-card-secondary .kpi-label { font-size: 9px; color: rgba(255,255,255,0.6); }
    .kpi-card-secondary .kpi-value {
      font-size: clamp(13px, 3.8vw, 17px);
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Net Cash Card */
    .net-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.08) 100%);
      backdrop-filter: blur(10px);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .net-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.7); }
    .net-value {
      font-family: 'Sora', sans-serif;
      font-size: clamp(18px, 5vw, 24px);
      font-weight: 800;
      white-space: nowrap;
    }
    .net-value.positive { color: #6ee7b7; }
    .net-value.negative { color: #fca5a5; }
    .net-badge {
      background: rgba(255,255,255,0.15);
      padding: 3px 10px;
      border-radius: 30px;
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.8);
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* Chart */
    .chart-container { position: relative; height: 260px; margin: 8px 0; }
    canvas { max-width: 100%; }
    .chart-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
      justify-content: center;
    }
    .filter-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.18s;
      user-select: none;
      opacity: 0.38;
    }
    .filter-pill.active { opacity: 1; }
    .filter-pill-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* ── Monthly Summary + Next Month tabbed card ── */
    .summary-tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }
    .summary-tab-btn {
      flex: 1;
      padding: 12px 8px;
      border: none;
      background: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.15s;
    }
    .summary-tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

    /* Tappable summary rows */
    .summ-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.12s;
      gap: 8px;
    }
    .summ-row:last-child { border-bottom: none; }
    .summ-row:active { background: var(--surface-2); padding-left: 6px; padding-right: 6px; }
    .summ-row-left { display: flex; align-items: center; gap: 10px; }
    .summ-row-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0;
    }
    .summ-row-label { font-weight: 600; font-size: 14px; color: var(--text); }
    .summ-row-sub   { font-size: 10px; color: var(--text-3); margin-top: 2px; }
    .summ-row-amount {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: var(--brand);
      flex-shrink: 0;
      white-space: nowrap;
    }
    .summ-row-arrow { color: var(--text-3); font-size: 14px; flex-shrink: 0; }

    /* Net cash row inside summary card */
    .summ-net-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0 4px;
      gap: 8px;
    }
    .summ-net-label {
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }
    .summ-net-value {
      font-family: 'Sora', sans-serif;
      font-size: 18px;
      font-weight: 800;
    }
    .summ-net-value.positive { color: var(--success); }
    .summ-net-value.negative { color: var(--danger); }

    /* Next month preview rows (not tappable) */
    .next-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .next-row:last-child { border-bottom: none; }
    .next-row-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .next-row-icon {
      width: 34px; height: 34px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .next-row-name {
      font-weight: 600; font-size: 13px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .next-row-sub { font-size: 10px; color: var(--text-3); margin-top: 2px; }
    .next-row-amount {
      font-family: 'Sora', sans-serif;
      font-weight: 700; font-size: 13px; color: var(--brand);
      flex-shrink: 0; white-space: nowrap;
    }
    .next-section-header {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 12px 0 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2px;
    }
    .next-total-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0 4px;
      gap: 8px;
    }
    .next-total-label {
      font-family: 'Sora', sans-serif;
      font-size: 14px; font-weight: 700; color: var(--text);
    }
    .next-total-value {
      font-family: 'Sora', sans-serif;
      font-size: 18px; font-weight: 800; color: var(--brand);
    }

    /* Top categories */
    .category-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .category-item:last-child { border-bottom: none; }
    .category-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
    .category-icon {
      width: 34px; height: 34px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0;
    }
    .category-info { flex: 1; min-width: 0; }
    .category-name {
      font-weight: 600; font-size: 13px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .category-budget { font-size: 10px; color: var(--text-3); margin-top: 2px; }
    .category-amount {
      font-weight: 700; font-size: 13px; color: var(--brand);
      flex-shrink: 0; white-space: nowrap;
    }
    .progress-bar { height: 3px; background: var(--border); border-radius: 3px; margin-top: 4px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; }
    .progress-fill.ok      { background: var(--success); }
    .progress-fill.warning { background: var(--warning); }
    .progress-fill.over    { background: var(--danger); }

    .section-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
    }
    .section-header h3 { font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); }
    .section-link { font-size: 12px; font-weight: 600; color: var(--brand); background: none; border: none; cursor: pointer; }

    /* Quick actions */
    .quick-actions {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; margin-top: 20px; margin-bottom: 20px;
    }
    .quick-btn {
      border: none; border-radius: var(--radius-sm); padding: 14px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.15s; box-shadow: var(--shadow-sm);
    }
    .quick-btn:active { transform: scale(0.96); }
    .quick-btn.income  { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: #fff; }
    .quick-btn.expense { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: #fff; }

    /* Loading overlay */
    .loading-overlay {
      position: fixed; inset: 0; background: rgba(91,94,244,0.18);
      backdrop-filter: blur(4px); z-index: 9000;
      display: flex; align-items: center; justify-content: center;
    }

    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Trend styles */
    .trend-up   { color: #bbf7d0; }
    .trend-down { color: #fecaca; }
    .kpi-trend  { font-size: 11px; margin-top: 8px; }
    .trend-badge {
      display: inline-block; background: rgba(0,0,0,0.35);
      padding: 4px 10px; border-radius: 20px; font-weight: 600;
    }

    /* Detail modal list items */
    .detail-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 0; border-bottom: 1px solid var(--border);
    }
    .detail-item:last-child { border-bottom: none; }
    .detail-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0;
    }
    .detail-info { flex: 1; min-width: 0; }
    .detail-name { font-weight: 600; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .detail-sub  { font-size: 10px; color: var(--text-3); margin-top: 2px; }
    .detail-amt  { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 14px; color: var(--brand); flex-shrink: 0; white-space: nowrap; }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <p>Loading dashboard...</p>
  </div>
</div>

<div class="container" id="mainApp" style="display:none">

  <!-- Header -->
  <div class="header">
    <h1>📊 Dashboard</h1>
    <div class="header-actions">
      <button class="hdr-icon-btn" id="syncBtn" title="Sync">↻</button>
      <button class="hdr-icon-btn" onclick="window.location.href='Settings.html'" title="Settings">⚙️</button>
      <button class="hdr-icon-btn danger" onclick="logout()" title="Logout">⏻</button>
    </div>
  </div>

  <!-- Month / Year Filter -->
  <div class="dash-filter">
    <select id="dashMonthSelect"></select>
    <select id="dashYearSelect"></select>
  </div>

  <!-- KPI Row -->
  <div class="kpi-row-2">
    <div class="kpi-card-primary income-card">
      <div class="kpi-card-top">
        <div class="kpi-label" id="kpiIncomeLabel">Income</div>
      </div>
      <div class="kpi-value" id="totalIncome">EGP 0</div>
      <div class="kpi-trend" id="incomeTrend"></div>
    </div>
    <div class="kpi-card-primary expense-card">
      <div class="kpi-card-top">
        <div class="kpi-label" id="kpiExpensesLabel">Expenses</div>
      </div>
      <div class="kpi-value" id="totalExpenses">EGP 0</div>
      <div class="kpi-trend" id="expensesTrend"></div>
    </div>
  </div>

  <!-- Expenses Breakdown -->
  <div class="breakdown-section">
    <div class="breakdown-title">Expenses Breakdown</div>
    <div class="kpi-row-3">
      <div class="kpi-card-secondary" style="border-color:#3b82f6;background:#3b82f6;">
        <div class="kpi-card-top"><div class="kpi-label">Daily</div></div>
        <div class="kpi-value" id="dailyExpenses">EGP 0</div>
      </div>
      <div class="kpi-card-secondary" style="border-color:#f59e0b;background:#f59e0b;">
        <div class="kpi-card-top"><div class="kpi-label">Recurring</div></div>
        <div class="kpi-value" id="recurringExpenses">EGP 0</div>
      </div>
      <div class="kpi-card-secondary" style="border-color:#06b6d4;background:#06b6d4;">
        <div class="kpi-card-top"><div class="kpi-label">Installments</div></div>
        <div class="kpi-value" id="installmentsExpenses">EGP 0</div>
      </div>
    </div>
  </div>

  <!-- Net Cash -->
  <div class="net-card">
    <div>
      <div class="net-label">Net Cash Flow</div>
      <div class="net-value" id="netCashFlow">EGP 0</div>
    </div>
    <div class="net-badge" id="netBadge">vs last month</div>
  </div>

  <!-- Chart Card — independent year filter, unaffected by top filter -->
  <div class="card">
    <div class="card-title" style="justify-content:space-between;">
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="card-title-icon">📈</span>
        <span>Monthly Breakdown</span>
      </div>
      <select id="chartYearSelect" style="width:auto;padding:6px 12px;font-size:13px;border-radius:20px;">
        <option value="2026">2026</option>
        <option value="2027">2027</option>
        <option value="2028">2028</option>
        <option value="2029">2029</option>
        <option value="2030">2030</option>
      </select>
    </div>
    <div class="chart-container">
      <canvas id="trendChart"></canvas>
    </div>
    <div class="chart-filters" id="chartLegend"></div>
  </div>

  <!-- Monthly Summary + Next Month tabbed card -->
  <div class="card" style="padding-top:0;overflow:hidden;">
    <div class="summary-tab-bar">
      <button class="summary-tab-btn active" id="stab1" onclick="switchSummaryTab('selected')">📅 <span id="summaryTabLabel">This Month</span></button>
      <button class="summary-tab-btn" id="stab2" onclick="switchSummaryTab('next')">➡️ <span id="nextTabLabel">Next Month</span></button>
    </div>

    <!-- Selected Month Tab -->
    <div id="summarySelectedTab" style="padding:16px 0 4px;">
      <!-- rows injected by renderMonthlySummary() -->
      <div id="summaryRows"></div>
      <!-- Net cash -->
      <div class="summ-net-row">
        <div class="summ-net-label">💵 Net Cash Flow</div>
        <div class="summ-net-value" id="summaryNetCash">EGP 0</div>
      </div>
    </div>

    <!-- Next Month Tab (hidden by default) -->
    <div id="summaryNextTab" style="display:none;padding:16px 0 4px;">
      <div id="nextMonthRows"></div>
      <div class="next-total-row">
        <div class="next-total-label">📊 Total Due</div>
        <div class="next-total-value" id="nextMonthTotal">EGP 0</div>
      </div>
    </div>
  </div>

  <!-- Top Spending Categories -->
  <div class="card">
    <div class="section-header">
      <h3>🔝 Top Spending Categories</h3>
      <button class="section-link" id="manageCategoriesBtn">Manage →</button>
    </div>
    <div id="topCategoriesList"></div>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <button class="quick-btn income" id="addIncomeBtn">💰 Add Income</button>
    <button class="quick-btn expense" id="addExpenseBtn">➕ Add Expense</button>
  </div>

</div>

<div id="bottomNavMount"></div>
<div class="toast" id="toast"></div>

<!-- Add Expense Modal -->
<div class="modal-backdrop" id="expenseModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">➕ Add Expense</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="required">Date</label>
        <input type="date" id="expenseDate" required>
      </div>
      <div class="form-group">
        <label class="required">Category</label>
        <select id="expenseCategory" required>
          <option value="" disabled selected>Select…</option>
        </select>
      </div>
      <div class="form-group">
        <label class="required">Amount (EGP)</label>
        <div class="amount-wrap">
          <span class="currency-flag">🇪🇬</span>
          <input type="number" id="expenseAmount" placeholder="0.00" step="0.01" min="0.01" inputmode="decimal" required>
        </div>
      </div>
      <div class="form-group">
        <label>Notes <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input type="text" id="expenseNotes" placeholder="e.g. lunch with team">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeExpenseModal()">Cancel</button>
      <button class="btn-save" onclick="saveExpense()">Add Expense</button>
    </div>
  </div>
</div>

<!-- Add Income Modal -->
<div class="modal-backdrop" id="incomeModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">💰 Add Income</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="required">Date</label>
        <input type="date" id="incomeDate" required>
      </div>
      <div class="form-group">
        <label class="required">Category</label>
        <select id="incomeCategory" required>
          <option value="" disabled selected>Select…</option>
        </select>
      </div>
      <div class="form-group">
        <label class="required">Amount (EGP)</label>
        <div class="amount-wrap">
          <span class="currency-flag">🇪🇬</span>
          <input type="number" id="incomeAmount" placeholder="0.00" step="0.01" min="0.01" inputmode="decimal" required>
        </div>
      </div>
      <div class="form-group">
        <label>Notes <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input type="text" id="incomeNotes" placeholder="e.g. monthly salary">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeIncomeModal()">Cancel</button>
      <button class="btn-save" onclick="saveIncome()">Add Income</button>
    </div>
  </div>
</div>

<!-- Detail Modal (read-only, reused for all 4 summary rows) -->
<div class="modal-backdrop" id="detailModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="detailModalTitle">Details</div>
    <div id="detailModalBody"></div>
    <div class="modal-footer">
      <button class="btn-save" onclick="closeDetailModal()">Done</button>
    </div>
  </div>
</div>

<script>
// ======================== STATE ==========================
let expenses      = [];
let incomes       = [];
let spreadsheetId = null;
let currentUserEmail   = null;
let currentAccessToken = null;
let trendChart    = null;

// Cached sheet data (loaded once per refresh)
let _recurringLogs    = [];
let _installmentLogs  = [];
let _recurringPlans   = [];   // for next-month preview
let _installmentPlans = [];   // for next-month preview

// Summary tab state
let activeSummaryTab = 'selected';

const CHART_COLORS = {
  income: '#10b981', daily: '#3b82f6',
  recurring: '#f59e0b', installments: '#06b6d4', total: '#ef4444'
};

// ======================== FILTER HELPERS =================
function getSelectedMonthYear() {
  const mEl = document.getElementById('dashMonthSelect');
  const yEl = document.getElementById('dashYearSelect');
  if (mEl && yEl && mEl.value !== '' && yEl.value !== '') {
    return { year: parseInt(yEl.value), month: parseInt(mEl.value) };
  }
  const now = new Date();
  return { year: now.getFullYear(), month: now.getMonth() };
}

function getNextMonthYear() {
  const { year, month } = getSelectedMonthYear();
  const next = new Date(year, month + 1, 1);
  return { year: next.getFullYear(), month: next.getMonth() };
}

function populateDashFilter() {
  const monthSel = document.getElementById('dashMonthSelect');
  const yearSel  = document.getElementById('dashYearSelect');
  const now = new Date();
  MONTHS_FULL.forEach((name, i) => {
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = name;
    if (i === now.getMonth()) opt.selected = true;
    monthSel.appendChild(opt);
  });
  const currYear = now.getFullYear();
  for (let y = currYear - 2; y <= currYear + 2; y++) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    if (y === currYear) opt.selected = true;
    yearSel.appendChild(opt);
  }
  monthSel.addEventListener('change', onFilterChange);
  yearSel.addEventListener('change',  onFilterChange);
}

async function onFilterChange() {
  updateSummaryTabLabels();
  await renderKPI();
  await renderMonthlySummary();
  await renderNextMonth();
  renderTopCategories();
}

function updateSummaryTabLabels() {
  const { year, month } = getSelectedMonthYear();
  const { year: ny, month: nm } = getNextMonthYear();
  document.getElementById('summaryTabLabel').textContent = MONTHS_SHORT[month] + ' ' + year;
  document.getElementById('nextTabLabel').textContent    = MONTHS_SHORT[nm]   + ' ' + ny;
}

// ======================== DATA HELPERS ===================
function parseLocalDate(str) {
  if (!str) return new Date();
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

// Returns daily expenses for selected month
function getSelectedMonthDailyExpenses() {
  const { year, month } = getSelectedMonthYear();
  return expenses.filter(e => {
    const d = parseLocalDate(e.date);
    return d.getMonth() === month && d.getFullYear() === year;
  });
}

// Returns income entries for selected month
function getSelectedMonthIncomes() {
  const { year, month } = getSelectedMonthYear();
  return incomes.filter(i => {
    const d = parseLocalDate(i.date);
    return d.getMonth() === month && d.getFullYear() === year;
  });
}

// Sum recurring log for a given year+month
function sumRecurringForMonth(year, month) {
  let total = 0;
  _recurringLogs.forEach(r => {
    if (r[1]) {
      const d = parseLocalDate(r[1]);
      if (d.getMonth() === month && d.getFullYear() === year) total += parseFloat(r[4]) || 0;
    }
  });
  return total;
}

// Sum installment log for a given year+month
function sumInstallmentsForMonth(year, month) {
  let total = 0;
  _installmentLogs.forEach(r => {
    if (r[2]) {
      const d = parseLocalDate(r[2]);
      if (d.getMonth() === month && d.getFullYear() === year) total += parseFloat(r[3]) || 0;
    }
  });
  return total;
}

// Get recurring log entries for a given year+month
function getRecurringLogEntries(year, month) {
  return _recurringLogs.filter(r => {
    if (!r[1]) return false;
    const d = parseLocalDate(r[1]);
    return d.getMonth() === month && d.getFullYear() === year;
  });
}

// Get installment log entries for a given year+month
function getInstallmentLogEntries(year, month) {
  return _installmentLogs.filter(r => {
    if (!r[2]) return false;
    const d = parseLocalDate(r[2]);
    return d.getMonth() === month && d.getFullYear() === year;
  });
}

// Previous month relative to selected
function getPrevMonthTotalExpenses() {
  const { year, month } = getSelectedMonthYear();
  const prev = new Date(year, month - 1, 1);
  const py = prev.getFullYear(), pm = prev.getMonth();
  const daily = expenses.filter(e => {
    const d = parseLocalDate(e.date);
    return d.getMonth() === pm && d.getFullYear() === py;
  }).reduce((s, e) => s + e.amount, 0);
  return daily + sumRecurringForMonth(py, pm) + sumInstallmentsForMonth(py, pm);
}

function getPrevMonthIncome() {
  const { year, month } = getSelectedMonthYear();
  const prev = new Date(year, month - 1, 1);
  const py = prev.getFullYear(), pm = prev.getMonth();
  return incomes.filter(i => {
    const d = parseLocalDate(i.date);
    return d.getMonth() === pm && d.getFullYear() === py;
  }).reduce((s, i) => s + i.amount, 0);
}

// ======================== LOAD SHEET DATA ================
async function loadAllSheetData() {
  if (!spreadsheetId) return;
  try {
    const [expRes, incRes, recRes, instRes, recPlanRes, instPlanRes] = await Promise.all([
      gapi.client.sheets.spreadsheets.values.get({ spreadsheetId, range: 'Daily Log!A2:F' }),
      gapi.client.sheets.spreadsheets.values.get({ spreadsheetId, range: `${INCOME_LOG_SHEET}!A2:F` }),
      gapi.client.sheets.spreadsheets.values.get({ spreadsheetId, range: `${RECURRING_LOG_SHEET}!A2:G` }),
      gapi.client.sheets.spreadsheets.values.get({ spreadsheetId, range: `${INSTALLMENTS_LOG_SHEET}!A2:E` }),
      gapi.client.sheets.spreadsheets.values.get({ spreadsheetId, range: `${RECURRING_SHEET}!A2:I` }),
      gapi.client.sheets.spreadsheets.values.get({ spreadsheetId, range: `${INSTALLMENTS_SHEET}!A2:H` }),
    ]);

    expenses = (expRes.result.values || []).filter(r => r[2] && r[3]).map((r, i) => ({
      id: (r[5] && !isNaN(parseInt(r[5]))) ? parseInt(r[5]) : -(i+1),
      date: r[1] || r[0], category: r[2],
      amount: parseFloat(r[3]), notes: r[4] || '',
      timestamp: r[0] || new Date().toISOString()
    }));

    incomes = (incRes.result.values || []).filter(r => r[2] && r[3]).map((r, i) => ({
      id: (r[5] && !isNaN(parseInt(r[5]))) ? parseInt(r[5]) : -(i+1),
      date: r[1] || r[0], category: r[2],
      amount: parseFloat(r[3]), notes: r[4] || '',
      timestamp: r[0] || new Date().toISOString()
    }));

    _recurringLogs    = recRes.result.values  || [];
    _installmentLogs  = instRes.result.values || [];

    // Parse recurring plans (for next month preview)
    _recurringPlans = (recPlanRes.result.values || []).map(r => ({
      id: r[0], name: r[1] || '', category: r[2] || 'Other',
      frequency: r[3] || 'Monthly', amount: parseFloat(r[4]) || 0,
      startMonth: parseInt(r[5]) || 1, paymentDay: parseInt(r[6]) || 1,
      startYear: parseInt(r[7]) || new Date().getFullYear(),
      active: r[8] === 'true'
    })).filter(s => s.name && s.active);

    // Parse installment plans (for next month preview)
    _installmentPlans = (instPlanRes.result.values || []).map(r => {
      if (!r || r.length < 8) return null;
      return {
        id: r[0], itemName: r[1], bankKey: r[2],
        totalAmount: parseFloat(r[3]), monthsCount: parseInt(r[4]),
        startYear: parseInt(r[5]), startMonth: parseInt(r[6]),
        monthlyAmount: parseFloat(r[7])
      };
    }).filter(Boolean);

  } catch (e) { console.error('loadAllSheetData error', e); }
}

// ======================== RENDER KPI =====================
async function renderKPI() {
  const { year, month } = getSelectedMonthYear();
  const label = MONTHS_SHORT[month] + ' ' + year;
  document.getElementById('kpiIncomeLabel').textContent   = label + ' Income';
  document.getElementById('kpiExpensesLabel').textContent = label + ' Expenses';

  const dailyList    = getSelectedMonthDailyExpenses();
  const dailyTotal   = dailyList.reduce((s, e) => s + e.amount, 0);
  const recurringTotal     = sumRecurringForMonth(year, month);
  const installmentsTotal  = sumInstallmentsForMonth(year, month);
  const incomeList   = getSelectedMonthIncomes();
  const incomeTotal  = incomeList.reduce((s, i) => s + i.amount, 0);
  const totalExpenses = dailyTotal + recurringTotal + installmentsTotal;
  const netCash = incomeTotal - totalExpenses;

  document.getElementById('totalIncome').textContent        = formatMoney(incomeTotal);
  document.getElementById('totalExpenses').textContent      = formatMoney(totalExpenses);
  document.getElementById('dailyExpenses').textContent      = formatMoney(dailyTotal);
  document.getElementById('recurringExpenses').textContent  = formatMoney(recurringTotal);
  document.getElementById('installmentsExpenses').textContent = formatMoney(installmentsTotal);

  const netEl = document.getElementById('netCashFlow');
  netEl.textContent = netCash >= 0 ? formatMoney(netCash) : `-${formatMoney(Math.abs(netCash))}`;
  netEl.className = netCash >= 0 ? 'net-value positive' : 'net-value negative';

  const savingsRate = incomeTotal > 0 ? ((netCash / incomeTotal) * 100).toFixed(0) : 0;
  document.getElementById('netBadge').innerHTML = `${savingsRate}% saved`;

  // Trends vs previous month
  const prevIncome   = getPrevMonthIncome();
  const prevExpenses = getPrevMonthTotalExpenses();

  const incomeTrendEl = document.getElementById('incomeTrend');
  if (prevIncome > 0) {
    const pct = ((incomeTotal - prevIncome) / prevIncome * 100).toFixed(0);
    incomeTrendEl.innerHTML = pct >= 0
      ? `<span class="trend-badge"><span class="trend-up">▲ ${pct}% vs prev month</span></span>`
      : `<span class="trend-badge"><span class="trend-down">▼ ${Math.abs(pct)}% vs prev month</span></span>`;
  } else {
    incomeTrendEl.innerHTML = '<span class="trend-badge"><span class="trend-up">▲ New</span></span>';
  }

  const expensesTrendEl = document.getElementById('expensesTrend');
  if (prevExpenses > 0) {
    const pct = ((totalExpenses - prevExpenses) / prevExpenses * 100).toFixed(0);
    expensesTrendEl.innerHTML = pct <= 0
      ? `<span class="trend-badge"><span class="trend-down">▼ ${Math.abs(pct)}% vs prev month</span></span>`
      : `<span class="trend-badge"><span class="trend-up">▲ ${pct}% vs prev month</span></span>`;
  } else {
    expensesTrendEl.innerHTML = '<span class="trend-badge"><span class="trend-down">▼ New</span></span>';
  }
}

// ======================== MONTHLY SUMMARY CARD ===========

  const { year, month } = getSelectedMonthYear();

  const dailyList    = getSelectedMonthDailyExpenses();
  const dailyTotal   = dailyList.reduce((s, e) => s + e.amount, 0);
  const recurringTotal    = sumRecurringForMonth(year, month);
  const installmentsTotal = sumInstallmentsForMonth(year, month);
  const incomeList   = getSelectedMonthIncomes();
  const incomeTotal  = incomeList.reduce((s, i) => s + i.amount, 0);
  const totalExpenses = dailyTotal + recurringTotal + installmentsTotal;

  const rows = [
    {
      icon: '💰', bg: '#d1fae5', label: 'Total Income',
      sub: `${incomeList.length} ${incomeList.length === 1 ? 'entry' : 'entries'}`,

    },
    {
      icon: '📋', bg: '#dbeafe', label: 'Daily Expenses',

    },
    {

          <div class="summ-row-sub">${r.sub} · tap for details</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">

  netEl.className = netCash >= 0 ? 'summ-net-value positive' : 'summ-net-value negative';

// ======================== DETAIL MODAL ===================
function openDetailModal(type, year, month) {
  const titles = {
    income: '💰 Income Details',
    daily: '📋 Daily Expenses',
    recurring: '🔄 Recurring Paid',
    installments: '📆 Installments Paid'
  };
  document.getElementById('detailModalTitle').textContent = titles[type] || 'Details';

  let html = '';

  if (type === 'income') {
    const entries = getSelectedMonthIncomes().sort((a,b) => parseLocalDate(b.date) - parseLocalDate(a.date));
    if (!entries.length) {
      html = '<div class="empty-state"><p>No income entries for this period</p></div>';
    } else {
      html = entries.map(e => {
        const icon = getCategoryIcon(e.category);
        const bg   = getCategoryColor(e.category);
        return `<div class="detail-item">
          <div class="detail-icon" style="background:${bg}">${icon}</div>
          <div class="detail-info">
            <div class="detail-name">${escapeHtml(e.category)}</div>
            <div class="detail-sub">${formatDate(e.date)}${e.notes ? ' · ' + escapeHtml(e.notes) : ''}</div>
          </div>
          <div class="detail-amt">${formatMoney(e.amount)}</div>
        </div>`;
      }).join('');
    }
  }

  else if (type === 'daily') {
    const entries = getSelectedMonthDailyExpenses().sort((a,b) => parseLocalDate(b.date) - parseLocalDate(a.date));
    if (!entries.length) {
      html = '<div class="empty-state"><p>No expenses for this period</p></div>';
    } else {
      html = entries.map(e => {
        const icon = getCategoryIcon(e.category);
        const bg   = getCategoryColor(e.category);
        return `<div class="detail-item">
          <div class="detail-icon" style="background:${bg}">${icon}</div>
          <div class="detail-info">
            <div class="detail-name">${escapeHtml(e.category)}</div>
            <div class="detail-sub">${formatDate(e.date)}${e.notes ? ' · ' + escapeHtml(e.notes) : ''}</div>
          </div>
          <div class="detail-amt">${formatMoney(e.amount)}</div>
        </div>`;
      }).join('');
    }
  }

  else if (type === 'recurring') {
    const entries = getRecurringLogEntries(year, month);
    if (!entries.length) {
      html = '<div class="empty-state"><p>No recurring payments logged for this period</p></div>';
    } else {
      html = entries.map(r => {
        const icon = getRecurringCategoryIcon(r[3] || 'Other');
        return `<div class="detail-item">
          <div class="detail-icon" style="background:#fef3c7">${icon}</div>
          <div class="detail-info">
            <div class="detail-name">${escapeHtml(r[2] || '—')}</div>
            <div class="detail-sub">${r[1] ? formatDate(r[1]) : ''}${r[3] ? ' · ' + escapeHtml(r[3]) : ''}</div>
          </div>
          <div class="detail-amt">${formatMoney(parseFloat(r[4]) || 0)}</div>
        </div>`;
      }).join('');
    }
  }

  else if (type === 'installments') {
    const entries = getInstallmentLogEntries(year, month);
    if (!entries.length) {
      html = '<div class="empty-state"><p>No installment payments logged for this period</p></div>';
    } else {
      html = entries.map(r => {
        // Find plan name
        const plan = _installmentPlans.find(p => p.id === r[1]);
        const name = plan ? plan.itemName : (r[1] || '—');
        return `<div class="detail-item">
          <div class="detail-icon" style="background:#e0e7ff">📆</div>
          <div class="detail-info">
            <div class="detail-name">${escapeHtml(name)}</div>
            <div class="detail-sub">${r[2] ? formatDate(r[2]) : ''}${r[4] ? ' · ' + escapeHtml(r[4]) : ''}</div>
          </div>
          <div class="detail-amt">${formatMoney(parseFloat(r[3]) || 0)}</div>
        </div>`;
      }).join('');
    }
  }

  document.getElementById('detailModalBody').innerHTML = html;
  document.getElementById('detailModal').classList.add('open');
}

function closeDetailModal() {
  document.getElementById('detailModal').classList.remove('open');
}

// ======================== NEXT MONTH PREVIEW =============
async function renderNextMonth() {
  const { year, month } = getNextMonthYear();

  // ── Recurring due next month ──
  const recurringDue = _recurringPlans.filter(sub => {
    if (sub.frequency === 'Monthly')   return sub.startMonth <= (month + 1);
    if (sub.frequency === 'Quarterly') {
      const diff = (year - (sub.startYear || year)) * 12 + month - (sub.startMonth - 1);
      return diff >= 0 && diff % 3 === 0;
    }
    if (sub.frequency === 'Annual') return sub.startMonth === (month + 1);
    return false;
  });

  // ── Installments due next month ──
  const installmentsDue = _installmentPlans.filter(inst => {
    const startDate = new Date(inst.startYear, inst.startMonth - 1, 1);
    const endDate   = new Date(inst.startYear, inst.startMonth - 1 + inst.monthsCount, 1);
    const checkDate = new Date(year, month, 1);
    return checkDate >= startDate && checkDate < endDate;
  });

  const recurringTotal    = recurringDue.reduce((s, r) => s + r.amount, 0);
  const installmentsTotal = installmentsDue.reduce((s, i) => s + i.monthlyAmount, 0);
  const grandTotal        = recurringTotal + installmentsTotal;

  let html = '';

  // Recurring section
  html += `<div class="next-section-header">🔄 Recurring — ${formatMoney(recurringTotal)}</div>`;
  if (!recurringDue.length) {
    html += `<div style="padding:10px 0;font-size:13px;color:var(--text-3)">No recurring due</div>`;
  } else {
    html += recurringDue.map(sub => {
      const icon = getRecurringCategoryIcon(sub.category);
      return `<div class="next-row">
        <div class="next-row-left">
          <div class="next-row-icon" style="background:#fef3c7">${icon}</div>
          <div>
            <div class="next-row-name">${escapeHtml(sub.name)}</div>
            <div class="next-row-sub">${sub.frequency} · Day ${sub.paymentDay}</div>
          </div>
        </div>
        <div class="next-row-amount">${formatMoney(sub.amount)}</div>
      </div>`;
    }).join('');
  }

  // Installments section
  html += `<div class="next-section-header" style="margin-top:8px">📆 Installments — ${formatMoney(installmentsTotal)}</div>`;
  if (!installmentsDue.length) {
    html += `<div style="padding:10px 0;font-size:13px;color:var(--text-3)">No installments due</div>`;
  } else {
    html += installmentsDue.map(inst => {
      const bank = BANK_PROVIDERS.find(b => b.key === inst.bankKey);
      const bankName = bank ? bank.name : inst.bankKey;
      // How many months paid
      const paidCount = _installmentLogs.filter(l => l[1] === inst.id).length;
      const remaining = inst.monthsCount - paidCount;
      return `<div class="next-row">
        <div class="next-row-left">
          <div class="next-row-icon" style="background:#e0e7ff">📆</div>
          <div>
            <div class="next-row-name">${escapeHtml(inst.itemName)}</div>
            <div class="next-row-sub">${escapeHtml(bankName)} · ${remaining} months left</div>
          </div>
        </div>
        <div class="next-row-amount">${formatMoney(inst.monthlyAmount)}</div>
      </div>`;
    }).join('');
  }

  document.getElementById('nextMonthRows').innerHTML = html;
  document.getElementById('nextMonthTotal').textContent = formatMoney(grandTotal);
}

// ======================== SUMMARY TAB SWITCH =============
function switchSummaryTab(tab) {
  activeSummaryTab = tab;
  document.getElementById('stab1').classList.toggle('active', tab === 'selected');
  document.getElementById('stab2').classList.toggle('active', tab === 'next');
  document.getElementById('summarySelectedTab').style.display = tab === 'selected' ? 'block' : 'none';
  document.getElementById('summaryNextTab').style.display     = tab === 'next'     ? 'block' : 'none';
}

// ======================== CHART ==========================
async function getMonthlyData(year = null) {
  if (!year) year = new Date().getFullYear();
  const currentDate  = new Date();
  const currentYear  = currentDate.getFullYear();
  const currentMonth = currentDate.getMonth();

  const labels = [], incomeData = [], dailyData = [], recurringData = [], installmentsData = [];

  for (let month = 0; month < 12; month++) {
    const isFutureMonth = (year > currentYear) || (year === currentYear && month > currentMonth);
    labels.push(MONTHS_SHORT[month]);

    const monthIncome = incomes.filter(inc => {
      const d = parseLocalDate(inc.date);
      return d.getMonth() === month && d.getFullYear() === year;
    }).reduce((sum, inc) => sum + inc.amount, 0);
    incomeData.push(isFutureMonth ? null : monthIncome);

    const monthDaily = expenses.filter(exp => {
      const d = parseLocalDate(exp.date);
      return d.getMonth() === month && d.getFullYear() === year;
    }).reduce((sum, exp) => sum + exp.amount, 0);
    dailyData.push(isFutureMonth ? null : monthDaily);

    let monthRecurring = 0;
    _recurringLogs.forEach(log => {
      if (log[1]) {
        const d = parseLocalDate(log[1]);
        if (d.getMonth() === month && d.getFullYear() === year) monthRecurring += parseFloat(log[4]) || 0;
      }
    });
    recurringData.push(isFutureMonth ? null : monthRecurring);

    let monthInstallments = 0;
    _installmentLogs.forEach(log => {
      if (log[2]) {
        const d = parseLocalDate(log[2]);
        if (d.getMonth() === month && d.getFullYear() === year) monthInstallments += parseFloat(log[3]) || 0;
      }
    });
    installmentsData.push(isFutureMonth ? null : monthInstallments);
  }

  return { labels, incomeData, dailyData, recurringData, installmentsData };
}

async function renderChart() {
  const yearSelect   = document.getElementById('chartYearSelect');
  const selectedYear = parseInt(yearSelect.value);
  const { labels, incomeData, dailyData, recurringData, installmentsData } = await getMonthlyData(selectedYear);

  if (trendChart) trendChart.destroy();

  const totalExpensesData = dailyData.map((v, i) =>
    v !== null && recurringData[i] !== null && installmentsData[i] !== null
      ? v + recurringData[i] + installmentsData[i] : null
  );

  const showIncome       = document.getElementById('showIncome')?.checked       ?? true;
  const showTotalExpenses= document.getElementById('showTotalExpenses')?.checked ?? true;
  const showDaily        = document.getElementById('showDaily')?.checked         ?? true;
  const showRecurring    = document.getElementById('showRecurring')?.checked     ?? true;
  const showInstallments = document.getElementById('showInstallments')?.checked  ?? true;

  const datasets = [];
  if (showIncome) datasets.push({ label:'Income', data:incomeData, borderColor:CHART_COLORS.income, backgroundColor:'rgba(16,185,129,0.10)', borderWidth:2.5, tension:0.4, fill:true, pointBackgroundColor:CHART_COLORS.income, pointRadius:3, pointHoverRadius:6, spanGaps:false });
  if (showTotalExpenses) datasets.push({ label:'Total Expenses', data:totalExpensesData, borderColor:'#ef4444', backgroundColor:'rgba(239,68,68,0.08)', borderWidth:2.5, tension:0.4, fill:true, pointBackgroundColor:'#ef4444', pointRadius:3, pointHoverRadius:6, spanGaps:false });
  if (showDaily) datasets.push({ label:'Daily Expenses', data:dailyData, borderColor:CHART_COLORS.daily, backgroundColor:'rgba(59,130,246,0.05)', borderWidth:2, tension:0.4, fill:false, pointBackgroundColor:CHART_COLORS.daily, pointRadius:2, pointHoverRadius:5, spanGaps:false, borderDash:[5,5] });
  if (showRecurring) datasets.push({ label:'Recurring Expenses', data:recurringData, borderColor:CHART_COLORS.recurring, backgroundColor:'rgba(245,158,11,0.05)', borderWidth:2, tension:0.4, fill:false, pointBackgroundColor:CHART_COLORS.recurring, pointRadius:2, pointHoverRadius:5, spanGaps:false, borderDash:[5,5] });
  if (showInstallments) datasets.push({ label:'Installments', data:installmentsData, borderColor:CHART_COLORS.installments, backgroundColor:'rgba(139,92,246,0.05)', borderWidth:2, tension:0.4, fill:false, pointBackgroundColor:CHART_COLORS.installments, pointRadius:2, pointHoverRadius:5, spanGaps:false, borderDash:[5,5] });

  const ctx = document.getElementById('trendChart').getContext('2d');
  trendChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.raw !== null ? formatMoney(ctx.raw) : 'No data'}` } }
      },
      scales: {
        x: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { font: { size: 11 } } },
        y: { beginAtZero: true, grid: { color: '#e8e8f0' }, ticks: { callback: (v) => 'EGP ' + v.toLocaleString(), font: { size: 11 } } }
      }
    }
  });

  const FILTERS = [
    { key:'Income',             color:CHART_COLORS.income,       label:'Income' },
    { key:'Total Expenses',     color:CHART_COLORS.total,        label:'Total Expenses' },
    { key:'Daily Expenses',     color:CHART_COLORS.daily,        label:'Daily' },
    { key:'Recurring Expenses', color:CHART_COLORS.recurring,    label:'Recurring' },
    { key:'Installments',       color:CHART_COLORS.installments, label:'Installments' },
  ];
  const legendEl = document.getElementById('chartLegend');
  legendEl.innerHTML = FILTERS.map(f => `
    <div class="filter-pill active" data-label="${f.key}" style="background:${f.color}22;border-color:${f.color};color:${f.color};">
      <div class="filter-pill-dot" style="background:${f.color}"></div>${f.label}
    </div>`).join('');
  legendEl.querySelectorAll('.filter-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      const label = pill.dataset.label;
      const dsIndex = trendChart.data.datasets.findIndex(d => d.label === label);
      if (dsIndex === -1) return;
      const isActive = pill.classList.toggle('active');
      trendChart.setDatasetVisibility(dsIndex, isActive);
      trendChart.update();
    });
  });
}

// ======================== TOP CATEGORIES =================
function renderTopCategories() {
  const currentExpenses = getSelectedMonthDailyExpenses();
  const categoryTotals  = {};
  currentExpenses.forEach(e => {
    categoryTotals[e.category] = (categoryTotals[e.category] || 0) + e.amount;
  });
  const topCategories = Object.entries(categoryTotals).sort((a,b) => b[1]-a[1]).slice(0, 5);
  const container = document.getElementById('topCategoriesList');
  if (!topCategories.length) {
    container.innerHTML = '<div class="empty-state">No expenses for this period</div>';
    return;
  }
  container.innerHTML = topCategories.map(([cat, amt]) => {
    const icon = getCategoryIcon(cat);
    const bg   = getCategoryColor(cat);
    const budget = getCategoryBudget(cat);
    let budgetHtml = '', progressClass = 'ok', pct = 0;
    if (budget && budget > 0) {
      pct = Math.min((amt / budget) * 100, 100);
      progressClass = pct >= 100 ? 'over' : pct >= 80 ? 'warning' : 'ok';
      budgetHtml = `<div class="progress-bar"><div class="progress-fill ${progressClass}" style="width:${pct}%"></div></div>`;
    }
    return `<div class="category-item">
      <div class="category-left">
        <div class="category-icon" style="background:${bg}">${icon}</div>
        <div class="category-info">
          <div class="category-name">${escapeHtml(cat)}</div>
          ${budget ? `<div class="category-budget">Budget: ${formatMoney(budget)}</div>` : ''}
          ${budgetHtml}
        </div>
      </div>
      <div class="category-amount">${formatMoney(amt)}</div>
    </div>`;
  }).join('');
}

// ======================== ADD EXPENSE ====================
async function saveExpense() {
  const date     = document.getElementById('expenseDate').value;
  const category = document.getElementById('expenseCategory').value;
  const amount   = parseFloat(document.getElementById('expenseAmount').value);
  const notes    = document.getElementById('expenseNotes').value.trim();
  if (!date)              { showToast('❌ Select date',     'error'); return; }
  if (!category)          { showToast('❌ Select category', 'error'); return; }
  if (!amount || amount <= 0) { showToast('❌ Enter valid amount', 'error'); return; }
  const newExpense = { id: await getNextExpenseId(), date, category, amount, notes: notes || '', timestamp: new Date().toISOString() };
  try {
    await gapi.client.sheets.spreadsheets.values.append({
      spreadsheetId, range: 'Daily Log!A2:F', valueInputOption: 'RAW',
      resource: { values: [[newExpense.timestamp, newExpense.date, newExpense.category, newExpense.amount, newExpense.notes, newExpense.id]] }
    });
    closeExpenseModal();
    await refreshAll();
    showToast('✅ Expense added!');
  } catch (e) { showToast('❌ Failed to save', 'error'); }
}

function buildExpenseCategorySelect() {
  const select = document.getElementById('expenseCategory');
  select.innerHTML = '<option value="" disabled selected>Select…</option>' +
    getExpenseCategories().map(c => `<option value="${c.value}">${c.icon} ${c.value}</option>`).join('');
}
function openExpenseModal() {
  document.getElementById('expenseDate').value   = new Date().toISOString().split('T')[0];
  document.getElementById('expenseAmount').value = '';
  document.getElementById('expenseNotes').value  = '';
  buildExpenseCategorySelect();
  document.getElementById('expenseModal').classList.add('open');
}

// ======================== ENSURE INCOME TAB ==============
async function ensureIncomeTab() {
  try {
    const meta = await gapi.client.sheets.spreadsheets.get({ spreadsheetId });
    const exists = meta.result.sheets.some(s => s.properties.title === INCOME_LOG_SHEET);
    if (!exists) {
      await gapi.client.sheets.spreadsheets.batchUpdate({ spreadsheetId, resource: { requests: [{ addSheet: { properties: { title: INCOME_LOG_SHEET } } }] } });
      await gapi.client.sheets.spreadsheets.values.update({ spreadsheetId, range: `${INCOME_LOG_SHEET}!A1:F1`, valueInputOption: 'RAW', resource: { values: [['Timestamp','Date','Category','Amount','Notes','ID']] } });
    }
  } catch (e) { console.warn(e); }
}

// ======================== INIT ===========================
async function initDashboard() {
  await initPageAuth({
    onLoadLocal: (email, sheetId) => {
      currentUserEmail = email;
      spreadsheetId    = sheetId;
      document.getElementById('loadingOverlay').style.display = 'flex';
    },
    onReady: async (sheetId, email, token) => {
      currentUserEmail   = email;
      spreadsheetId      = sheetId;
      currentAccessToken = token;
      populateDashFilter();
      updateSummaryTabLabels();
      await ensureCategoriesTab(spreadsheetId);
      await ensureIncomeTab();
      await refreshAll();
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
    }
  });
}
