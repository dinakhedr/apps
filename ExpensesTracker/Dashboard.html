<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <link rel="icon" type="image/png" sizes="180x180" href="icon.png">
  <link rel="shortcut icon" href="icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="utils.js"></script>
  <script src="auth.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    /* Dashboard specific styles */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .header h1 {
      font-family: 'Sora', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }

    /* First row KPI cards */
    .kpi-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .kpi-card-primary {
      border-radius: var(--radius-lg);
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .kpi-card-primary.income-card {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      box-shadow: 0 4px 20px rgba(16,185,129,0.3);
    }
    .kpi-card-primary.expense-card {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      box-shadow: 0 4px 20px rgba(239,68,68,0.3);
    }
    .kpi-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .kpi-label {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .kpi-value {
      font-family: 'Sora', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
    }

    /* Expenses breakdown section */
    .breakdown-section {
      margin-bottom: 20px;
    }
    .breakdown-title {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
      padding-left: 4px;
    }
    .kpi-row-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .kpi-card-secondary {
      background: rgba(239,68,68,0.18);
      backdrop-filter: blur(10px);
      border-radius: var(--radius-lg);
      padding: 14px 12px;
      border: 1px solid rgba(239,68,68,0.3);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .kpi-card-secondary .kpi-label {
      font-size: 10px;
      color: rgba(255,255,255,0.6);
    }
    .kpi-card-secondary .kpi-value {
      font-size: 18px;
      font-weight: 700;
    }

    /* Net Cash Card */
    .net-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.08) 100%);
      backdrop-filter: blur(10px);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .net-label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
    }
    .net-value {
      font-family: 'Sora', sans-serif;
      font-size: 24px;
      font-weight: 800;
    }
    .net-value.positive { color: #6ee7b7; }
    .net-value.negative { color: #fca5a5; }
    .net-badge {
      background: rgba(255,255,255,0.15);
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.8);
    }

    /* Chart container */
    .chart-container {
      position: relative;
      height: 260px;
      margin: 8px 0;
    }
    canvas {
      max-width: 100%;
    }
    .chart-legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 12px;
      font-size: 10px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
    }

    /* Top categories list */
    .category-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .category-item:last-child {
      border-bottom: none;
    }
    .category-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }
    .category-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .category-info {
      flex: 1;
    }
    .category-name {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
    }
    .category-budget {
      font-size: 10px;
      color: var(--text-3);
      margin-top: 2px;
    }
    .category-amount {
      font-weight: 700;
      font-size: 14px;
      color: var(--brand);
    }
    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 3px;
      margin-top: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 3px;
    }
    .progress-fill.ok { background: var(--success); }
    .progress-fill.warning { background: var(--warning); }
    .progress-fill.over { background: var(--danger); }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .section-header h3 {
      font-family: 'Sora', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }
    .section-link {
      font-size: 12px;
      font-weight: 600;
      color: var(--brand);
      background: none;
      border: none;
      cursor: pointer;
    }

    /* Quick Actions at bottom */
    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
      margin-bottom: 20px;
    }
    .quick-btn {
      border: none;
      border-radius: var(--radius-sm);
      padding: 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.15s;
      box-shadow: var(--shadow-sm);
    }
    .quick-btn:active {
      transform: scale(0.96);
    }
    .quick-btn.income {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: #fff;
    }
    .quick-btn.expense {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      color: #fff;
    }

    /* Loading overlay */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(91,94,244,0.18);
      backdrop-filter: blur(4px);
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Modal form styles */
    .modal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    
    /* Trend styles */
    .trend-up { color: #6ee7b7; }
    .trend-down { color: #fca5a5; }
    .kpi-trend { font-size: 11px; margin-top: 4px; }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <p>Loading dashboard...</p>
  </div>
</div>

<div class="container" id="mainApp" style="display:none">

  <!-- Header -->
  <div class="header">
    <h1>📊 Dashboard</h1>
    <div class="header-actions">
      <button class="hdr-icon-btn" id="syncBtn" title="Sync">↻</button>
      <button class="hdr-icon-btn" onclick="window.location.href='Settings.html'" title="Settings">⚙️</button>
      <button class="hdr-icon-btn danger" onclick="logout()" title="Logout">⏻</button>
    </div>
  </div>

  <!-- First Row: Total Income & Total Expenses -->
  <div class="kpi-row-2">
    <div class="kpi-card-primary income-card">
      <div class="kpi-card-top">
        <div class="kpi-label">Total Income</div>
      </div>
      <div class="kpi-value" id="totalIncome">EGP 0</div>
      <div class="kpi-trend" id="incomeTrend"></div>
    </div>
    <div class="kpi-card-primary expense-card">
      <div class="kpi-card-top">
        <div class="kpi-label">Total Expenses</div>
      </div>
      <div class="kpi-value" id="totalExpenses">EGP 0</div>
      <div class="kpi-trend" id="expensesTrend"></div>
    </div>
  </div>

  <!-- Expenses Breakdown Section -->
  <div class="breakdown-section">
    <div class="breakdown-title">Expenses Breakdown</div>
    <div class="kpi-row-3">
      <div class="kpi-card-secondary" style="border-color: #3b82f6; background: #3b82f6;">
        <div class="kpi-card-top">
          <div class="kpi-label">Daily</div>
        </div>
        <div class="kpi-value" id="dailyExpenses">EGP 0</div>
      </div>
      <div class="kpi-card-secondary" style="border-color: #f59e0b; background: #f59e0b;">
        <div class="kpi-card-top">
          <div class="kpi-label">Recurring</div>
        </div>
        <div class="kpi-value" id="recurringExpenses">EGP 0</div>
      </div>
      <div class="kpi-card-secondary" style="border-color: #06b6d4; background: #06b6d4;">
        <div class="kpi-card-top">
          <div class="kpi-label">Installments</div>
        </div>
        <div class="kpi-value" id="installmentsExpenses">EGP 0</div>
      </div>
    </div>
  </div>

  <!-- Net Cash Card -->
  <div class="net-card">
    <div>
      <div class="net-label">Net Cash Flow</div>
      <div class="net-value" id="netCashFlow">EGP 0</div>
    </div>
    <div class="net-badge" id="netBadge">vs last month</div>
  </div>

  <!-- Chart Card -->
  <div class="card">
    <div class="card-title" style="justify-content: space-between;">
      <div style="display: flex; align-items: center; gap: 8px;">
        <span class="card-title-icon">📈</span>
        <span>Monthly Breakdown</span>
      </div>
      <select id="chartYearSelect" style="width: auto; padding: 6px 12px; font-size: 13px; border-radius: 20px;">
        <option value="2026">2026</option>
        <option value="2027">2027</option>
        <option value="2028">2028</option>
        <option value="2029">2029</option>
        <option value="2030">2030</option>
      </select>
    </div>
    <div class="chart-container">
      <canvas id="trendChart"></canvas>
    </div>
    <div class="chart-legend" id="chartLegend"></div>
  </div>

  <!-- Top Spending Categories -->
  <div class="card">
    <div class="section-header">
      <h3>🔝 Top Spending Categories</h3>
      <button class="section-link" id="manageCategoriesBtn">Manage →</button>
    </div>
    <div id="topCategoriesList"></div>
  </div>

  <!-- Quick Actions at bottom - Income on left, Expense on right -->
  <div class="quick-actions">
    <button class="quick-btn income" id="addIncomeBtn">💰 Add Income</button>
    <button class="quick-btn expense" id="addExpenseBtn">➕ Add Expense</button>
  </div>

</div>

<div id="bottomNavMount"></div>
<div class="toast" id="toast"></div>

<!-- Add Expense Modal -->
<div class="modal-backdrop" id="expenseModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">➕ Add Expense</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="required">Date</label>
        <input type="date" id="expenseDate" required>
      </div>
      <div class="form-group">
        <label class="required">Category</label>
        <select id="expenseCategory" required>
          <option value="" disabled selected>Select…</option>
        </select>
      </div>
      <div class="form-group">
        <label class="required">Amount (EGP)</label>
        <div class="amount-wrap">
          <span class="currency-flag">🇪🇬</span>
          <input type="number" id="expenseAmount" placeholder="0.00" step="0.01" min="0.01" inputmode="decimal" required>
        </div>
      </div>
      <div class="form-group">
        <label>Notes <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input type="text" id="expenseNotes" placeholder="e.g. lunch with team">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeExpenseModal()">Cancel</button>
      <button class="btn-save" onclick="saveExpense()">Add Expense</button>
    </div>
  </div>
</div>

<!-- Add Income Modal -->
<div class="modal-backdrop" id="incomeModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">💰 Add Income</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="required">Date</label>
        <input type="date" id="incomeDate" required>
      </div>
      <div class="form-group">
        <label class="required">Category</label>
        <select id="incomeCategory" required>
          <option value="" disabled selected>Select…</option>
        </select>
      </div>
      <div class="form-group">
        <label class="required">Amount (EGP)</label>
        <div class="amount-wrap">
          <span class="currency-flag">🇪🇬</span>
          <input type="number" id="incomeAmount" placeholder="0.00" step="0.01" min="0.01" inputmode="decimal" required>
        </div>
      </div>
      <div class="form-group">
        <label>Notes <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input type="text" id="incomeNotes" placeholder="e.g. monthly salary">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeIncomeModal()">Cancel</button>
      <button class="btn-save" onclick="saveIncome()">Add Income</button>
    </div>
  </div>
</div>

<script>
// ======================== STATE ==========================
let expenses = [];
let incomes = [];
let spreadsheetId = null;
let currentUserEmail = null;
let currentAccessToken = null;
let trendChart = null;

// Chart colors
const CHART_COLORS = {
  income: '#10b981',
  daily: '#3b82f6',
  recurring: '#f59e0b',
  installments: '#06b6d4'
};

// ======================== DATA LOADING ===================
function parseLocalDate(str) {
  if (!str) return new Date();
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function getCurrentMonthYear() {
  const now = new Date();
  return { year: now.getFullYear(), month: now.getMonth() };
}

// Get this month's daily expenses
function getCurrentMonthDailyExpenses() {
  const { year, month } = getCurrentMonthYear();
  return expenses.filter(e => {
    const d = parseLocalDate(e.date);
    return d.getMonth() === month && d.getFullYear() === year;
  });
}

// Get this month's recurring expenses (from Recurring Log)
async function getCurrentMonthRecurringExpenses() {
  const { year, month } = getCurrentMonthYear();
  try {
    const res = await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId,
      range: `${RECURRING_LOG_SHEET}!A2:F`
    });
    const rows = res.result.values || [];
    let total = 0;
    rows.forEach(r => {
      if (r[1]) {
        const d = parseLocalDate(r[1]);
        if (d.getMonth() === month && d.getFullYear() === year) {
          total += parseFloat(r[4]) || 0;
        }
      }
    });
    return total;
  } catch (e) {
    console.error('getCurrentMonthRecurringExpenses error', e);
    return 0;
  }
}

// Get this month's installment expenses (from Installments Log)
async function getCurrentMonthInstallmentsExpenses() {
  const { year, month } = getCurrentMonthYear();
  try {
    const res = await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId,
      range: `${INSTALLMENTS_LOG_SHEET}!A2:E`
    });
    const rows = res.result.values || [];
    let total = 0;
    rows.forEach(r => {
      if (r[2]) {
        const d = parseLocalDate(r[2]);
        if (d.getMonth() === month && d.getFullYear() === year) {
          total += parseFloat(r[3]) || 0;
        }
      }
    });
    return total;
  } catch (e) {
    console.error('getCurrentMonthInstallmentsExpenses error', e);
    return 0;
  }
}

// Get this month's income
function getCurrentMonthIncomes() {
  const { year, month } = getCurrentMonthYear();
  return incomes.filter(i => {
    const d = parseLocalDate(i.date);
    return d.getMonth() === month && d.getFullYear() === year;
  });
}

// Get previous month's total expenses for comparison
function getPrevMonthTotalExpenses() {
  const now = new Date();
  const prevMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  const prevYear = prevMonth.getFullYear();
  const prevMonthNum = prevMonth.getMonth();
  
  const dailyTotal = expenses.filter(e => {
    const d = parseLocalDate(e.date);
    return d.getMonth() === prevMonthNum && d.getFullYear() === prevYear;
  }).reduce((s, e) => s + e.amount, 0);
  
  return dailyTotal;
}

function getPrevMonthIncome() {
  const now = new Date();
  const prevMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  const prevYear = prevMonth.getFullYear();
  const prevMonthNum = prevMonth.getMonth();
  
  return incomes.filter(i => {
    const d = parseLocalDate(i.date);
    return d.getMonth() === prevMonthNum && d.getFullYear() === prevYear;
  }).reduce((s, i) => s + i.amount, 0);
}

// ======================== RENDER KPI =====================
async function renderKPI() {
  const dailyExpensesList = getCurrentMonthDailyExpenses();
  const dailyTotal = dailyExpensesList.reduce((s, e) => s + e.amount, 0);
  
  const recurringTotal = await getCurrentMonthRecurringExpenses();
  const installmentsTotal = await getCurrentMonthInstallmentsExpenses();
  const incomeList = getCurrentMonthIncomes();
  const incomeTotal = incomeList.reduce((s, i) => s + i.amount, 0);
  
  const totalExpenses = dailyTotal + recurringTotal + installmentsTotal;
  const netCash = incomeTotal - totalExpenses;
  
  // Update KPI values
  document.getElementById('totalIncome').textContent = formatMoney(incomeTotal);
  document.getElementById('totalExpenses').textContent = formatMoney(totalExpenses);
  document.getElementById('dailyExpenses').textContent = formatMoney(dailyTotal);
  document.getElementById('recurringExpenses').textContent = formatMoney(recurringTotal);
  document.getElementById('installmentsExpenses').textContent = formatMoney(installmentsTotal);
  
  const netElement = document.getElementById('netCashFlow');
  netElement.textContent = netCash >= 0 ? formatMoney(netCash) : `-${formatMoney(Math.abs(netCash))}`;
  netElement.className = netCash >= 0 ? 'net-value positive' : 'net-value negative';
  
  const savingsRate = incomeTotal > 0 ? ((netCash / incomeTotal) * 100).toFixed(0) : 0;
  document.getElementById('netBadge').innerHTML = `${savingsRate}% saved`;
  
  // Trends
  const prevIncome = getPrevMonthIncome();
  const prevExpenses = getPrevMonthTotalExpenses();
  
  if (prevIncome > 0) {
    const incomeChange = ((incomeTotal - prevIncome) / prevIncome * 100).toFixed(0);
    const incomeTrend = document.getElementById('incomeTrend');
    if (incomeChange >= 0) {
      incomeTrend.innerHTML = `<span class="trend-up">▲ ${incomeChange}% vs last month</span>`;
    } else {
      incomeTrend.innerHTML = `<span class="trend-down">▼ ${Math.abs(incomeChange)}% vs last month</span>`;
    }
  } else {
    document.getElementById('incomeTrend').innerHTML = '<span class="trend-up">▲ New</span>';
  }
  
  if (prevExpenses > 0) {
    const expensesChange = ((totalExpenses - prevExpenses) / prevExpenses * 100).toFixed(0);
    const expensesTrend = document.getElementById('expensesTrend');
    if (expensesChange <= 0) {
      expensesTrend.innerHTML = `<span class="trend-down">▼ ${Math.abs(expensesChange)}% vs last month</span>`;
    } else {
      expensesTrend.innerHTML = `<span class="trend-up">▲ ${expensesChange}% vs last month</span>`;
    }
  } else {
    document.getElementById('expensesTrend').innerHTML = '<span class="trend-down">▼ New</span>';
  }
}

// ======================== CHART ==========================
async function getMonthlyData(year = null) {
  if (!year) {
    year = new Date().getFullYear();
  }
  
  const currentDate = new Date();
  const currentYear = currentDate.getFullYear();
  const currentMonth = currentDate.getMonth();
  
  const labels = [];
  const incomeData = [];
  const dailyData = [];
  const recurringData = [];
  const installmentsData = [];
  
  // Get all recurring logs and installment logs once
  let recurringLogs = [];
  let installmentLogs = [];
  try {
    const recurringRes = await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId, range: `${RECURRING_LOG_SHEET}!A2:F`
    });
    recurringLogs = recurringRes.result.values || [];
    
    const installmentRes = await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId, range: `${INSTALLMENTS_LOG_SHEET}!A2:E`
    });
    installmentLogs = installmentRes.result.values || [];
  } catch(e) { console.error(e); }
  
  // Loop through all 12 months of the selected year
  for (let month = 0; month < 12; month++) {
    // For future months (beyond current month and year), don't plot data
    const isFutureMonth = (year > currentYear) || (year === currentYear && month > currentMonth);
    
    labels.push(MONTHS_SHORT[month]);
    
    // Income
    const monthIncome = incomes
      .filter(inc => {
        const d = parseLocalDate(inc.date);
        return d.getMonth() === month && d.getFullYear() === year;
      })
      .reduce((sum, inc) => sum + inc.amount, 0);
    incomeData.push(isFutureMonth ? null : monthIncome);
    
    // Daily Expenses
    const monthDaily = expenses
      .filter(exp => {
        const d = parseLocalDate(exp.date);
        return d.getMonth() === month && d.getFullYear() === year;
      })
      .reduce((sum, exp) => sum + exp.amount, 0);
    dailyData.push(isFutureMonth ? null : monthDaily);
    
    // Recurring Expenses from logs
    let monthRecurring = 0;
    recurringLogs.forEach(log => {
      if (log[1]) {
        const d = parseLocalDate(log[1]);
        if (d.getMonth() === month && d.getFullYear() === year) {
          monthRecurring += parseFloat(log[4]) || 0;
        }
      }
    });
    recurringData.push(isFutureMonth ? null : monthRecurring);
    
    // Installments Expenses from logs
    let monthInstallments = 0;
    installmentLogs.forEach(log => {
      if (log[2]) {
        const d = parseLocalDate(log[2]);
        if (d.getMonth() === month && d.getFullYear() === year) {
          monthInstallments += parseFloat(log[3]) || 0;
        }
      }
    });
    installmentsData.push(isFutureMonth ? null : monthInstallments);
  }
  
  return { labels, incomeData, dailyData, recurringData, installmentsData };
}

// ======================== TOP CATEGORIES =================
function renderTopCategories() {
  const currentExpenses = getCurrentMonthDailyExpenses();
  const categoryTotals = {};
  currentExpenses.forEach(e => {
    categoryTotals[e.category] = (categoryTotals[e.category] || 0) + e.amount;
  });
  
  const topCategories = Object.entries(categoryTotals)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 5);
  
  const container = document.getElementById('topCategoriesList');
  if (!topCategories.length) {
    container.innerHTML = '<div class="empty-state">No expenses this month</div>';
    return;
  }
  
  container.innerHTML = topCategories.map(([cat, amt]) => {
    const icon = getCategoryIcon(cat);
    const bg = getCategoryColor(cat);
    const budget = getCategoryBudget(cat);
    let budgetHtml = '';
    let progressClass = 'ok';
    let pct = 0;
    if (budget && budget > 0) {
      pct = Math.min((amt / budget) * 100, 100);
      progressClass = pct >= 100 ? 'over' : pct >= 80 ? 'warning' : 'ok';
      budgetHtml = `<div class="progress-bar"><div class="progress-fill ${progressClass}" style="width: ${pct}%"></div></div>`;
    }
    return `
      <div class="category-item">
        <div class="category-left">
          <div class="category-icon" style="background:${bg}">${icon}</div>
          <div class="category-info">
            <div class="category-name">${escapeHtml(cat)}</div>
            ${budget ? `<div class="category-budget">Budget: ${formatMoney(budget)}</div>` : ''}
            ${budgetHtml}
          </div>
        </div>
        <div class="category-amount">${formatMoney(amt)}</div>
      </div>`;
  }).join('');
}

  if (!amount || amount <= 0) { showToast('❌ Enter valid amount', 'error'); return; }
  
  const newExpense = {
    id: await getNextExpenseId(),
    date,
    category,
    amount,
    notes: notes || '',

  };
  
  try {

    showToast('✅ Expense added!');

// ======================== LOAD DATA ======================
async function loadExpenses() {
  if (!spreadsheetId) return;
  try {
    const res = await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId, range: 'Daily Log!A2:F'
    });
    const rows = res.result.values || [];
    expenses = rows
      .filter(r => r[2] && r[3])
      .map((r, i) => ({
        id: (r[5] && !isNaN(parseInt(r[5]))) ? parseInt(r[5]) : -(i + 1),
        date: r[1] || r[0],
        category: r[2],
        amount: parseFloat(r[3]),
        notes: r[4] || '',
        timestamp: r[0] || new Date().toISOString()
      }));
  } catch (e) { console.error(e); }
}

  if (!spreadsheetId) return;
  try {
    const res = await gapi.client.sheets.spreadsheets.values.get({

// ======================== AUTH & INIT ====================
async function ensureIncomeTab() {
  try {
    const meta = await gapi.client.sheets.spreadsheets.get({ spreadsheetId });
    const exists = meta.result.sheets.some(s => s.properties.title === INCOME_LOG_SHEET);
    if (!exists) {
      await gapi.client.sheets.spreadsheets.batchUpdate({
        spreadsheetId,
        resource: { requests: [{ addSheet: { properties: { title: INCOME_LOG_SHEET } } }] }
      });
      await gapi.client.sheets.spreadsheets.values.update({
        spreadsheetId,
        range: `${INCOME_LOG_SHEET}!A1:F1`,
        valueInputOption: 'RAW',
        resource: { values: [['Timestamp', 'Date', 'Category', 'Amount', 'Notes', 'ID']] }
      });
    }
  } catch (e) { console.warn(e); }
}

async function initDashboard() {
  await initPageAuth({
    onLoadLocal: (email, sheetId) => {
      currentUserEmail = email;
      spreadsheetId = sheetId;
      document.getElementById('loadingOverlay').style.display = 'flex';
    },
    onReady: async (sheetId, email, token) => {
      currentUserEmail = email;
      spreadsheetId = sheetId;
      currentAccessToken = token;
      
      await ensureCategoriesTab(spreadsheetId);
      await ensureIncomeTab();
      await refreshAll();
      
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
    }
  });
}
