<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="images/icon.png">
  <link rel="icon" type="image/png" sizes="180x180" href="images/icon.png">
  <link rel="shortcut icon" href="images/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="utils.js"></script>
  <script src="auth.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
    .header h1 { font-family:'Sora',sans-serif; font-size:24px; font-weight:800; color:#fff; letter-spacing:-0.5px; }

    /* Filter */
    .dash-filter { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
    .dash-filter select { width:100%; padding:10px 14px; border:none; border-radius:30px; font-size:13px; font-weight:600; font-family:'DM Sans',sans-serif; background:rgba(255,255,255,0.22); color:#fff; -webkit-appearance:none; appearance:none; cursor:pointer; text-align:center; }
    .dash-filter select option { background:#5b5ef4; color:#fff; }

    /* KPI */
    .kpi-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
    .kpi-card-primary { border-radius:var(--radius-lg); padding:16px 14px; display:flex; flex-direction:column; gap:5px; }
    .kpi-card-primary.income-card  { background:linear-gradient(135deg,#10b981 0%,#059669 100%); box-shadow:0 4px 20px rgba(16,185,129,0.3); }
    .kpi-card-primary.expense-card { background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%); box-shadow:0 4px 20px rgba(239,68,68,0.3); }
    .kpi-card-top { display:flex; align-items:center; justify-content:space-between; }
    .kpi-label { font-size:10px; font-weight:700; color:rgba(255,255,255,0.85); text-transform:uppercase; letter-spacing:0.05em; }
    .kpi-value { font-family:'Sora',sans-serif; font-size:clamp(16px,4.5vw,22px); font-weight:800; color:#fff; line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .breakdown-section { margin-bottom:16px; }
    .breakdown-title { font-size:12px; font-weight:700; color:rgba(255,255,255,0.7); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:8px; padding-left:4px; }
    .kpi-row-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .kpi-card-secondary { background:rgba(239,68,68,0.18); backdrop-filter:blur(10px); border-radius:var(--radius-md); padding:11px 8px; border:1px solid rgba(239,68,68,0.3); display:flex; flex-direction:column; gap:3px; }
    .kpi-card-secondary .kpi-label { font-size:9px; color:rgba(255,255,255,0.6); }
    .kpi-card-secondary .kpi-value { font-size:clamp(13px,3.8vw,17px); font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* Net cash */
    .net-card { background:linear-gradient(135deg,rgba(255,255,255,0.12) 0%,rgba(255,255,255,0.08) 100%); backdrop-filter:blur(10px); border-radius:var(--radius-lg); padding:14px 16px; margin-bottom:16px; border:1px solid rgba(255,255,255,0.2); display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .net-label { font-size:11px; font-weight:600; color:rgba(255,255,255,0.7); }
    .net-value { font-family:'Sora',sans-serif; font-size:clamp(18px,5vw,24px); font-weight:800; white-space:nowrap; }
    .net-value.positive { color:#6ee7b7; }
    .net-value.negative { color:#fca5a5; }
    .net-badge { background:rgba(255,255,255,0.15); padding:3px 10px; border-radius:30px; font-size:10px; font-weight:700; color:rgba(255,255,255,0.8); flex-shrink:0; white-space:nowrap; }

    /* Chart */
    .chart-container { position:relative; height:260px; margin:8px 0; }
    canvas { max-width:100%; }
    .chart-filters { display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; justify-content:center; }
    .filter-pill { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:20px; font-size:11px; font-weight:700; cursor:pointer; border:2px solid transparent; transition:all 0.18s; user-select:none; opacity:0.38; }
    .filter-pill.active { opacity:1; }
    .filter-pill-dot { width:8px; height:8px; border-radius:50%; }

    /* Summary tabbed card */
    .summary-tab-bar { display:flex; border-bottom:1px solid var(--border); }
    .summary-tab-btn { flex:1; padding:12px 8px; border:none; background:none; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; color:var(--text-3); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all 0.15s; }
    .summary-tab-btn.active { color:var(--brand); border-bottom-color:var(--brand); }

    /* Tappable summary rows */
    .summ-row { display:flex; align-items:center; justify-content:space-between; padding:13px 0; border-bottom:1px solid var(--border); cursor:pointer; border-radius:8px; transition:background 0.12s; gap:8px; }
    .summ-row:last-child { border-bottom:none; }
    .summ-row:active { background:var(--surface-2); padding-left:6px; padding-right:6px; }
    .summ-row-left { display:flex; align-items:center; gap:10px; }
    .summ-row-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; overflow:hidden; }
    .summ-row-icon img { width:100%; height:100%; object-fit:contain; border-radius:10px; }
    .summ-row-label { font-weight:600; font-size:14px; color:var(--text); }
    .summ-row-sub   { font-size:10px; color:var(--text-3); margin-top:2px; }
    .summ-row-amount { font-family:'Sora',sans-serif; font-weight:700; font-size:14px; flex-shrink:0; white-space:nowrap; }
    .summ-row-amount.income  { color:var(--success); }
    .summ-row-amount.expense { color:var(--text-2); font-size:12px; }
    .summ-row-arrow { color:var(--text-3); font-size:14px; flex-shrink:0; }

    /* Total expenses divider */
    .summ-divider-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0 6px; border-bottom:2px solid var(--border); margin-bottom:2px; gap:8px; }
    .summ-divider-label { font-size:12px; font-weight:700; color:var(--text-2); text-transform:uppercase; letter-spacing:0.05em; }
    .summ-divider-amount { font-family:'Sora',sans-serif; font-weight:700; font-size:14px; color:var(--danger); flex-shrink:0; }

    /* Net cash row in card */
    .summ-net-row { display:flex; align-items:center; justify-content:space-between; padding:14px 0 4px; gap:8px; }
    .summ-net-label { font-family:'Sora',sans-serif; font-size:14px; font-weight:700; color:var(--text); }
    .summ-net-value { font-family:'Sora',sans-serif; font-size:18px; font-weight:800; }
    .summ-net-value.positive { color:var(--success); }
    .summ-net-value.negative { color:var(--danger); }

    /* Next month tappable rows (same style) */
    .next-summ-row { display:flex; align-items:center; justify-content:space-between; padding:13px 0; border-bottom:1px solid var(--border); cursor:pointer; border-radius:8px; transition:background 0.12s; gap:8px; }
    .next-summ-row:last-child { border-bottom:none; }
    .next-summ-row:active { background:var(--surface-2); padding-left:6px; padding-right:6px; }
    .next-summ-row-left { display:flex; align-items:center; gap:10px; }
    .next-summ-row-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
    .next-summ-row-label { font-weight:600; font-size:14px; color:var(--text); }
    .next-summ-row-sub   { font-size:10px; color:var(--text-3); margin-top:2px; }
    .next-summ-row-amount { font-family:'Sora',sans-serif; font-weight:700; font-size:14px; color:var(--danger); flex-shrink:0; white-space:nowrap; }
    .next-total-row { display:flex; align-items:center; justify-content:space-between; padding:14px 0 4px; gap:8px; }
    .next-total-label { font-family:'Sora',sans-serif; font-size:14px; font-weight:700; color:var(--text); }
    .next-total-value { font-family:'Sora',sans-serif; font-size:18px; font-weight:800; color:var(--danger); }

    /* Detail modal items */
    .detail-item { display:flex; align-items:center; gap:10px; padding:11px 0; border-bottom:1px solid var(--border); }
    .detail-item:last-child { border-bottom:none; }
    .detail-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; overflow:hidden; }
    .detail-icon img { width:100%; height:100%; object-fit:contain; border-radius:10px; }
    .detail-info { flex:1; min-width:0; }
    .detail-name { font-weight:600; font-size:13px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .detail-sub  { font-size:10px; color:var(--text-3); margin-top:2px; }
    .detail-amt  { font-family:'Sora',sans-serif; font-weight:700; font-size:14px; flex-shrink:0; white-space:nowrap; }
    .detail-amt.income  { color:var(--success); }
    .detail-amt.expense { color:var(--danger); }

    /* Category group header in daily detail modal */
    .detail-cat-header { font-size:13px; font-weight:700; color:var(--text); text-transform:none; letter-spacing:0; padding:12px 0 6px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .detail-cat-total  { font-size:13px; font-weight:700; color:var(--text); text-transform:none; letter-spacing:normal; }

    /* Top categories */
    .category-item { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); gap:8px; }
    .category-item:last-child { border-bottom:none; }
    .category-left  { display:flex; align-items:center; gap:8px; flex:1; min-width:0; }
    .category-icon  { width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
    .category-info  { flex:1; min-width:0; }
    .category-name  { font-weight:600; font-size:13px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .category-budget { font-size:10px; color:var(--text-3); margin-top:2px; }
    .category-amount { font-weight:700; font-size:13px; color:var(--brand); flex-shrink:0; white-space:nowrap; }
    .progress-bar   { height:3px; background:var(--border); border-radius:3px; margin-top:4px; overflow:hidden; }
    .progress-fill  { height:100%; border-radius:3px; }
    .progress-fill.ok      { background:var(--success); }
    .progress-fill.warning { background:var(--warning); }
    .progress-fill.over    { background:var(--danger); }

    .section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .section-header h3 { font-family:'Sora',sans-serif; font-size:16px; font-weight:700; color:var(--text); }
    .section-link { font-size:12px; font-weight:600; color:var(--brand); background:none; border:none; cursor:pointer; }

    .quick-actions { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:20px; margin-bottom:20px; }
    .quick-btn { border:none; border-radius:var(--radius-sm); padding:14px; font-size:14px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; display:flex; align-items:center; justify-content:center; gap:8px; transition:all 0.15s; box-shadow:var(--shadow-sm); }
    .quick-btn:active { transform:scale(0.96); }
    .quick-btn.income  { background:linear-gradient(135deg,#10b981 0%,#059669 100%); color:#fff; }
    .quick-btn.expense { background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%); color:#fff; }

    .loading-overlay { position:fixed; inset:0; background:rgba(91,94,244,0.18); backdrop-filter:blur(4px); z-index:9000; display:flex; align-items:center; justify-content:center; }
    .modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .trend-up   { color:#bbf7d0; }
    .trend-down { color:#fecaca; }
    .kpi-trend  { font-size:11px; margin-top:8px; }
    .trend-badge { display:inline-block; background:rgba(0,0,0,0.35); padding:4px 10px; border-radius:20px; font-weight:600; }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box"><div class="spinner"></div><p>Loading dashboard...</p></div>
</div>

<div class="container" id="mainApp" style="display:none">

  <div class="header">
    <h1>📊 Dashboard</h1>
    <div class="header-actions">
      <button class="hdr-icon-btn" id="syncBtn" title="Sync">↻</button>
      <button class="hdr-icon-btn" onclick="window.location.href='Settings.html'" title="Settings">⚙️</button>
      <button class="hdr-icon-btn danger" onclick="logout()" title="Logout">⏻</button>
    </div>
  </div>

  <div class="dash-filter">
    <select id="dashMonthSelect"></select>
    <select id="dashYearSelect"></select>
  </div>

  <div class="kpi-row-2">
    <div class="kpi-card-primary income-card">
      <div class="kpi-card-top"><div class="kpi-label" id="kpiIncomeLabel">Income</div></div>
      <div class="kpi-value" id="totalIncome">EGP 0</div>
      <div class="kpi-trend" id="incomeTrend"></div>
    </div>
    <div class="kpi-card-primary expense-card">
      <div class="kpi-card-top"><div class="kpi-label" id="kpiExpensesLabel">Expenses</div></div>
      <div class="kpi-value" id="totalExpenses">EGP 0</div>
      <div class="kpi-trend" id="expensesTrend"></div>
    </div>
  </div>

  <div class="breakdown-section">
    <div class="breakdown-title">Expenses Breakdown</div>
    <div class="kpi-row-3">
      <div class="kpi-card-secondary" style="border-color:#3b82f6;background:#3b82f6;"><div class="kpi-card-top"><div class="kpi-label">Daily</div></div><div class="kpi-value" id="dailyExpenses">EGP 0</div></div>
      <div class="kpi-card-secondary" style="border-color:#f59e0b;background:#f59e0b;"><div class="kpi-card-top"><div class="kpi-label">Recurring</div></div><div class="kpi-value" id="recurringExpenses">EGP 0</div></div>
      <div class="kpi-card-secondary" style="border-color:#06b6d4;background:#06b6d4;"><div class="kpi-card-top"><div class="kpi-label">Installments</div></div><div class="kpi-value" id="installmentsExpenses">EGP 0</div></div>
    </div>
  </div>

  <div class="net-card">
    <div><div class="net-label">Net Cash Flow</div><div class="net-value" id="netCashFlow">EGP 0</div></div>
    <div class="net-badge" id="netBadge">vs last month</div>
  </div>

  <!-- Chart — independent year filter -->
  <div class="card">
    <div class="card-title" style="justify-content:space-between;">
      <div style="display:flex;align-items:center;gap:8px;"><span class="card-title-icon">📈</span><span>Monthly Breakdown</span></div>
      <select id="chartYearSelect" style="width:auto;padding:6px 12px;font-size:13px;border-radius:20px;">
        <option value="2026">2026</option><option value="2027">2027</option>
        <option value="2028">2028</option><option value="2029">2029</option><option value="2030">2030</option>
      </select>
    </div>
    <div class="chart-container"><canvas id="trendChart"></canvas></div>
    <div class="chart-filters" id="chartLegend"></div>
  </div>

  <!-- Tabbed Summary card -->
  <div class="card" style="padding-top:0;overflow:hidden;">
    <div class="summary-tab-bar">
      <button class="summary-tab-btn active" id="stab1" onclick="switchSummaryTab('selected')">📅 <span id="summaryTabLabel">This Month</span></button>
      <button class="summary-tab-btn" id="stab2" onclick="switchSummaryTab('next')">➡️ <span id="nextTabLabel">Next Month</span></button>
    </div>
    <div id="summarySelectedTab" style="padding:16px 0 4px;">
      <div id="summaryRows"></div>
      <div class="summ-net-row">
        <div class="summ-net-label">💵 Net Cash Flow</div>
        <div class="summ-net-value" id="summaryNetCash">EGP 0</div>
      </div>
    </div>
    <div id="summaryNextTab" style="display:none;padding:16px 0 4px;">
      <div id="nextMonthRows"></div>
      <div class="next-total-row">
        <div class="next-total-label">📊 Total Due</div>
        <div class="next-total-value" id="nextMonthTotal">EGP 0</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-header">
      <h3>🔝 Top Spending Categories</h3>
      <button class="section-link" id="manageCategoriesBtn">Manage →</button>
    </div>
    <div id="topCategoriesList"></div>
  </div>

  <div class="quick-actions">
    <button class="quick-btn income" id="addIncomeBtn">💰 Add Income</button>
    <button class="quick-btn expense" id="addExpenseBtn">➕ Add Expense</button>
  </div>

</div>

<div id="bottomNavMount"></div>
<div class="toast" id="toast"></div>

<!-- Add Expense Modal -->
<div class="modal-backdrop" id="expenseModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">➕ Add Expense</div>
    <div class="form-grid">
      <div class="form-group"><label class="required">Date</label><input type="date" id="expenseDate" required></div>
      <div class="form-group"><label class="required">Category</label><select id="expenseCategory" required><option value="" disabled selected>Select…</option></select></div>
      <div class="form-group"><label class="required">Amount (EGP)</label><div class="amount-wrap"><span class="currency-flag">🇪🇬</span><input type="number" id="expenseAmount" placeholder="0.00" step="0.01" min="0.01" inputmode="decimal" required></div></div>
      <div class="form-group"><label>Notes <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label><input type="text" id="expenseNotes" placeholder="e.g. lunch with team"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeExpenseModal()">Cancel</button>
      <button class="btn-save" onclick="saveExpense()">Add Expense</button>
    </div>
  </div>
</div>

<!-- Add Income Modal -->
<div class="modal-backdrop" id="incomeModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">💰 Add Income</div>
    <div class="form-grid">
      <div class="form-group"><label class="required">Date</label><input type="date" id="incomeDate" required></div>
      <div class="form-group"><label class="required">Category</label><select id="incomeCategory" required><option value="" disabled selected>Select…</option></select></div>
      <div class="form-group"><label class="required">Amount (EGP)</label><div class="amount-wrap"><span class="currency-flag">🇪🇬</span><input type="number" id="incomeAmount" placeholder="0.00" step="0.01" min="0.01" inputmode="decimal" required></div></div>
      <div class="form-group"><label>Notes <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label><input type="text" id="incomeNotes" placeholder="e.g. monthly salary"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeIncomeModal()">Cancel</button>
      <button class="btn-save" onclick="saveIncome()">Add Income</button>
    </div>
  </div>
</div>

<!-- Detail Modal (read-only, reused) -->
<div class="modal-backdrop" id="detailModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="detailModalTitle">Details</div>
    <div id="detailModalBody"></div>
    <div class="modal-footer"><button class="btn-save" onclick="closeDetailModal()">Done</button></div>
  </div>
</div>

<script>
// ======================== STATE ==========================
let expenses = [], incomes = [];
let spreadsheetId = null, currentUserEmail = null, currentAccessToken = null;
let trendChart = null;
let _recurringLogs = [], _installmentLogs = [], _recurringPlans = [], _installmentPlans = [];
let activeSummaryTab = 'selected';

const CHART_COLORS = { income:'#10b981', daily:'#3b82f6', recurring:'#f59e0b', installments:'#06b6d4', total:'#ef4444' };

// ======================== FILTER =========================
function getSelectedMonthYear() {
  const mEl = document.getElementById('dashMonthSelect');
  const yEl = document.getElementById('dashYearSelect');
  if (mEl && yEl && mEl.value !== '' && yEl.value !== '')
    return { year: parseInt(yEl.value), month: parseInt(mEl.value) };
  const now = new Date();
  return { year: now.getFullYear(), month: now.getMonth() };
}

function getNextMonthYear() {
  const { year, month } = getSelectedMonthYear();
  const next = new Date(year, month + 1, 1);
  return { year: next.getFullYear(), month: next.getMonth() };
}

function populateDashFilter() {
  const monthSel = document.getElementById('dashMonthSelect');
  const yearSel  = document.getElementById('dashYearSelect');
  const now = new Date();
  MONTHS_FULL.forEach((name, i) => {
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = name;
    if (i === now.getMonth()) opt.selected = true;
    monthSel.appendChild(opt);
  });
  const currYear = now.getFullYear();
  for (let y = currYear - 2; y <= currYear + 2; y++) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    if (y === currYear) opt.selected = true;
    yearSel.appendChild(opt);
  }
  monthSel.addEventListener('change', onFilterChange);
  yearSel.addEventListener('change',  onFilterChange);
}

async function onFilterChange() {
  updateSummaryTabLabels();
  await renderKPI();
  await renderMonthlySummary();
  await renderNextMonth();
  renderTopCategories();
}

function updateSummaryTabLabels() {
  const { year, month } = getSelectedMonthYear();
  const { year: ny, month: nm } = getNextMonthYear();
  document.getElementById('summaryTabLabel').textContent = MONTHS_SHORT[month] + ' ' + year;

// ======================== DATA HELPERS ===================
function parseLocalDate(str) {
  if (!str) return new Date();
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function getSelectedMonthDailyExpenses() {
  const { year, month } = getSelectedMonthYear();
  return expenses.filter(e => { const d = parseLocalDate(e.date); return d.getMonth()===month && d.getFullYear()===year; });
}

function getSelectedMonthIncomes() {
  const { year, month } = getSelectedMonthYear();
  return incomes.filter(i => { const d = parseLocalDate(i.date); return d.getMonth()===month && d.getFullYear()===year; });
}

function sumRecurringForMonth(year, month) {
  let t = 0;
  _recurringLogs.forEach(r => { if (r[1]) { const d = parseLocalDate(r[1]); if (d.getMonth()===month && d.getFullYear()===year) t += parseFloat(r[4])||0; } });
  return t;
}

function sumInstallmentsForMonth(year, month) {
  let t = 0;
  _installmentLogs.forEach(r => { if (r[2]) { const d = parseLocalDate(r[2]); if (d.getMonth()===month && d.getFullYear()===year) t += parseFloat(r[3])||0; } });
  return t;
}

function getRecurringLogEntries(year, month) {
  return _recurringLogs.filter(r => { if (!r[1]) return false; const d = parseLocalDate(r[1]); return d.getMonth()===month && d.getFullYear()===year; });
}

function getInstallmentLogEntries(year, month) {
  return _installmentLogs.filter(r => { if (!r[2]) return false; const d = parseLocalDate(r[2]); return d.getMonth()===month && d.getFullYear()===year; });
}

function getPrevMonthTotalExpenses() {
  const { year, month } = getSelectedMonthYear();
  const prev = new Date(year, month-1, 1);
  const py = prev.getFullYear(), pm = prev.getMonth();
  return expenses.filter(e => { const d = parseLocalDate(e.date); return d.getMonth()===pm && d.getFullYear()===py; }).reduce((s,e)=>s+e.amount,0)
    + sumRecurringForMonth(py,pm) + sumInstallmentsForMonth(py,pm);
}

function getPrevMonthIncome() {
  const { year, month } = getSelectedMonthYear();
  const prev = new Date(year, month-1, 1);
  const py = prev.getFullYear(), pm = prev.getMonth();
  return incomes.filter(i => { const d = parseLocalDate(i.date); return d.getMonth()===pm && d.getFullYear()===py; }).reduce((s,i)=>s+i.amount,0);
}

// ======================== NEXT MONTH HELPERS =============
function _getNextMonthRecurring(year, month) {
  return _recurringPlans.filter(sub => {
    if (sub.frequency==='Monthly')   return sub.startMonth <= (month+1);
    if (sub.frequency==='Quarterly') { const diff=(year-(sub.startYear||year))*12+month-(sub.startMonth-1); return diff>=0 && diff%3===0; }
    if (sub.frequency==='Annual')    return sub.startMonth===(month+1);
    return false;
  });
}

function _getNextMonthInstallments(year, month) {
  return _installmentPlans.filter(inst => {
    const startDate = new Date(inst.startYear, inst.startMonth-1, 1);
    const endDate   = new Date(inst.startYear, inst.startMonth-1+inst.monthsCount, 1);
    const checkDate = new Date(year, month, 1);
    return checkDate >= startDate && checkDate < endDate;
  });
}

async function loadAllSheetData() {
  if (!spreadsheetId) return;
  try {
    const [expRes, incRes, recRes, instRes, recPlanRes, instPlanRes] = await Promise.all([
      gapi.client.sheets.spreadsheets.values.get({ spreadsheetId, range:'Daily Log!A2:F' }),
      gapi.client.sheets.spreadsheets.values.get({ spreadsheetId, range:`${INCOME_LOG_SHEET}!A2:F` }),
      gapi.client.sheets.spreadsheets.values.get({ spreadsheetId, range:`${RECURRING_LOG_SHEET}!A2:G` }),
      gapi.client.sheets.spreadsheets.values.get({ spreadsheetId, range:`${INSTALLMENTS_LOG_SHEET}!A2:E` }),
      gapi.client.sheets.spreadsheets.values.get({ spreadsheetId, range:`${RECURRING_SHEET}!A2:I` }),
      gapi.client.sheets.spreadsheets.values.get({ spreadsheetId, range:`${INSTALLMENTS_SHEET}!A2:H` }),
    ]);
    expenses = (expRes.result.values||[]).filter(r=>r[2]&&r[3]).map((r,i)=>({ id:(r[5]&&!isNaN(parseInt(r[5])))?parseInt(r[5]):-(i+1), date:r[1]||r[0], category:r[2], amount:parseFloat(r[3]), notes:r[4]||'', timestamp:r[0]||new Date().toISOString() }));
    incomes  = (incRes.result.values||[]).filter(r=>r[2]&&r[3]).map((r,i)=>({ id:(r[5]&&!isNaN(parseInt(r[5])))?parseInt(r[5]):-(i+1), date:r[1]||r[0], category:r[2], amount:parseFloat(r[3]), notes:r[4]||'', timestamp:r[0]||new Date().toISOString() }));
    _recurringLogs   = recRes.result.values  || [];
    _installmentLogs = instRes.result.values || [];
    _recurringPlans  = (recPlanRes.result.values||[]).map(r=>({ id:r[0], name:r[1]||'', category:r[2]||'Other', frequency:r[3]||'Monthly', amount:parseFloat(r[4])||0, startMonth:parseInt(r[5])||1, paymentDay:parseInt(r[6])||1, startYear:parseInt(r[7])||new Date().getFullYear(), active:r[8]==='true' })).filter(s=>s.name&&s.active);
    _installmentPlans= (instPlanRes.result.values||[]).map(r=>{ if(!r||r.length<8) return null; return { id:r[0], itemName:r[1], bankKey:r[2], totalAmount:parseFloat(r[3]), monthsCount:parseInt(r[4]), startYear:parseInt(r[5]), startMonth:parseInt(r[6]), monthlyAmount:parseFloat(r[7]) }; }).filter(Boolean);
  } catch(e) { console.error('loadAllSheetData error',e); }
}

// ======================== DETAIL MODAL ===================
function openDetailModal(type, year, month) {
  const titles = {
    income:'💰 Income Details', daily:'📋 Daily Expenses',
    recurring:'🔄 Recurring Paid', installments:'📆 Installments Paid',
    next_recurring:'🔄 Recurring — Next Month', next_installments:'📆 Installments — Next Month'
  };
  document.getElementById('detailModalTitle').textContent = titles[type] || 'Details';
  let html = '';

  // Income — oldest → newest
  if (type === 'income') {
    const entries = getSelectedMonthIncomes().sort((a,b) => parseLocalDate(a.date)-parseLocalDate(b.date));
    html = entries.length ? entries.map(e => {
      const icon=getCategoryIcon(e.category), bg=getCategoryColor(e.category);
      return `<div class="detail-item"><div class="detail-icon" style="background:${bg}">${icon}</div><div class="detail-info"><div class="detail-name">${escapeHtml(e.category)}</div><div class="detail-sub">${formatDate(e.date)}${e.notes?' · '+escapeHtml(e.notes):''}</div></div><div class="detail-amt income">+${formatMoney(e.amount)}</div></div>`;
    }).join('') : '<div class="empty-state"><p>No income entries for this period</p></div>';
  }

  // Daily — grouped by category (largest first), within each oldest → newest
  else if (type === 'daily') {
    const entries = getSelectedMonthDailyExpenses();
    if (!entries.length) { html = '<div class="empty-state"><p>No expenses for this period</p></div>'; }
    else {
      const catTotals = {};
      entries.forEach(e => { catTotals[e.category]=(catTotals[e.category]||0)+e.amount; });
      Object.keys(catTotals).sort((a,b)=>catTotals[b]-catTotals[a]).forEach(cat => {
        const icon=getCategoryIcon(cat), bg=getCategoryColor(cat);
        html += `<div class="detail-cat-header"><div style="display:flex;align-items:center;gap:8px">
  <div style="width:30px;height:30px;border-radius:8px;background:${bg};display:flex;align-items:center;justify-content:center;font-size:16px">${icon}</div>${escapeHtml(cat)}</div><div class="detail-cat-total">-${formatMoney(catTotals[cat])}</div></div>`;
        entries.filter(e=>e.category===cat).sort((a,b)=>parseLocalDate(a.date)-parseLocalDate(b.date)).forEach(e => {
          html += `<div class="detail-item" style="padding-left:38px"><div class="detail-info"><div class="detail-sub" style="font-size:11px;color:var(--text-2)">${formatDate(e.date)}${e.notes?' · '+escapeHtml(e.notes):''}</div></div><div class="detail-amt" style="font-size:12px;color:var(--text-2)">-${formatMoney(e.amount)}</div></div>`;
        });
      });
    }
  }

  // Recurring — oldest → newest
  else if (type === 'recurring') {
    const entries = getRecurringLogEntries(year, month).sort((a,b)=>parseLocalDate(a[1])-parseLocalDate(b[1]));
    html = entries.length ? entries.map(r => {
      const icon=getRecurringCategoryIcon(r[3]||'Other');
      return `<div class="detail-item"><div class="detail-icon" style="background:#fef3c7">${icon}</div><div class="detail-info"><div class="detail-name">${escapeHtml(r[2]||'—')}</div><div class="detail-sub">${r[1]?formatDate(r[1]):''}</div></div><div class="detail-amt expense">-${formatMoney(parseFloat(r[4])||0)}</div></div>`;
    }).join('') : '<div class="empty-state"><p>No recurring payments logged for this period</p></div>';
  }

  // Installments — bank logo, date only, oldest → newest
  else if (type === 'installments') {
    const entries = getInstallmentLogEntries(year, month).sort((a,b)=>parseLocalDate(a[2])-parseLocalDate(b[2]));
    html = entries.length ? entries.map(r => {
      const plan=_installmentPlans.find(p=>p.id===r[1]);
      const name=plan?plan.itemName:(r[1]||'—');
      const bank=plan?BANK_PROVIDERS.find(b=>b.key===plan.bankKey):null;
      const logoHtml=bank?`<img src="${bank.logo}" alt="${bank.name}" onerror="this.style.display='none';this.parentElement.textContent='🏦'">`:'🏦';
      return `<div class="detail-item"><div class="detail-icon" style="background:#fff;border:1.5px solid var(--border)">${logoHtml}</div><div class="detail-info"><div class="detail-name">${escapeHtml(name)}</div><div class="detail-sub">${r[2]?formatDate(r[2]):''}</div></div><div class="detail-amt expense">-${formatMoney(parseFloat(r[3])||0)}</div></div>`;
    }).join('') : '<div class="empty-state"><p>No installment payments logged for this period</p></div>';
  }

  // Next month recurring — sorted by paymentDay
  else if (type === 'next_recurring') {
    const { year:ny, month:nm } = getNextMonthYear();
    const list = _getNextMonthRecurring(ny,nm).sort((a,b)=>a.paymentDay-b.paymentDay);
    html = list.length ? list.map(sub => {
      const icon=getRecurringCategoryIcon(sub.category);
      const dueDate=new Date(ny,nm,Math.min(sub.paymentDay,new Date(ny,nm+1,0).getDate()));
      return `<div class="detail-item"><div class="detail-icon" style="background:#fef3c7">${icon}</div><div class="detail-info"><div class="detail-name">${escapeHtml(sub.name)}</div><div class="detail-sub">${sub.frequency} · Due ${dueDate.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})}</div></div><div class="detail-amt expense">-${formatMoney(sub.amount)}</div></div>`;
    }).join('') : '<div class="empty-state"><p>No recurring due next month</p></div>';
  }

  // Next month installments — sorted by startMonth
  else if (type === 'next_installments') {
    const { year:ny, month:nm } = getNextMonthYear();
    const list = _getNextMonthInstallments(ny,nm).sort((a,b)=>a.startMonth-b.startMonth);
    html = list.length ? list.map(inst => {
      const bank=BANK_PROVIDERS.find(b=>b.key===inst.bankKey);
      const logoHtml=bank?`<img src="${bank.logo}" alt="${bank.name}" onerror="this.style.display='none';this.parentElement.textContent='🏦'">`:'🏦';
      const paidCount=_installmentLogs.filter(l=>l[1]===inst.id).length;
      const remaining=inst.monthsCount-paidCount;
      return `<div class="detail-item"><div class="detail-icon" style="background:#fff;border:1.5px solid var(--border)">${logoHtml}</div><div class="detail-info"><div class="detail-name">${escapeHtml(inst.itemName)}</div><div class="detail-sub">${bank?escapeHtml(bank.name):inst.bankKey} · ${remaining} months left</div></div><div class="detail-amt expense">-${formatMoney(inst.monthlyAmount)}</div></div>`;
    }).join('') : '<div class="empty-state"><p>No installments due next month</p></div>';
  }

  document.getElementById('detailModalBody').innerHTML = html;
  document.getElementById('detailModal').classList.add('open');
}

async function getMonthlyData(year=null) {
  if (!year) year=new Date().getFullYear();
  const now=new Date(), currYear=now.getFullYear(), currMonth=now.getMonth();
  const labels=[],incomeData=[],dailyData=[],recurringData=[],installmentsData=[];
  for (let month=0;month<12;month++) {
    const isFuture=(year>currYear)||(year===currYear&&month>currMonth);
    labels.push(MONTHS_SHORT[month]);
    incomeData.push(isFuture?null:incomes.filter(i=>{const d=parseLocalDate(i.date);return d.getMonth()===month&&d.getFullYear()===year;}).reduce((s,i)=>s+i.amount,0));
    dailyData.push(isFuture?null:expenses.filter(e=>{const d=parseLocalDate(e.date);return d.getMonth()===month&&d.getFullYear()===year;}).reduce((s,e)=>s+e.amount,0));
    let mr=0; _recurringLogs.forEach(l=>{if(l[1]){const d=parseLocalDate(l[1]);if(d.getMonth()===month&&d.getFullYear()===year)mr+=parseFloat(l[4])||0;}}); recurringData.push(isFuture?null:mr);
    let mi=0; _installmentLogs.forEach(l=>{if(l[2]){const d=parseLocalDate(l[2]);if(d.getMonth()===month&&d.getFullYear()===year)mi+=parseFloat(l[3])||0;}}); installmentsData.push(isFuture?null:mi);
  }
  return {labels,incomeData,dailyData,recurringData,installmentsData};
}

  datasets.push({label:'Daily Expenses',data:dailyData,borderColor:CHART_COLORS.daily,backgroundColor:'rgba(59,130,246,0.05)',borderWidth:2,tension:0.4,fill:false,pointBackgroundColor:CHART_COLORS.daily,pointRadius:2,pointHoverRadius:5,spanGaps:false,borderDash:[5,5]});
  datasets.push({label:'Recurring Expenses',data:recurringData,borderColor:CHART_COLORS.recurring,backgroundColor:'rgba(245,158,11,0.05)',borderWidth:2,tension:0.4,fill:false,pointBackgroundColor:CHART_COLORS.recurring,pointRadius:2,pointHoverRadius:5,spanGaps:false,borderDash:[5,5]});
  datasets.push({label:'Installments',data:installmentsData,borderColor:CHART_COLORS.installments,backgroundColor:'rgba(139,92,246,0.05)',borderWidth:2,tension:0.4,fill:false,pointBackgroundColor:CHART_COLORS.installments,pointRadius:2,pointHoverRadius:5,spanGaps:false,borderDash:[5,5]});
  trendChart=new Chart(document.getElementById('trendChart').getContext('2d'),{type:'line',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:(ctx)=>`${ctx.dataset.label}: ${ctx.raw!==null?formatMoney(ctx.raw):'No data'}`}}},scales:{x:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{size:11}}},y:{beginAtZero:true,grid:{color:'#e8e8f0'},ticks:{callback:(v)=>'EGP '+v.toLocaleString(),font:{size:11}}}}}});
  const FILTERS=[{key:'Income',color:CHART_COLORS.income,label:'Income'},{key:'Total Expenses',color:CHART_COLORS.total,label:'Total Expenses'},{key:'Daily Expenses',color:CHART_COLORS.daily,label:'Daily'},{key:'Recurring Expenses',color:CHART_COLORS.recurring,label:'Recurring'},{key:'Installments',color:CHART_COLORS.installments,label:'Installments'}];
  const legendEl=document.getElementById('chartLegend');
  legendEl.innerHTML=FILTERS.map(f=>`<div class="filter-pill active" data-label="${f.key}" style="background:${f.color}22;border-color:${f.color};color:${f.color};"><div class="filter-pill-dot" style="background:${f.color}"></div>${f.label}</div>`).join('');
  legendEl.querySelectorAll('.filter-pill').forEach(pill=>{ pill.addEventListener('click',()=>{ const dsIndex=trendChart.data.datasets.findIndex(d=>d.label===pill.dataset.label); if(dsIndex===-1)return; const isActive=pill.classList.toggle('active'); trendChart.setDatasetVisibility(dsIndex,isActive); trendChart.update(); }); });
}

// ======================== TOP CATEGORIES =================
function renderTopCategories() {
  const catTotals={};
  getSelectedMonthDailyExpenses().forEach(e=>{ catTotals[e.category]=(catTotals[e.category]||0)+e.amount; });
  const top=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const container=document.getElementById('topCategoriesList');
  if (!top.length) { container.innerHTML='<div class="empty-state">No expenses for this period</div>'; return; }
  container.innerHTML=top.map(([cat,amt])=>{
    const icon=getCategoryIcon(cat),bg=getCategoryColor(cat),budget=getCategoryBudget(cat);
    let bHtml='',pc='ok',pct=0;
    if(budget&&budget>0){pct=Math.min((amt/budget)*100,100);pc=pct>=100?'over':pct>=80?'warning':'ok';bHtml=`<div class="progress-bar"><div class="progress-fill ${pc}" style="width:${pct}%"></div></div>`;}
    return `<div class="category-item"><div class="category-left"><div class="category-icon" style="background:${bg}">${icon}</div><div class="category-info"><div class="category-name">${escapeHtml(cat)}</div>${budget?`<div class="category-budget">Budget: ${formatMoney(budget)}</div>`:''}${bHtml}</div></div><div class="category-amount">${formatMoney(amt)}</div></div>`;
  }).join('');
}

// ======================== ADD EXPENSE / INCOME ===========
async function saveExpense() {
  const date=document.getElementById('expenseDate').value, category=document.getElementById('expenseCategory').value, amount=parseFloat(document.getElementById('expenseAmount').value), notes=document.getElementById('expenseNotes').value.trim();
  if(!date){showToast('❌ Select date','error');return;} if(!category){showToast('❌ Select category','error');return;} if(!amount||amount<=0){showToast('❌ Enter valid amount','error');return;}
  const exp={id:await getNextExpenseId(),date,category,amount,notes:notes||'',timestamp:new Date().toISOString()};
  try { await gapi.client.sheets.spreadsheets.values.append({spreadsheetId,range:'Daily Log!A2:F',valueInputOption:'RAW',resource:{values:[[exp.timestamp,exp.date,exp.category,exp.amount,exp.notes,exp.id]]}}); closeExpenseModal(); await refreshAll(); showToast('✅ Expense added!'); } catch(e){showToast('❌ Failed to save','error');}
}
function buildExpenseCategorySelect() { document.getElementById('expenseCategory').innerHTML='<option value="" disabled selected>Select…</option>'+getExpenseCategories().map(c=>`<option value="${c.value}">${c.icon} ${c.value}</option>`).join(''); }
function openExpenseModal() { document.getElementById('expenseDate').value=new Date().toISOString().split('T')[0]; document.getElementById('expenseAmount').value=''; document.getElementById('expenseNotes').value=''; buildExpenseCategorySelect(); document.getElementById('expenseModal').classList.add('open'); }
function closeExpenseModal() { document.getElementById('expenseModal').classList.remove('open'); }

async function saveIncome() {
  const date=document.getElementById('incomeDate').value, category=document.getElementById('incomeCategory').value, amount=parseFloat(document.getElementById('incomeAmount').value), notes=document.getElementById('incomeNotes').value.trim();
  if(!date){showToast('❌ Select date','error');return;} if(!category){showToast('❌ Select category','error');return;} if(!amount||amount<=0){showToast('❌ Enter valid amount','error');return;}
  const inc={id:await getNextIncomeId(),date,category,amount,notes:notes||'',timestamp:new Date().toISOString()};
  try { await gapi.client.sheets.spreadsheets.values.append({spreadsheetId,range:`${INCOME_LOG_SHEET}!A2:F`,valueInputOption:'RAW',resource:{values:[[inc.timestamp,inc.date,inc.category,inc.amount,inc.notes,inc.id]]}}); closeIncomeModal(); await refreshAll(); showToast('✅ Income added!'); } catch(e){showToast('❌ Failed to save','error');}
}
function buildIncomeCategorySelect() { document.getElementById('incomeCategory').innerHTML='<option value="" disabled selected>Select…</option>'+getIncomeCategories().map(c=>`<option value="${c.value}">${c.icon} ${c.value}</option>`).join(''); }
function openIncomeModal() { document.getElementById('incomeDate').value=new Date().toISOString().split('T')[0]; document.getElementById('incomeAmount').value=''; document.getElementById('incomeNotes').value=''; buildIncomeCategorySelect(); document.getElementById('incomeModal').classList.add('open'); }
function closeIncomeModal() { document.getElementById('incomeModal').classList.remove('open'); }

// ======================== REFRESH ========================
async function refreshAll() {
  await loadAllSheetData();
  await renderKPI();
  await renderChart();
  await renderMonthlySummary();
  await renderNextMonth();
  renderTopCategories();
}
async function syncAll() { showToast('🔄 Syncing...','info'); await refreshAll(); showToast('✅ Dashboard updated'); }

// ======================== ENSURE INCOME TAB ==============
async function ensureIncomeTab() {
  try {
    const meta=await gapi.client.sheets.spreadsheets.get({spreadsheetId});
    if (!meta.result.sheets.some(s=>s.properties.title===INCOME_LOG_SHEET)) {
      await gapi.client.sheets.spreadsheets.batchUpdate({spreadsheetId,resource:{requests:[{addSheet:{properties:{title:INCOME_LOG_SHEET}}}]}});
      await gapi.client.sheets.spreadsheets.values.update({spreadsheetId,range:`${INCOME_LOG_SHEET}!A1:F1`,valueInputOption:'RAW',resource:{values:[['Timestamp','Date','Category','Amount','Notes','ID']]}});
    }
  } catch(e){console.warn(e);}
}

// ======================== INIT ===========================
async function initDashboard() {
  await initPageAuth({
    onLoadLocal: (email, sheetId) => { currentUserEmail=email; spreadsheetId=sheetId; document.getElementById('loadingOverlay').style.display='flex'; },
    onReady: async (sheetId, email, token) => {
      currentUserEmail=email; spreadsheetId=sheetId; currentAccessToken=token;
      populateDashFilter(); updateSummaryTabLabels();
      await ensureCategoriesTab(spreadsheetId); await ensureIncomeTab();
      await refreshAll();
      document.getElementById('loadingOverlay').style.display='none';
      document.getElementById('mainApp').style.display='block';
    }
  });
}

document.getElementById('syncBtn').addEventListener('click', syncAll);
document.getElementById('addExpenseBtn').addEventListener('click', openExpenseModal);
document.getElementById('addIncomeBtn').addEventListener('click', openIncomeModal);
document.getElementById('manageCategoriesBtn').addEventListener('click', ()=>{window.location.href='Expenses.html';});
document.getElementById('chartYearSelect').addEventListener('change', ()=>renderChart());
document.getElementById('expenseModal').addEventListener('click', e=>{if(e.target===e.currentTarget)closeExpenseModal();});
document.getElementById('incomeModal').addEventListener('click',  e=>{if(e.target===e.currentTarget)closeIncomeModal();});
document.getElementById('detailModal').addEventListener('click',  e=>{if(e.target===e.currentTarget)closeDetailModal();});

renderBottomNav('dashboard');
initDashboard();
</script>
