<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>🔄 Recurring Expenses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <script src="utils.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --brand:        #5b5ef4;
      --brand-2:      #8b5cf6;
      --brand-grad:   linear-gradient(135deg, #5b5ef4 0%, #8b5cf6 100%);
      --surface:      #ffffff;
      --surface-2:    #f5f5fa;
      --border:       #e8e8f0;
      --text:         #14142b;
      --text-2:       #6e6e8a;
      --text-3:       #a8a8c0;
      --success:      #10b981;
      --warning:      #f59e0b;
      --danger:       #ef4444;
      --radius-lg:    24px;
      --radius-md:    16px;
      --radius-sm:    10px;
      --shadow:       0 8px 32px rgba(91,94,244,0.10);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--brand-grad);
      min-height: 100vh;
      padding-top: 60px;
      padding-bottom: 60px;
    }
    @supports (padding-top: env(safe-area-inset-top)) {
      body { padding-top: calc(60px + env(safe-area-inset-top)); }
    }

    .container { max-width: 520px; margin: 0 auto; padding: 0 18px; }

    /* Header */
    .header {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .back-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.30);
      color: #fff; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.35); }
    .header h1 {
      font-family: 'Sora', sans-serif; font-size: 22px;
      font-weight: 800; color: #fff; letter-spacing: -0.5px;
    }
    .hdr-btn {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff; padding: 7px 13px; border-radius: 30px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: background 0.15s;
    }
    .hdr-btn:hover  { background: rgba(255,255,255,0.28); }
    .hdr-btn:active { transform: scale(0.96); }

    /* Cards */
    .card {
      background: var(--surface); border-radius: var(--radius-lg);
      padding: 20px; margin-bottom: 18px; box-shadow: var(--shadow);
    }
    .card-title {
      font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 700;
      color: var(--text); margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-title-icon {
      width: 28px; height: 28px; border-radius: 9px;
      background: var(--brand-grad);
      display: inline-flex; align-items: center; justify-content: center; font-size: 14px;
    }

    /* Stats row */
    .stats-row {
      background: var(--brand-grad); border-radius: var(--radius-lg);
      padding: 18px 22px; margin-bottom: 18px;
      box-shadow: 0 8px 32px rgba(91,94,244,0.22);
      display: flex; justify-content: space-between; align-items: center;
    }
    .stats-label { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.70); text-transform: uppercase; letter-spacing: 0.06em; }
    .stats-total { font-family: 'Sora', sans-serif; font-size: 32px; font-weight: 800; color: #fff; line-height: 1.1; margin-top: 4px; }
    .stats-sub { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 2px; }

    /* Add button */
    .add-btn {
      width: 100%; padding: 14px;
      background: var(--brand-grad); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-size: 15px; font-weight: 700;
      font-family: 'Sora', sans-serif; cursor: pointer;
      box-shadow: 0 4px 16px rgba(91,94,244,0.28);
      transition: opacity 0.15s, transform 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-bottom: 18px;
    }
    .add-btn:hover  { opacity: 0.92; }
    .add-btn:active { transform: scale(0.97); }

    /* Recurring row */
    .sub-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .sub-row:last-child { border-bottom: none; }
    .sub-icon {
      width: 44px; height: 44px; border-radius: 14px;
      background: #f0eef9; display: flex; align-items: center;
      justify-content: center; font-size: 22px; flex-shrink: 0;
    }
    .sub-info { flex: 1; min-width: 0; }
    .sub-name { font-weight: 700; font-size: 15px; color: var(--text); }
    .sub-meta {
      font-size: 11px; color: var(--text-3); margin-top: 4px;
      display: flex; flex-wrap: wrap; gap: 10px;
    }
    .sub-amount { font-weight: 700; font-size: 14px; color: var(--brand); flex-shrink: 0; }
    .sub-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .action-btn {
      background: none; border: none;
      width: 32px; height: 32px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 15px; transition: background 0.15s;
    }
    .action-btn:hover { background: var(--surface-2); }
    .inactive-row { opacity: 0.55; background: var(--surface-2); border-radius: 12px; margin-top: 4px; }
    .badge-inactive {
      background: #e2e2ea; color: #6e6e8a; font-size: 10px;
      font-weight: 700; padding: 2px 8px; border-radius: 20px;
      margin-left: 8px;
    }

    /* Toggle switch */
    .toggle-switch {
      position: relative; width: 40px; height: 22px;
      background: var(--border); border-radius: 11px;
      cursor: pointer; transition: background 0.2s;
    }
    .toggle-switch.active { background: var(--success); }
    .toggle-switch::after {
      content: ''; position: absolute;
      width: 18px; height: 18px; border-radius: 50%;
      background: #fff; top: 2px; left: 2px;
      transition: transform 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.18);
    }
    .toggle-switch.active::after { transform: translateX(18px); }

    /* Modal */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      z-index: 3000; display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; transition: opacity 0.25s; pointer-events: none;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal {
      background: #fff; border-radius: 28px 28px 0 0;
      padding: 24px 20px 36px; width: 100%; max-width: 520px;
      transform: translateY(40px);
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
      max-height: 90vh; overflow-y: auto;
    }
    .modal-backdrop.open .modal { transform: translateY(0); }
    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 4px; margin: 0 auto 18px; }
    .modal-title { font-family: 'Sora', sans-serif; font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .form-group label {
      display: block; font-size: 11px; font-weight: 700; color: var(--text-2);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
    }
    .form-group input, .form-group select {
      width: 100%; padding: 12px 14px;
      border: 2px solid var(--border); border-radius: var(--radius-sm);
      font-size: 15px; font-family: 'DM Sans', sans-serif;
      background: var(--surface-2); color: var(--text);
    }
    .form-group input:focus, .form-group select:focus {
      outline: none; border-color: var(--brand); background: #fff;
    }
    .modal-footer {
      display: flex; gap: 10px; margin-top: 20px;
    }
    .btn-cancel {
      flex: 1; padding: 13px; background: var(--surface-2); color: var(--text-2);
      border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
      cursor: pointer;
    }
    .btn-save {
      flex: 2; padding: 13px; background: var(--brand-grad); color: #fff;
      border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(91,94,244,0.28);
    }
    .btn-danger {
      flex: 1; background: #fee2e2; color: #991b1b;
      border: 1.5px solid #fca5a5;
    }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--text); color: #fff; padding: 11px 22px; border-radius: 30px;
      font-size: 13px; font-weight: 600; z-index: 9999; white-space: nowrap;
      transition: transform 0.3s; pointer-events: none; max-width: 90vw;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--success); }
    .toast.error   { background: var(--danger); }
    .loading-overlay {
      position: fixed; inset: 0; background: rgba(91,94,244,0.18);
      backdrop-filter: blur(4px); z-index: 9000;
      display: flex; align-items: center; justify-content: center;
    }
    .loading-box {
      background: #fff; border-radius: 20px; padding: 28px 32px;
      text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .spinner {
      display: inline-block; width: 24px; height: 24px;
      border: 3px solid #ededff; border-top-color: var(--brand);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 36px 20px; color: var(--text-3); }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box"><div class="spinner"></div><p style="margin-top:12px">Loading recurring expenses…</p></div>
</div>

<div class="container">
  <div class="header">
    <div class="header-left">
      <button class="back-btn" onclick="window.location.href='Home.html'">←</button>
      <h1>🔄 Recurring Expenses</h1>
    </div>
    <button class="hdr-btn" onclick="window.location.href='Expenses.html'">📋 Expenses</button>
  </div>

  <div class="stats-row" id="statsRow" style="display:none">
    <div>
      <div class="stats-label">This month total</div>
      <div class="stats-total" id="monthTotal">EGP 0</div>
      <div class="stats-sub" id="activeCount"></div>
    </div>
    <div style="text-align:right">
      <div class="stats-label">Next payment day</div>
      <div class="stats-total" id="nextPaymentBadge" style="font-size:22px">—</div>
    </div>
  </div>

  <button class="add-btn" onclick="openAddModal()">➕ Add Recurring Expense</button>

  <div class="card">
    <div class="card-title"><span class="card-title-icon">🔄</span> Active Recurring Expenses</div>
    <div id="activeList"></div>
  </div>

  <div class="card" id="inactiveCard" style="display:none">
    <div class="card-title"><span class="card-title-icon">⏸️</span> Inactive / Cancelled</div>
    <div id="inactiveList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Add/Edit Modal -->
<div class="modal-backdrop" id="subModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">➕ New Recurring Expense</div>
    <div class="form-group">
      <label>Name *</label>
      <input type="text" id="subName" placeholder="e.g. Netflix, iCloud, Gym" maxlength="50">
    </div>
    <!-- Row: Frequency + Amount -->
    <div class="form-row">
      <div class="form-group">
        <label>Frequency</label>
        <select id="subFreq">
          <option value="Monthly">Monthly</option>
          <option value="Quarterly">Quarterly</option>
          <option value="Annual">Annual</option>
        </select>
      </div>
      <div class="form-group">
        <label>Amount (EGP) *</label>
        <input type="number" id="subAmount" placeholder="0.00" step="0.01" min="0">
      </div>
    </div>
    <!-- Row: Starting Month (as month name) + Payment Day -->
    <div class="form-row">
      <div class="form-group">
        <label>Starting Month</label>
        <select id="subStartMonth">
          <option value="1">January</option>
          <option value="2">February</option>
          <option value="3">March</option>
          <option value="4">April</option>
          <option value="5">May</option>
          <option value="6">June</option>
          <option value="7">July</option>
          <option value="8">August</option>
          <option value="9">September</option>
          <option value="10">October</option>
          <option value="11">November</option>
          <option value="12">December</option>
        </select>
      </div>
      <div class="form-group">
        <label>Payment Day (1–31)</label>
        <input type="number" id="subPaymentDay" placeholder="15" min="1" max="31">
      </div>
    </div>

    <div class="modal-footer" id="modalFooter">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveRecurring()">Save</button>
    </div>
  </div>
</div>

<script>
// ======================= GLOBAL STATE =======================
let recurringList = [];        // full array of Recurring
let spreadsheetId = null;
let currentUserEmail = null;
let currentAccessToken = null;
let editingId = null;          // index in recurringList being edited

const RECURRING_SHEET = 'Recurring';   // sheet tab name

// ======================= HELPER FUNCTIONS =======================
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

function formatMoney(amount) {
  return `EGP ${Number(amount).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})}`;
}

function parseRecurringRow(row) {
  return {
    id:          row[0] ? parseInt(row[0]) : Date.now() + Math.random(),
    name:        row[1] || '',
    frequency:   row[2] || 'Monthly',
    amount:      parseFloat(row[3]) || 0,
    startMonth:  parseInt(row[4]) || 1,
    paymentDay:  parseInt(row[5]) || 1,
    active:      row[6] === 'true' || row[6] === true,
  };
}

function recurringToRow(sub) {
  return [
    sub.id,
    sub.name,
    sub.frequency,
    sub.amount,
    sub.startMonth,
    sub.paymentDay,
    sub.active ? 'true' : 'false',
  ];
}

async function loadRecurringFromSheet() {
  if (!spreadsheetId) return false;
  try {
    const res = await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId,
      range: `${RECURRING_SHEET}!A2:G`
    });
    const rows = res.result.values || [];
    recurringList = rows.map(parseRecurringRow);
    recurringList = recurringList.filter(s => s.name && s.name.trim() !== '');
    saveRecurringLocal();
    return true;
  } catch (err) {
    console.error('loadRecurring error', err);
    return false;
  }
}

async function saveRecurringToSheet() {
  if (!spreadsheetId) return false;
  try {
    const rows = recurringList.map(r => recurringToRow(r));
    await gapi.client.sheets.spreadsheets.values.clear({
      spreadsheetId,
      range: `${RECURRING_SHEET}!A2:G`,
    });
    if (rows.length) {
      await gapi.client.sheets.spreadsheets.values.update({
        spreadsheetId,
        range: `${RECURRING_SHEET}!A2:G`,
        valueInputOption: 'RAW',
        resource: { values: rows }
      });
    }
    return true;
  } catch (err) {
    console.error(err);
    return false;
  }
}

async function ensureRecurringTab() {
  try {
    const sheetMeta = await gapi.client.sheets.spreadsheets.get({ spreadsheetId });
    const exists = sheetMeta.result.sheets.some(s => s.properties.title === RECURRING_SHEET);
    if (!exists) {
      await gapi.client.sheets.spreadsheets.batchUpdate({
        spreadsheetId,
        resource: { requests: [{ addSheet: { properties: { title: RECURRING_SHEET } } }] }
      });
      await gapi.client.sheets.spreadsheets.values.update({
        spreadsheetId,
        range: `${RECURRING_SHEET}!A1:G1`,
        valueInputOption: 'RAW',
        resource: { values: [['ID','Name','Frequency','Amount','StartMonth','PaymentDay','Active']] }
      });
    }
  } catch(e) { console.warn(e); }
}

function saveRecurringLocal() {
  if (currentUserEmail) localStorage.setItem(`recurring_${currentUserEmail}`, JSON.stringify(recurringList));
}
function loadRecurringLocal() {
  if (currentUserEmail) {
    const local = localStorage.getItem(`recurring_${currentUserEmail}`);
    if (local) recurringList = JSON.parse(local);
  }
}

// ======================= UI RENDER =======================
function computeMonthlyTotal() {
  const now = new Date();
  const currentMonth = now.getMonth() + 1;
  const currentYear = now.getFullYear();
  let total = 0;
  for (let sub of recurringList) {
    if (!sub.active) continue;
    let due = false;
    if (sub.frequency === 'Monthly') {
      due = (sub.startMonth <= currentMonth);
    } else if (sub.frequency === 'Quarterly') {
      const monthsSinceStart = (currentYear - 2024) * 12 + (currentMonth - sub.startMonth);
      due = (monthsSinceStart >= 0 && monthsSinceStart % 3 === 0);
    } else if (sub.frequency === 'Annual') {
      due = (sub.startMonth === currentMonth);
    }
    if (due) total += sub.amount;
  }
  return total;
}

function getMonthName(monthNum) {
  const names = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return names[monthNum-1] || '';
}

function render() {
  const active = recurringList.filter(s => s.active === true);
  const inactive = recurringList.filter(s => s.active === false);
  
  const activeContainer = document.getElementById('activeList');
  const inactiveContainer = document.getElementById('inactiveList');
  const inactiveCard = document.getElementById('inactiveCard');
  
  if (active.length === 0) {
    activeContainer.innerHTML = '<div class="empty-state"><span>✨ No active recurring expenses</span></div>';
  } else {
    activeContainer.innerHTML = active.map((sub, idx) => {
      const globalIdx = recurringList.findIndex(s => s.id === sub.id);
      const freqIcon = sub.frequency === 'Monthly' ? '📅' : (sub.frequency === 'Quarterly' ? '📆' : '🗓️');
      return `
        <div class="sub-row">
          <div class="sub-icon">${getIconForName(sub.name)}</div>
          <div class="sub-info">
            <div class="sub-name">${escapeHtml(sub.name)}</div>
            <div class="sub-meta">
              <span>${freqIcon} ${sub.frequency}</span>
              <span>💳 Day ${sub.paymentDay}</span>
              <span>🚀 ${getMonthName(sub.startMonth)}</span>
            </div>
          </div>
          <div class="sub-amount">${formatMoney(sub.amount)}</div>
          <div class="sub-actions">
            <button class="action-btn" onclick="toggleActive(${globalIdx})" title="${sub.active ? 'Pause/Cancel' : 'Reactivate'}">${sub.active ? '⏸️' : '▶️'}</button>
            <button class="action-btn" onclick="openEditModal(${globalIdx})" title="Edit">✏️</button>
            <button class="action-btn" onclick="deleteRecurring(${globalIdx})" title="Delete">🗑️</button>
          </div>
        </div>`;
    }).join('');
  }
  
  if (inactive.length === 0) {
    inactiveCard.style.display = 'none';
  } else {
    inactiveCard.style.display = 'block';
    inactiveContainer.innerHTML = inactive.map((sub, idx) => {
      const globalIdx = recurringList.findIndex(s => s.id === sub.id);
      return `
        <div class="sub-row inactive-row">
          <div class="sub-icon">${getIconForName(sub.name)}</div>
          <div class="sub-info">
            <div class="sub-name">${escapeHtml(sub.name)} <span class="badge-inactive">cancelled</span></div>
            <div class="sub-meta">${sub.frequency} · ${formatMoney(sub.amount)} · Day ${sub.paymentDay} · ${getMonthName(sub.startMonth)}</div>
          </div>
          <div class="sub-actions">
            <button class="action-btn" onclick="toggleActive(${globalIdx})" title="Reactivate">▶️</button>
            <button class="action-btn" onclick="deleteRecurring(${globalIdx})" title="Delete permanently">🗑️</button>
          </div>
        </div>`;
    }).join('');
  }
  
  // Update stats
  const monthly = computeMonthlyTotal();
  const statsRow = document.getElementById('statsRow');
  const activeCountSpan = document.getElementById('activeCount');
  if (active.length > 0) {
    statsRow.style.display = 'flex';
    document.getElementById('monthTotal').textContent = formatMoney(monthly);
    activeCountSpan.textContent = `${active.length} active recurring expense${active.length !== 1 ? 's' : ''}`;
    
    const today = new Date();
    const currentDay = today.getDate();
    let nextDay = null;
    for (let sub of active) {
      let payDay = sub.paymentDay;
      if (payDay > 31) payDay = 31;
      if (payDay >= currentDay) {
        if (nextDay === null || payDay < nextDay) nextDay = payDay;
      }
    }
    if (nextDay === null) {
      for (let sub of active) {
        let payDay = sub.paymentDay;
        if (payDay > 31) payDay = 31;
        if (nextDay === null || payDay < nextDay) nextDay = payDay;
      }
    }
    document.getElementById('nextPaymentBadge').textContent = nextDay ? `Day ${nextDay}` : '—';
  } else {
    statsRow.style.display = 'none';
  }
}

function getIconForName(name) {
  const icons = { 'netflix':'🎬','spotify':'🎵','icloud':'☁️','adobe':'🎨','google':'📧','chatgpt':'🤖','claude':'🧠','genspark':'✨','we':'📡','vodafone':'📱','zayed':'🚗','shahid':'📺','podcast':'🎙️' };
  const lower = name.toLowerCase();
  for (let [k, v] of Object.entries(icons)) if (lower.includes(k)) return v;
  return '🔄';
}
function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

// ======================= CRUD =======================
async function toggleActive(index) {
  recurringList[index].active = !recurringList[index].active;
  render();
  const ok = await saveRecurringToSheet();
  if (ok) showToast(recurringList[index].active ? '✅ Recurring Expense resumed' : '⏸️ Recurring Expense cancelled/stopped');
  else { recurringList[index].active = !recurringList[index].active; render(); showToast('❌ Failed to update', 'error'); }
}

async function deleteRecurring(index) {
  if (!confirm(`Delete "${recurringList[index].name}" permanently?`)) return;
  const removed = recurringList.splice(index, 1);
  render();
  const ok = await saveRecurringToSheet();
  if (ok) showToast(`🗑️ ${removed[0].name} deleted`);
  else { recurringList.splice(index, 0, removed[0]); render(); showToast('❌ Delete failed', 'error'); }
}

function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').innerText = '➕ New Recurring Expense';
  document.getElementById('subName').value = '';
  document.getElementById('subFreq').value = 'Monthly';
  document.getElementById('subAmount').value = '';
  const currentMonth = new Date().getMonth() + 1;
  document.getElementById('subStartMonth').value = currentMonth;
  document.getElementById('subPaymentDay').value = '15';
  document.getElementById('modalFooter').innerHTML = `<button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="saveRecurring()">Save</button>`;
  document.getElementById('subModal').classList.add('open');
}

function openEditModal(index) {
  editingId = index;
  const sub = recurringList[index];
  document.getElementById('modalTitle').innerText = '✏️ Edit Recurring';
  document.getElementById('subName').value = sub.name;
  document.getElementById('subFreq').value = sub.frequency;
  document.getElementById('subAmount').value = sub.amount;
  document.getElementById('subStartMonth').value = sub.startMonth;
  document.getElementById('subPaymentDay').value = sub.paymentDay;
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    <button class="btn-danger" style="flex:1" onclick="deleteAndClose()">Delete</button>
    <button class="btn-save" onclick="saveRecurring()">Save</button>`;
  document.getElementById('subModal').classList.add('open');
}

async function deleteAndClose() {
  if (editingId !== null && confirm('Delete this recurring expense?')) {
    const removed = recurringList.splice(editingId, 1);
    await saveRecurringToSheet();
    render();
    closeModal();
    showToast(`🗑️ ${removed[0].name} deleted`);
  }
}

async function saveRecurring() {
  const name = document.getElementById('subName').value.trim();
  const frequency = document.getElementById('subFreq').value;
  const amount = parseFloat(document.getElementById('subAmount').value);
  const startMonth = parseInt(document.getElementById('subStartMonth').value);
  const paymentDay = parseInt(document.getElementById('subPaymentDay').value);

  if (!name) { showToast('❌ Name required', 'error'); return; }
  if (isNaN(amount) || amount <= 0) { showToast('❌ Valid amount required', 'error'); return; }
  if (startMonth < 1 || startMonth > 12) { showToast('❌ Start month invalid', 'error'); return; }
  if (paymentDay < 1 || paymentDay > 31) { showToast('❌ Payment day 1-31', 'error'); return; }

  const newSub = {
    id: editingId !== null ? recurringList[editingId].id : Date.now() + Math.random(),
    name, frequency, amount, startMonth, paymentDay,
    active: editingId !== null ? recurringList[editingId].active : true,
  };

  if (editingId !== null) {
    recurringList[editingId] = newSub;
  } else {
    recurringList.push(newSub);
  }
  render();
  const ok = await saveRecurringToSheet();
  if (ok) showToast(editingId !== null ? '✅ Updated' : '✅ Recurring Expense added');
  else showToast('❌ Failed to save to sheet', 'error');
  closeModal();
}

function closeModal() {
  document.getElementById('subModal').classList.remove('open');
  editingId = null;
}

// ======================= AUTH & INIT =======================
async function initGapiClient() {
  await new Promise(resolve => { if (gapi.client?.drive) resolve(); else gapi.load('client', resolve); });
  await gapi.client.init({ apiKey: '', discoveryDocs: DISCOVERY_DOCS });
}

function saveAccessToken(token) { sessionStorage.setItem('gapi_access_token', token); }
function getSavedAccessToken() { return sessionStorage.getItem('gapi_access_token'); }

async function loadPage() {
  const token = localStorage.getItem('google_token');
  if (!token) { showToast('❌ Please sign in first', 'error'); setTimeout(() => window.location.href='Home.html', 1500); return; }
  currentUserEmail = getUserEmailFromToken(token);
  spreadsheetId = localStorage.getItem(`spreadsheet_id_${currentUserEmail}`);

  document.getElementById('loadingOverlay').style.display = 'flex';

  await initGapiClient();
  loadRecurringLocal();

  const savedToken = getSavedAccessToken();
  if (savedToken) {
    currentAccessToken = savedToken;
    gapi.client.setToken({ access_token: currentAccessToken });
    try {
      await gapi.client.drive.files.list({ q: 'trashed=false', pageSize:1 });
      await ensureRecurringTab();
      await loadRecurringFromSheet();
      render();
      document.getElementById('loadingOverlay').style.display = 'none';
      return;
    } catch(e) { /* token expired */ }
  }

  const tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPES, prompt: '',
    callback: async (resp) => {
      if (!resp.access_token) return;
      currentAccessToken = resp.access_token;
      saveAccessToken(currentAccessToken);
      gapi.client.setToken({ access_token: currentAccessToken });
      await ensureRecurringTab();
      await loadRecurringFromSheet();
      render();
      document.getElementById('loadingOverlay').style.display = 'none';
    }
  });
  tokenClient.requestAccessToken();
}

loadPage();
</script>
