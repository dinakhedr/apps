<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Recurring Expenses</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <link rel="icon" type="image/png" sizes="180x180" href="icon.png">
  <link rel="shortcut icon" href="icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="utils.js"></script>
  <script src="auth.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    /* ── Header ── */
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .header h1 { font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }

    /* ── Card ── */
    .card { background: var(--surface); border-radius: var(--radius-lg); margin-bottom: 16px; box-shadow: var(--shadow); overflow: hidden; }

    /* ── Subscription row ── */
    .sub-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .sub-card:last-child { border-bottom: none; }
    .sub-card:first-child { padding-top: 0; }

    
    /* Left status bar */
    .sub-card::before {
      content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      width: 3px; height: 34px; border-radius: 0 3px 3px 0; background: transparent;
    }
    .sub-card.overdue::before  { background: var(--danger); }
    .sub-card.paid-row::before { background: var(--success); }
    .sub-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: var(--surface-2); display: flex; align-items: center;
      justify-content: center; font-size: 19px; flex-shrink: 0;
    }
    .sub-card.overdue  .sub-icon { background: #fef2f2; }
    .sub-card.paid-row .sub-icon { background: #f0fdf4; }
    .sub-info { flex: 1; min-width: 0; }
    .sub-name { font-weight: 700; font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sub-card.paid-row .sub-name { color: var(--text-3); }
    .sub-meta { font-size: 11px; margin-top: 3px; display: flex; align-items: center; gap: 5px; }
    .sub-dot   { color: var(--border); }
    .sub-status { font-weight: 600; }
    .sub-status.overdue  { color: var(--danger); }
    .sub-status.upcoming { color: var(--text-3); }
    .sub-status.paid     { color: var(--success); }
    /* Frequency badge */
    .sub-freq.monthly, .sub-freq.quarterly, .sub-freq.annual {
      display: inline-block; padding: 2px 8px; border-radius: 20px;
      font-size: 10px; font-weight: 700; color: #fff;
    }
    .sub-freq.monthly   { background-color: #c224d4; }
    .sub-freq.quarterly { background-color: #f59e0b; }
    .sub-freq.annual    { background-color: #3b82f6; }
    .sub-right {display: flex;align-items: center;gap: 4px;flex-shrink: 0;}
    .sub-amount {font-weight: 700;font-size: 13px;color: var(--brand);min-width: 60px;text-align: right;}
    .sub-card.paid-row .sub-amount { color: var(--text-3); }

    /* Pay button */
    .pay-btn {
      width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
      font-size: 15px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: all 0.15s; border: 1.5px solid;
    }
    .pay-btn.can-pay  { border-color: #f59e0b; background: #fffbeb; color: #d97706; font-size: 16px; }
    .pay-btn.can-pay:active { transform: scale(0.92); background: #fef3c7; }
    .pay-btn.paid     { border-color: var(--success); background: #d1fae5; color: var(--success); cursor: default; font-size: 16px; }
    .pay-btn.future   { border-color: #fde68a; background: #fffdf0; color: #d97706; cursor: not-allowed; opacity: 0.45; font-size: 15px; }

    /* More (⋮) button */
    .more-btn {
      width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
      border: none; background: none; color: var(--text-3);
      font-size: 18px; cursor: pointer; line-height: 1;
      display: flex; align-items: center; justify-content: center; transition: background 0.12s;
    }
    .more-btn:active { background: var(--surface-2); }

    /* Paused/inactive rows */
    .sub-card.inactive { opacity: 0.55; }
    .badge-inactive { background: #e2e2ea; color: #6e6e8a; font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 20px; }

    /* ── Log rows ── */
    .log-section { padding: 16px; }
    .log-title { font-size: 13px; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; display: flex; justify-content: space-between; }
    .log-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .log-row:last-child { border-bottom: none; }
    .log-icon   { width: 34px; height: 34px; border-radius: 10px; background: #f0fdf4; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
    .log-info   { flex: 1; min-width: 0; }
    .log-name   { font-weight: 700; color: var(--text); font-size: 13px; }
    .log-date   { font-size: 11px; color: var(--text-3); margin-top: 2px; }
    .log-amount { font-weight: 700; color: var(--success); font-size: 13px; flex-shrink: 0; }

    /* ── Summary Card (matching Installments) ── */
    .summary-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .summary-header {
      background: var(--brand-grad);
      color: #fff;
      padding: 16px 20px;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .summary-header h3 {
      font-family: 'Sora', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin: 0;
    }
    .summary-year-header {
      background: linear-gradient(135deg, #f5f5fa 0%, #ffffff 100%);
      color: var(--text);
      padding: 14px 20px;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 15px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .summary-year-total {
      font-size: 13px;
      font-weight: 600;
      background: var(--brand-grad);
      color: #fff;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .summary-month-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
    }
    .summary-month-row.past-month {
      background: #e8f5e9;
    }
    .summary-month-row:hover {
      background: var(--surface-2);
    }
    .summary-month-row:active {
      background: #ededff;
    }
    .summary-month-left {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }
    .summary-month-name {
      font-weight: 600;
      font-size: 15px;
      color: var(--text);
    }
    .summary-month-count {
      font-size: 11px;
      color: var(--text-3);
    }
    .summary-month-amount {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: var(--brand);
    }
    .summary-empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-3);
    }
    .summary-empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    /* Year dropdown */
    .year-dropdown {
      position: relative;
      margin: 16px 20px 20px 20px;
    }
    .year-dropdown-btn {
      background: var(--surface-2);
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }
    .year-dropdown-btn:hover {
      border-color: var(--brand);
      background: #fff;
    }
    .year-dropdown-arrow {
      font-size: 12px;
      color: var(--text-2);
      transition: transform 0.2s;
    }
    .year-dropdown.open .year-dropdown-arrow {
      transform: rotate(180deg);
    }
    .year-dropdown-menu {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #fff;
      border-radius: var(--radius-md);
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      z-index: 100;
      display: none;
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid var(--border);
    }
    .year-dropdown.open .year-dropdown-menu {
      display: block;
    }
    .year-dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.12s;
      border-bottom: 1px solid var(--border);
    }
    .year-dropdown-item.selected {
      background: #e8f5e9;
    }
    .year-dropdown-item:hover {
      background: var(--surface-2);
    }
    .year-dropdown-item input {
      width: 18px;
      height: 18px;
      margin: 0;
      cursor: pointer;
      accent-color: var(--brand);
    }
    .year-dropdown-item label {
      flex: 1;
      cursor: pointer;
      margin: 0;
      text-transform: none;
      letter-spacing: normal;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }
    .year-dropdown-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      position: sticky;
      bottom: 0;
    }
    .year-dropdown-footer-left {
      display: flex;
      gap: 12px;
    }
    .year-dropdown-footer button {
      background: none;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
    }
    .year-select-all {
      color: var(--brand);
    }
    .year-clear-all {
      color: var(--danger);
    }
    .year-done-btn {
      background: var(--brand);
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
    }
    .year-done-btn:hover {
      opacity: 0.9;
    }

    /* Month detail modal */
    .detail-recurring-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .detail-recurring-item:last-child {
      border-bottom: none;
    }
    .detail-recurring-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .detail-recurring-info {
      flex: 1;
    }
    .detail-recurring-name {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
    }
    .detail-recurring-amount {
      font-weight: 700;
      font-size: 15px;
      color: var(--brand);
    }
    .detail-recurring-status {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      margin-top: 4px;
    }
    .detail-status-paid {
      background: #d1fae5;
      color: #065f46;
    }
    .detail-status-pending {
      background: #fef3c7;
      color: #d97706;
    }
    .detail-right-col {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    /* Add/Edit modal form */
    .form-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .form-group { margin-bottom: 0; }
    .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .form-group input, .form-group select {
      width: 100%; padding: 12px 14px; border: 2px solid var(--border); border-radius: var(--radius-sm);
      font-size: 15px; font-family: 'DM Sans', sans-serif;
      background: var(--surface-2); color: var(--text);
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--brand); background: #fff; }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <p style="margin-top:12px;font-size:14px;color:#6e6e8a">Loading…</p>
  </div>
</div>

<div class="container">

  <div class="header">
    <h1>🔄 Recurring</h1>
    <div class="header-actions">
      <button class="hdr-icon-btn" id="syncBtn" onclick="syncAll()" title="Sync">↻</button>
      <button class="hdr-icon-btn" onclick="window.location.href='Settings.html'" title="Settings">⚙️</button>
      <button class="hdr-icon-btn danger" onclick="logout()" title="Logout">⏻</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="statsRow" style="display:none">
    <div>
      <div class="stats-label">This month</div>
      <div class="stats-total" id="monthTotal">EGP 0</div>
      <div class="stats-sub" id="activeCount"></div>
    </div>
    <div style="text-align:right">
      <div class="stats-label">Next due</div>
      <div class="stats-total" id="nextPaymentBadge" style="font-size:19px">—</div>
    </div>
  </div>

  <button class="add-btn" onclick="openAddModal()">➕ Add Recurring Expense</button>

  <!-- Main card with tabs (now 3 tabs) -->
  <div class="card">
    <div class="tab-bar">
      <button class="tab-btn active" id="tabActiveBtn" onclick="switchTab('active')">
        Active <span class="tab-badge" id="overdueCount" style="display:none"></span>
      </button>
      <button class="tab-btn" id="tabPausedBtn" onclick="switchTab('paused')">
        Cancelled
      </button>
      <button class="tab-btn" id="tabAllBtn" onclick="switchTab('all')">
        All
      </button>
    </div>
    <div class="tab-content active" id="tabActive">
      <div id="activeList"></div>
    </div>
    <div class="tab-content" id="tabAll">
      <div id="allList"></div>
    </div>
    <div class="tab-content" id="tabPaused">
      <div id="inactiveList"></div>
    </div>
  </div>

  <!-- Recurring Log -->
  <div class="card" id="logCard" style="display:none">
    <div class="log-section">
      <div class="log-title">
        <span>📒 Paid This Month</span>
        <span id="logMonthLabel" style="font-weight:500;text-transform:none;letter-spacing:0;color:var(--text-3)"></span>
      </div>
      <div id="logList"></div>
    </div>
  </div>

  <!-- Recurring Summary Section (matching Installments) -->
  <div class="summary-card">
    <div class="summary-header">
      <h3>📊 Recurring Summary</h3>
    </div>
    
    <div class="year-dropdown" id="yearDropdown">
      <div class="year-dropdown-btn" onclick="toggleYearDropdown()">
        <span id="selectedYearsText">Select years</span>
        <span class="year-dropdown-arrow">▼</span>
      </div>
      <div class="year-dropdown-menu" id="yearDropdownMenu">
        <div id="yearCheckboxList"></div>
        <div class="year-dropdown-footer">
          <div class="year-dropdown-footer-left">
            <button class="year-select-all" onclick="selectAllYears(); event.stopPropagation();">Select All</button>
            <button class="year-clear-all" onclick="clearAllYears(); event.stopPropagation();">Clear All</button>
          </div>
          <button class="year-done-btn" onclick="closeYearDropdown(); event.stopPropagation();">Done</button>
        </div>
      </div>
    </div>

    <div id="summaryContainer"></div>
  </div>

</div>

<!-- Bottom nav -->
<div id="bottomNavMount"></div>

<div class="toast" id="toast"></div>

<!-- Add/Edit Modal -->
<div class="modal-backdrop" id="subModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">➕ New Recurring Expense</div>
    <div class="form-row">
      <div class="form-group">
        <label>Name *</label>
        <input type="text" id="subName" placeholder="e.g. Netflix, Rent" maxlength="50">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="subCategory" id="subCategory"></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Frequency</label>
        <select id="subFreq">
          <option value="Monthly">Monthly</option>
          <option value="Quarterly">Quarterly</option>
          <option value="Annual">Annual</option>
        </select>
      </div>
      <div class="form-group">
        <label>Amount (EGP) *</label>
        <input type="number" id="subAmount" placeholder="0.00" step="0.01" min="0">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Starting Month</label>
        <select id="subStartMonth">
          <option value="1">January</option><option value="2">February</option>
          <option value="3">March</option><option value="4">April</option>
          <option value="5">May</option><option value="6">June</option>
          <option value="7">July</option><option value="8">August</option>
          <option value="9">September</option><option value="10">October</option>
          <option value="11">November</option><option value="12">December</option>
        </select>
      </div>
      <div class="form-group">
        <label>Payment Day (1–31)</label>
        <input type="number" id="subPaymentDay" placeholder="15" min="1" max="31">
      </div>
    </div>
    <div class="modal-footer" id="modalFooter">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveRecurring()">Save</button>
    </div>
  </div>
</div>

<!-- Month Detail Modal -->
<div class="modal-backdrop" id="monthDetailModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="monthDetailTitle">Recurring Expenses</div>
    <div id="monthDetailList"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeMonthDetailModal()">Close</button>
    </div>
  </div>
</div>

<!-- More sheet -->
<div class="sheet-backdrop" id="moreSheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle">Options</div>
    <button class="sheet-action" id="sheetPause" onclick="sheetToggleActive()">
      <span class="sheet-action-icon" id="sheetPauseIcon">⏸️</span>
      <span id="sheetPauseLabel">Pause</span>
    </button>
    <button class="sheet-action" onclick="sheetEdit()">
      <span class="sheet-action-icon">✏️</span>Edit
    </button>
    <button class="sheet-action" id="sheetDeleteBtn" onclick="sheetDelete()" style="color:var(--danger)">
      <span class="sheet-action-icon">🗑️</span>Delete
    </button>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────
let recurringList      = [];
let spreadsheetId      = null;
let currentUserEmail   = null;
let currentAccessToken = null;
let editingId          = null;
let sheetTargetIdx     = null;
let activeTab          = 'active';

// Summary years
const AVAILABLE_YEARS = [2026, 2027, 2028, 2029, 2030];
let selectedYears = new Set([new Date().getFullYear()]);

// RECURRING_SHEET and RECURRING_LOG_SHEET are defined in utils.js
const MONTHS = MONTHS_SHORT; // alias → defined in utils.js
// MONTHS_FULL defined in utils.js

// ── Paid tracking ──────────────────────────────────────────
function paidKey() { const n=new Date(); return `paid_${currentUserEmail}_${n.getFullYear()}_${n.getMonth()+1}`; }
function getPaidSet()   { const r=localStorage.getItem(paidKey()); return r?new Set(JSON.parse(r)):new Set(); }
function savePaidSet(s) { localStorage.setItem(paidKey(), JSON.stringify([...s])); }
function isPaid(id)     { return getPaidSet().has(String(id)); }

// ── Helpers ────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().split('T')[0]; }

// ── Tab switch ─────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tabActiveBtn').classList.toggle('active', tab==='active');
  document.getElementById('tabAllBtn').classList.toggle('active', tab==='all');
  document.getElementById('tabPausedBtn').classList.toggle('active', tab==='paused');
  document.getElementById('tabActive').classList.toggle('active', tab==='active');
  document.getElementById('tabAll').classList.toggle('active', tab==='all');
  document.getElementById('tabPaused').classList.toggle('active', tab==='paused');
}

// ── Due-this-month check ───────────────────────────────────
function isDueThisMonth(sub) {
  const now=new Date(); const month=now.getMonth()+1; const year=now.getFullYear();
  if (sub.frequency==='Monthly')   return sub.startMonth<=month;
  if (sub.frequency==='Quarterly') { const d=(year-2024)*12+(month-sub.startMonth); return d>=0&&d%3===0; }
  if (sub.frequency==='Annual')    return sub.startMonth===month;
  return false;
}

// ── Status info ────────────────────────────────────────────
function getStatusInfo(sub) {
  const now=new Date(); const today=now.getDate();
  if (isPaid(sub.id)) {
    const paidDate = window._paidDates && window._paidDates[String(sub.id)];
    const label = paidDate ? paidDate : `${MONTHS[new Date().getMonth()]} ${sub.paymentDay}`;
    return { state:'paid', label:`${label}`, payable:false };
  }
  if (!isDueThisMonth(sub)) {
    const next = getNextPaymentDate(sub);
    const lbl  = next ? `${MONTHS[next.getMonth()]} ${next.getDate()}` : '—';
    return { state:'future',  label:lbl,  payable:false };
  }
  if (sub.paymentDay <= today) return { state:'overdue', label:`⚠️ Due ${MONTHS[now.getMonth()]} ${sub.paymentDay}`, payable:true };
  return { state:'upcoming', label:`${MONTHS[now.getMonth()]} ${sub.paymentDay}`, payable:false };
}

// ── Next payment date ──────────────────────────────────────
function getNextPaymentDate(sub, ref=new Date()) {
  const { frequency, startMonth, paymentDay } = sub;
  const d = Math.min(paymentDay,28);
  if (frequency==='Monthly') {
    let c=new Date(ref.getFullYear(),startMonth-1,d);
    while(c<=ref) c.setMonth(c.getMonth()+1);
    c.setDate(Math.min(paymentDay,new Date(c.getFullYear(),c.getMonth()+1,0).getDate())); return c;
  }
  if (frequency==='Quarterly') {
    let c=new Date(ref.getFullYear(),startMonth-1,d);
    while(c<=ref) c.setMonth(c.getMonth()+3);
    c.setDate(Math.min(paymentDay,new Date(c.getFullYear(),c.getMonth()+1,0).getDate())); return c;
  }
  if (frequency==='Annual') {
    let c=new Date(ref.getFullYear(),startMonth-1,d);
    if(c<=ref) c.setFullYear(c.getFullYear()+1);
    c.setDate(Math.min(paymentDay,new Date(c.getFullYear(),c.getMonth()+1,0).getDate())); return c;
  }
  return null;
}

// ======================== YEAR SUMMARY ==========================
function getYearSummary(year) {
  const monthlyTotals = {};
  const monthlyRecurring = {};
  
  for (let i = 0; i < 12; i++) {
    monthlyTotals[i] = 0;
    monthlyRecurring[i] = [];
  }
  
  // Get all paid logs
  const paidLogsMap = new Map(); // key: "subscriptionName_year_month" -> true
  try {
    const paidEntries = window._allPaidLogs || [];
    paidEntries.forEach(log => {
      if (log.date) {
        const d = parseLocalDate(log.date);
        const key = `${log.name}_${d.getFullYear()}_${d.getMonth()}`;
        paidLogsMap.set(key, true);
      }
    });
  } catch(e) { console.error(e); }
  
  recurringList.forEach(sub => {
    // For each subscription, we need to determine which months it was active
    // Active means: either it's still active OR we have paid logs for it
    
    let currentDate = new Date(sub.startYear || new Date().getFullYear(), sub.startMonth - 1, 1);
    const maxDate = new Date(year + 1, 11, 31);
    
    while (currentDate <= maxDate) {
      const paymentYear = currentDate.getFullYear();
      const paymentMonth = currentDate.getMonth();
      
      // Check if there's a paid log for this month
      const paidKey = `${sub.name}_${paymentYear}_${paymentMonth}`;
      const hasPaidLog = paidLogsMap.has(paidKey);
      
      // Only include if:
      // 1. It's the selected year AND
      // 2. Either (subscription is active OR there's a paid log for this month)
      if (paymentYear === year && (sub.active || hasPaidLog)) {
        monthlyTotals[paymentMonth] = (monthlyTotals[paymentMonth] || 0) + sub.amount;
        monthlyRecurring[paymentMonth].push({
          id: sub.id,
          name: sub.name,
          category: sub.category,
          amount: sub.amount,
          frequency: sub.frequency,
          paymentDay: sub.paymentDay,
          isPaid: hasPaidLog
        });
      }
      
      // Advance based on frequency
      if (sub.frequency === 'Monthly') {
        currentDate.setMonth(currentDate.getMonth() + 1);
      } else if (sub.frequency === 'Quarterly') {
        currentDate.setMonth(currentDate.getMonth() + 3);
      } else if (sub.frequency === 'Annual') {
        currentDate.setFullYear(currentDate.getFullYear() + 1);
      }
      
      // Stop if we've gone too far
      if (currentDate.getFullYear() > year + 1) break;
    }
  });
  
  return { monthlyTotals, monthlyRecurring };
}

function getYearTotal(year) {
  const summary = getYearSummary(year);
  return Object.values(summary.monthlyTotals).reduce((sum, val) => sum + val, 0);
}

function renderSummary() {
  const container = document.getElementById('summaryContainer');
  const currentDate = new Date();
  const currentYear = currentDate.getFullYear();
  const currentMonth = currentDate.getMonth();
  
  let yearsToShow = AVAILABLE_YEARS.filter(y => selectedYears.has(y));
  
  if (yearsToShow.length === 0) {
    container.innerHTML = `
      <div class="summary-empty">
        <div class="summary-empty-icon">📭</div>
        <p>No years selected</p>
        <p style="font-size: 12px; margin-top: 8px;">Select years from the dropdown above to view summary</p>
      </div>
    `;
    return;
  }
  
  let html = '';
  
  yearsToShow.forEach(year => {
    const summary = getYearSummary(year);
    const monthlyTotals = summary.monthlyTotals;
    const monthlyRecurring = summary.monthlyRecurring;
    const yearTotal = getYearTotal(year);
    
    const hasData = Object.values(monthlyTotals).some(v => v > 0);
    if (!hasData) return;
    
    html += `<div class="summary-year-header">
        <span>📅 ${year}</span>
        <span class="summary-year-total">Total: ${formatMoney(yearTotal)}</span>
      </div>`;
    
    for (let i = 0; i < 12; i++) {
      const amount = monthlyTotals[i];
      if (amount > 0) {
        const monthName = MONTHS_FULL[i];
        const count = monthlyRecurring[i].length;
        const isPastMonth = (year === currentYear && i < currentMonth);
        const pastClass = isPastMonth ? 'past-month' : '';
        html += `
          <div class="summary-month-row ${pastClass}" onclick="openMonthDetail(${year}, ${i})">
            <div class="summary-month-left">
              <span class="summary-month-name">${monthName}</span>
              <span class="summary-month-count">${count} ${count === 1 ? 'recurring' : 'recurring'}</span>
            </div>
            <div class="summary-month-amount">${formatMoney(amount)}</div>
          </div>`;
      }
    }
  });
  
  if (html === '') {
    container.innerHTML = `
      <div class="summary-empty">
        <div class="summary-empty-icon">📭</div>
        <p>No recurring expenses scheduled for selected years</p>
      </div>

  } else {
    container.innerHTML = html;
  }
}

// ── Render all tabs ────────────────────────────────────────
function render() {
  // Active tab logic (only due this month or paid this month)
  const allActive  = recurringList.filter(s=>s.active);
  const inactive   = recurringList.filter(s=>!s.active);
  const thisMonthActive = allActive.filter(s => isDueThisMonth(s) || isPaid(s.id));
  const order = { overdue:0, upcoming:1, future:2, paid:3 };
  const sortedActive = [...thisMonthActive].sort((a,b) => {
    const sa=getStatusInfo(a), sb=getStatusInfo(b);
    if (order[sa.state]!==order[sb.state]) return order[sa.state]-order[sb.state];
    return a.paymentDay-b.paymentDay;
  });
  const overdueN = sortedActive.filter(s=>getStatusInfo(s).state==='overdue').length;
  const badge = document.getElementById('overdueCount');
  if (overdueN>0) { badge.textContent=overdueN; badge.style.display='inline-block'; }
  else badge.style.display='none';

  const activeContainer = document.getElementById('activeList');
  if (sortedActive.length===0) {
    activeContainer.innerHTML='<div class="empty-state">No recurring expenses due this month</div>';
  } else {
    activeContainer.innerHTML = sortedActive.map(sub => {
      const globalIdx = recurringList.findIndex(s=>s.id===sub.id);
      const si = getStatusInfo(sub);
      const icon = getRecurringCategoryIcon(sub.category);
      const cardClass = si.state==='overdue' ? 'sub-card overdue' : si.state==='paid' ? 'sub-card paid-row' : 'sub-card';
      const payClass  = si.state==='paid' ? 'pay-btn paid' : si.payable ? 'pay-btn can-pay' : 'pay-btn future';
      const payIcon   = si.state === 'paid' ? '✅' : si.payable ? '💰' : '🔒';
      const payClick  = si.payable && si.state!=='paid' ? `markAsPaid(${globalIdx})` : '';
      const payTitle  = si.state==='paid' ? 'Paid this month' : si.payable ? 'Mark as paid' : 'Not due yet';
      return `
        <div class="${cardClass}">
          <div class="sub-icon">${icon}</div>
          <div class="sub-info">
            <div class="sub-name">${escapeHtml(sub.name)}</div>
            <div class="sub-meta">
              <span class="sub-freq ${sub.frequency.toLowerCase()}">${sub.frequency}</span>
              <span class="sub-dot">·</span>
              <span class="sub-status ${si.state==='overdue'?'overdue':si.state==='paid'?'paid':'upcoming'}">${si.label}</span>
            </div>
          </div>
          <div class="sub-right">
            <div class="sub-amount">${formatMoney(sub.amount)}</div>
            <button class="${payClass}" onclick="${payClick}" title="${payTitle}">${payIcon}</button>
            <button class="more-btn" onclick="openMoreSheet(${globalIdx})">⋮</button>
          </div>
        </div>`;
    }).join('');
  }

  // Paused tab
  const inactiveContainer = document.getElementById('inactiveList');
  if (inactive.length===0) {
    inactiveContainer.innerHTML='<div class="empty-state">No paused subscriptions</div>';
  } else {
    inactiveContainer.innerHTML = inactive.map(sub => {
      const globalIdx = recurringList.findIndex(s=>s.id===sub.id);
      const icon = getRecurringCategoryIcon(sub.category);
      return `
        <div class="sub-card inactive">
          <div class="sub-icon">${icon}</div>
          <div class="sub-info">
            <div class="sub-name">${escapeHtml(sub.name)} <span class="badge-inactive">paused</span></div>
            <div class="sub-meta"><span class="sub-freq ${sub.frequency.toLowerCase()}">${sub.frequency}</span><span class="sub-dot">·</span><span class="sub-status upcoming">${formatMoney(sub.amount)}</span></div>
          </div>
          <div class="sub-right">
            <button class="more-btn" onclick="openMoreSheet(${globalIdx})">⋮</button>
          </div>
        </div>`;
    }).join('');
  }

  // ── "All" tab: list all subscriptions (active + inactive) sorted by payment day ──
  const allListContainer = document.getElementById('allList');
  if (recurringList.length === 0) {
    allListContainer.innerHTML = '<div class="empty-state">No recurring expenses found</div>';
  } else {
    const allSorted = [...recurringList].sort((a,b) => a.paymentDay - b.paymentDay);
    allListContainer.innerHTML = allSorted.map(sub => {
      const globalIdx = recurringList.findIndex(s=>s.id===sub.id);
      const icon = getRecurringCategoryIcon(sub.category);
      const dayText = `Day ${sub.paymentDay}`;
      const pausedMark = !sub.active ? '<span class="badge-inactive" style="margin-left:6px;">paused</span>' : '';
      return `
        <div class="sub-card" style="opacity: ${sub.active ? 1 : 0.7};">
          <div class="sub-icon">${icon}</div>
          <div class="sub-info">
            <div class="sub-name">${escapeHtml(sub.name)}${pausedMark}</div>
            <div class="sub-meta">
              <span class="sub-freq ${sub.frequency.toLowerCase()}">${sub.frequency}</span>
              <span class="sub-dot">·</span>
              <span class="sub-status upcoming">${dayText}</span>
            </div>
          </div>
          <div class="sub-right">
            <div class="sub-amount">${formatMoney(sub.amount)}</div>
            <button class="more-btn" onclick="openMoreSheet(${globalIdx})">⋮</button>
          </div>
        </div>`;
    }).join('');

  // Stats
  const monthly = computeMonthlyTotal();
  const statsRow = document.getElementById('statsRow');
  if (allActive.length>0) {
    statsRow.style.display='flex';
    document.getElementById('monthTotal').textContent = formatMoney(monthly);
    document.getElementById('activeCount').textContent = `${allActive.length} active · ${overdueN} overdue`;
    let earliest=null;
    for (const sub of allActive) {
      if (isPaid(sub.id)) continue;
      const si=getStatusInfo(sub);
      if (si.state==='overdue') { earliest='⚠️ Now'; break; }
      if (si.state==='upcoming') { const next=getNextPaymentDate(sub); if(next&&(!earliest||next<earliest)) earliest=next; }
    }
    const badge2=document.getElementById('nextPaymentBadge');
    if (earliest==='⚠️ Now') badge2.textContent='⚠️ Now';
    else if (earliest instanceof Date) badge2.textContent=`${MONTHS[earliest.getMonth()]} ${earliest.getDate()}`;
    else badge2.textContent='✅ All paid';
  } else { statsRow.style.display='none'; }
  
  // Update summary
  buildYearCheckboxList();
  renderSummary();
}

function computeMonthlyTotal() {
  const now=new Date(); const m=now.getMonth()+1; const y=now.getFullYear();
  return recurringList.filter(s=>s.active).reduce((sum,sub)=>{
    let due=false;
    if(sub.frequency==='Monthly')   due=sub.startMonth<=m;
    else if(sub.frequency==='Quarterly') { const d=(y-2024)*12+(m-sub.startMonth); due=d>=0&&d%3===0; }
    else if(sub.frequency==='Annual')   due=sub.startMonth===m;
    return sum+(due?sub.amount:0);
  },0);
}

// ── Recurring Log ──────────────────────────────────────────
function renderLog(entries) {
  const now  = new Date();
  const card = document.getElementById('logCard');
  const list = document.getElementById('logList');
  const thisMonth = entries.filter(e => {
    if (!e.date) return false;
    const d = new Date(e.date + 'T00:00:00');
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });
  
  // Store all paid logs globally for summary reference
  window._allPaidLogs = entries;
  
  window._paidDates = {};
  thisMonth.forEach(e => {
    const d = new Date(e.date + 'T00:00:00');
    const formatted = d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
    const sub = recurringList.find(s => s.name === e.name);
    if (sub) {
      window._paidDates[String(sub.id)] = formatted;
      const paidSet = getPaidSet();
      paidSet.add(String(sub.id));
      savePaidSet(paidSet);
    }
  });
  document.getElementById('logMonthLabel').textContent = MONTHS_FULL[now.getMonth()];
  if (!thisMonth.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  list.innerHTML = thisMonth.map(e => {
    const icon = getRecurringCategoryIcon(e.category);
    const d = new Date(e.date + 'T00:00:00');
    const matchSub = recurringList.find(s => s.name === e.name);
    const payDay = matchSub ? Math.min(matchSub.paymentDay, new Date(d.getFullYear(), d.getMonth()+1, 0).getDate()) : d.getDate();
    const ds = new Date(d.getFullYear(), d.getMonth(), payDay).toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
    return `<div class="log-row"><div class="log-icon">${icon}</div><div class="log-info"><div class="log-name">${escapeHtml(e.name)}</div><div class="log-date">${ds} · ${e.category}</div></div><div class="log-amount">${formatMoney(e.amount)}</div></div>`;
  }).join('');
}

// ── Mark as paid ───────────────────────────────────────────
async function markAsPaid(index) {
  const sub=recurringList[index];
  if(isPaid(sub.id)) return;
  const paidSet=getPaidSet(); paidSet.add(String(sub.id)); savePaidSet(paidSet);
  render();
  const now = new Date();
  const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  const actualDay = Math.min(sub.paymentDay, lastDay);
  const actualPaidDate = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(actualDay).padStart(2,'0')}`;
  const ok=await writeToRecurringLog(sub, actualPaidDate);
  if(ok) { showToast(`✅ ${sub.name} logged as paid`); const e=await loadRecurringLog(); renderLog(e); }
  else   { showToast('❌ Failed to log payment','error'); paidSet.delete(String(sub.id)); savePaidSet(paidSet); render(); }
}

function openMoreSheet(index) {

async function sheetToggleActive() {
  if (sheetTargetIdx === null) return;
  const wasActive = recurringList[sheetTargetIdx].active;
  closeMoreSheet();
  recurringList[sheetTargetIdx].active = !wasActive;
  render();
  const ok = await saveRecurringToSheet();
  showToast(ok ? (wasActive ? '⏸️ Paused' : '▶️ Resumed') : '❌ Failed', ok ? 'success' : 'error');
}
function sheetEdit() { if (sheetTargetIdx === null) return; const i = sheetTargetIdx; closeMoreSheet(); openEditModal(i); }

async function sheetDelete() {
  if (sheetTargetIdx === null) return;
  const sub = recurringList[sheetTargetIdx];

  // Double-check log records using the Recurring ID
  const logs = window._allPaidLogs || [];
  const hasLogs = logs.some(l => String(l.recurringId) === String(sub.id));
  if (hasLogs) {
    showToast('❌ Cannot delete — has payment records. Pause instead.', 'error');
    closeMoreSheet();
    return;
  }

  if (!confirm(`Delete "${sub.name}" permanently?\n\nThis cannot be undone.`)) return;
  const i = sheetTargetIdx;
  closeMoreSheet();
  recurringList.splice(i, 1);
  render();
  const ok = await saveRecurringToSheet();
  showToast(ok ? `🗑️ ${sub.name} deleted` : '❌ Delete failed', ok ? 'success' : 'error');
}

async function saveRecurring() {
  const name=document.getElementById('subName').value.trim();
  const category=document.getElementById('subCategory').value;
  const frequency=document.getElementById('subFreq').value;
  const amount=parseFloat(document.getElementById('subAmount').value);
  const startMonth=parseInt(document.getElementById('subStartMonth').value);
  const paymentDay=parseInt(document.getElementById('subPaymentDay').value);
  const currentYear = new Date().getFullYear();
  if(!name)                       {showToast('❌ Name required','error');return;}
  if(isNaN(amount)||amount<=0)    {showToast('❌ Valid amount required','error');return;}
  if(startMonth<1||startMonth>12) {showToast('❌ Start month invalid','error');return;}
  if(paymentDay<1||paymentDay>31) {showToast('❌ Payment day 1-31','error');return;}
  const newSub={ 
    id: editingId !== null ? recurringList[editingId].id : Date.now() + Math.random(), 
    name, category, frequency, amount, startMonth, paymentDay, 
    startYear: currentYear,
    active: editingId !== null ? recurringList[editingId].active : true 
  };
  if(editingId!==null) recurringList[editingId]=newSub; else recurringList.push(newSub);
  render();
  const ok=await saveRecurringToSheet();
  showToast(ok?(editingId!==null?'✅ Updated':'✅ Added'):'❌ Failed to save',ok?'success':'error');
  closeModal();
}

document.getElementById('moreSheet').addEventListener('click',e=>{if(e.target===e.currentTarget)closeMoreSheet();});
document.getElementById('subModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.getElementById('monthDetailModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeMonthDetailModal();
});

// ── Sheet parsing ──────────────────────────────────────────
function parseRecurringRow(row) {
  if(row.length<9) return { id:row[0]?parseInt(row[0]):Date.now()+Math.random(), name:row[1]||'', category:'Other', frequency:row[2]||'Monthly', amount:parseFloat(row[3])||0, startMonth:parseInt(row[4])||1, paymentDay:parseInt(row[5])||1, startYear:parseInt(row[6])||new Date().getFullYear(), active:row[7]==='true' };
  return { id:row[0]?parseInt(row[0]):Date.now()+Math.random(), name:row[1]||'', category:row[2]||'Other', frequency:row[3]||'Monthly', amount:parseFloat(row[4])||0, startMonth:parseInt(row[5])||1, paymentDay:parseInt(row[6])||1, startYear:parseInt(row[7])||new Date().getFullYear(), active:row[8]==='true' };
}
function recurringToRow(s) { return [s.id,s.name,s.category,s.frequency,s.amount,s.startMonth,s.paymentDay,s.startYear||new Date().getFullYear(),s.active?'true':'false']; }

async function loadRecurringFromSheet() {
  if(!spreadsheetId) return false;
  try {
    const res=await gapi.client.sheets.spreadsheets.values.get({spreadsheetId,range:`${RECURRING_SHEET}!A2:I`});
    recurringList=(res.result.values||[]).map(parseRecurringRow).filter(s=>s.name.trim());
    saveRecurringLocal(); return true;
  } catch(e){console.error(e);return false;}
}
async function saveRecurringToSheet() {
  if(!spreadsheetId) return false;
  try {
    await gapi.client.sheets.spreadsheets.values.clear({spreadsheetId,range:`${RECURRING_SHEET}!A2:I`});
    if(recurringList.length) await gapi.client.sheets.spreadsheets.values.update({spreadsheetId,range:`${RECURRING_SHEET}!A2:I`,valueInputOption:'RAW',resource:{values:recurringList.map(recurringToRow)}});
    return true;
  } catch(e){console.error(e);return false;}
}
async function ensureRecurringTab() {
  try {
    const meta=await gapi.client.sheets.spreadsheets.get({spreadsheetId});
    const exists=meta.result.sheets.some(s=>s.properties.title===RECURRING_SHEET);
    if(!exists) {
      await gapi.client.sheets.spreadsheets.batchUpdate({spreadsheetId,resource:{requests:[{addSheet:{properties:{title:RECURRING_SHEET}}}]}});
      await gapi.client.sheets.spreadsheets.values.update({spreadsheetId,range:`${RECURRING_SHEET}!A1:I1`,valueInputOption:'RAW',resource:{values:[['ID','Name','Category','Frequency','Amount','StartMonth','PaymentDay','StartYear','Active']]}});
    } else {
      const hdr=await gapi.client.sheets.spreadsheets.values.get({spreadsheetId,range:`${RECURRING_SHEET}!A1:I1`});
      const headers=hdr.result.values?.[0]||[];
      if(headers.length<8||headers[7]!=='StartYear') {
        const old=await gapi.client.sheets.spreadsheets.values.get({spreadsheetId,range:`${RECURRING_SHEET}!A2:H`});
        const newRows=(old.result.values||[]).map(r=>r.length===7?[r[0],r[1],r[2],r[3],r[4],r[5],r[6],new Date().getFullYear(),r[7]]:r.length===8?[r[0],r[1],r[2],r[3],r[4],r[5],r[6],new Date().getFullYear(),r[7]]:r);
        await gapi.client.sheets.spreadsheets.values.clear({spreadsheetId,range:`${RECURRING_SHEET}!A1:I`});
        await gapi.client.sheets.spreadsheets.values.update({spreadsheetId,range:`${RECURRING_SHEET}!A1:I1`,valueInputOption:'RAW',resource:{values:[['ID','Name','Category','Frequency','Amount','StartMonth','PaymentDay','StartYear','Active']]}});
        if(newRows.length) await gapi.client.sheets.spreadsheets.values.update({spreadsheetId,range:`${RECURRING_SHEET}!A2:I`,valueInputOption:'RAW',resource:{values:newRows}});
      }
    }
  } catch(e){console.warn(e);}
}
async function ensureRecurringLogTab() {
  try {
    const meta = await gapi.client.sheets.spreadsheets.get({spreadsheetId});
    const exists = meta.result.sheets.some(s => s.properties.title === RECURRING_LOG_SHEET);
    if (!exists) {
      await gapi.client.sheets.spreadsheets.batchUpdate({spreadsheetId, resource:{requests:[{addSheet:{properties:{title:RECURRING_LOG_SHEET}}}]}});
      await gapi.client.sheets.spreadsheets.values.update({spreadsheetId, range:`${RECURRING_LOG_SHEET}!A1:G1`, valueInputOption:'RAW', resource:{values:[['Timestamp','Date','Name','Category','Amount','Notes','RecurringID']]}});
    } else {
      // Migrate old log that may be missing the RecurringID column
      const hdr = await gapi.client.sheets.spreadsheets.values.get({spreadsheetId, range:`${RECURRING_LOG_SHEET}!A1:G1`});
      const headers = hdr.result.values?.[0] || [];
      if (!headers.includes('RecurringID')) {
        await gapi.client.sheets.spreadsheets.values.update({spreadsheetId, range:`${RECURRING_LOG_SHEET}!G1`, valueInputOption:'RAW', resource:{values:[['RecurringID']]}});
      }
    }
  } catch(e) { console.warn(e); }
}
async function writeToRecurringLog(sub, paidDate) {
  const row = [new Date().toISOString(), paidDate, sub.name, sub.category, sub.amount, `Recurring: ${sub.name}`, sub.id];
  try {
    await gapi.client.sheets.spreadsheets.values.append({spreadsheetId, range:`${RECURRING_LOG_SHEET}!A2:G`, valueInputOption:'RAW', resource:{values:[row]}});
    return true;
  } catch(e) { console.error(e); return false; }
}
async function loadRecurringLog() {
  try {
    const res = await gapi.client.sheets.spreadsheets.values.get({spreadsheetId, range:`${RECURRING_LOG_SHEET}!A2:G`});
    return (res.result.values || []).map(r => ({
      timestamp:   r[0] || '',
      date:        r[1] || '',
      name:        r[2] || '',
      category:    r[3] || '',
      amount:      parseFloat(r[4]) || 0,
      notes:       r[5] || '',
      recurringId: r[6] || ''   // Recurring tab ID for delete-guard
    }));
  } catch(e) {
    console.error('loadRecurringLog error:', e);
    try { await ensureRecurringLogTab(); } catch(e2) {}
    return [];
  }
}

function saveRecurringLocal() { if(currentUserEmail) localStorage.setItem(`recurring_${currentUserEmail}`,JSON.stringify(recurringList)); }
function loadRecurringLocal() { if(currentUserEmail){const r=localStorage.getItem(`recurring_${currentUserEmail}`);if(r) recurringList=JSON.parse(r);} }

// ── Sync & Logout ─────────────────────────────────────────
async function syncAll() {
  const btn = document.getElementById('syncBtn');
  btn.classList.add('spinning'); btn.style.pointerEvents = 'none';
  try {
    await loadRecurringFromSheet();
    const entries = await loadRecurringLog();
    renderLog(entries);
    render();
    showToast('✅ Synced');
  } catch(e) {
    console.error('syncAll error:', e);
    showToast('❌ Sync failed', 'error');
  }
  btn.classList.remove('spinning'); btn.style.pointerEvents = '';
}


// ── Auth ───────────────────────────────────────────────────

async function initAndLoad() {
  await ensureRecurringTab();
  await ensureRecurringLogTab();
  await loadRecurringFromSheet();
  const entries = await loadRecurringLog();
  renderLog(entries);
  render();
  document.getElementById('loadingOverlay').style.display='none';
}

async function loadPage() {
  await initPageAuth({
    onLoadLocal: (email, sheetId) => {
      currentUserEmail = email;
      spreadsheetId    = sheetId;
      loadRecurringLocal();
      render();
    },
    onReady: async (sheetId, email, token) => {
      currentUserEmail   = email;
      spreadsheetId      = sheetId;
      currentAccessToken = token;
      await initAndLoad();
    }
  });
}

// Build recurring category select from utils.js RECURRING_CATEGORIES
function buildRecurringCategorySelect() {
  const sel = document.getElementById('subCategory');
  if (!sel) return;
  sel.innerHTML = RECURRING_CATEGORIES.map(c => `<option value="${c.value}">${c.icon} ${c.value}</option>`).join('');
}
buildRecurringCategorySelect();
renderBottomNav('recurring');
loadPage();
