<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>💰 Expense Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 0;
            padding-top: 60px;
            padding-bottom: 40px;
        }

        /* Fix for iPhone top banner/safe area */
        @supports (padding-top: env(safe-area-inset-top)) {
            body {
                padding-top: calc(60px + env(safe-area-inset-top));
            }
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: -0.5px;
        }

        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            margin-top: 4px;
        }

        /* Form Card */
        .form-card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .form-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-title span {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 30px;
            height: 30px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            margin-bottom: 6px;
        }

        .required:after {
            content: "*";
            color: #ff4757;
            margin-left: 4px;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8ed;
            border-radius: 14px;
            font-size: 16px;
            font-family: inherit;
            background: #fafafc;
            transition: all 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }

        /* Fix for iPhone date picker */
        input[type="date"] {
            -webkit-appearance: none;
            appearance: none;
            min-height: 50px;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            background: transparent;
            color: transparent;
            cursor: pointer;
            padding: 8px;
            position: absolute;
            right: 10px;
        }

        .date-wrapper {
            position: relative;
        }

        .date-wrapper input {
            width: 100%;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }

        /* Amount input */
        .amount-wrapper {
            position: relative;
        }

        .amount-wrapper input {
            padding-left: 50px;
        }

        .currency-symbol {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-weight: 600;
            color: #667eea;
            font-size: 16px;
            pointer-events: none;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.1s, opacity 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:active {
            transform: scale(0.97);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            transform: none;
        }

        /* Stats Card */
        .stats-card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .stats-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }

        .stats-header h3 {
            font-size: 16px;
            font-weight: 500;
            color: #666;
        }

        .total-amount {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .month-badge {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
        }

        /* Chart Card */
        .chart-card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .chart-card h3 {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-container {
            position: relative;
            height: 200px;
            margin: 10px 0;
        }

        canvas {
            max-width: 100%;
            height: auto;
        }

        .chart-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        /* Expenses Card */
        .expenses-card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .expenses-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .expenses-header h3 {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
        }

        .see-all-btn {
            background: none;
            border: none;
            color: #667eea;
            font-size: 14px;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .see-all-btn:active {
            background: #f0f0f0;
        }

        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .expense-item:last-child {
            border-bottom: none;
        }

        .expense-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .category-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .expense-details {
            flex: 1;
        }

        .expense-category {
            font-weight: 600;
            font-size: 15px;
            color: #1a1a2e;
        }

        .expense-date {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }

        .expense-note {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
        }

        .expense-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .expense-amount {
            font-weight: 700;
            font-size: 16px;
            color: #1a1a2e;
        }

        .action-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .edit-btn:active {
            background: #e8e8ed;
        }

        .delete-btn:active {
            background: #ffe5e5;
            color: #ff4757;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state span {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }

        /* Status Message */
        .status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 30px;
            font-size: 14px;
            transform: translateY(100px);
            transition: transform 0.3s;
            z-index: 1000;
        }

        .status.show {
            transform: translateY(0);
        }

        .status.success {
            background: #10b981;
        }

        .status.error {
            background: #ef4444;
        }
    </style>
    <!-- Chart.js for pie chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Expense Tracker</h1>
            <p>Track your spending, stay in control</p>
        </div>

        <!-- Form Card -->
        <div class="form-card">
            <div class="form-title">
                <span>📝</span>
                Add New Expense
            </div>
            
            <div class="form-group">
                <label class="required">Date</label>
                <div class="date-wrapper">
                    <input type="date" id="date" required>
                </div>
            </div>

            <div class="form-group">
                <label class="required">Category</label>
                <select id="category" required>
                    <option value="" disabled selected>Select a category</option>
                    <option value="Car Repairs">🚗 Car Repairs</option>
                    <option value="Cafe">☕ Cafe</option>
                    <option value="Clothes">👕 Clothes</option>
                    <option value="Entertainment">🎬 Entertainment</option>
                    <option value="Electronics">📱 Electronics</option>
                    <option value="Games">🎮 Games</option>
                    <option value="Gym">🏋️ Gym</option>
                    <option value="Health">💊 Health</option>
                    <option value="Home Repairs">🛠️ Home Repairs</option>
                    <option value="Internet">📶 Internet</option>
                    <option value="Personal Care">🧴 Personal Care</option>
                    <option value="Pets">🐾 Pets</option>
                    <option value="Petrol">⛽ Petrol</option>
                    <option value="Ride Hailing">🚕 Ride Hailing</option>
                    <option value="Smoking">🚬 Smoking</option>
                    <option value="Subscriptions">💻 Subscriptions</option>
                    <option value="Supermarket">🛒 Supermarket</option>
                    <option value="Travel">✈️ Travel</option>
                    <option value="Utilities">⚡ Utilities</option>
                </select>
            </div>

            <div class="form-group">
                <label class="required">Amount (EGP)</label>
                <div class="amount-wrapper">
                    <span class="currency-symbol">🇪🇬</span>
                    <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" required>
                </div>
            </div>

            <div class="form-group">
                <label>Notes (Optional)</label>
                <textarea id="notes" placeholder="Add a note..."></textarea>
            </div>

            <button class="submit-btn" id="submitBtn">+ Add Expense</button>
        </div>

        <!-- Stats Card - This Month Total -->
        <div class="stats-card" id="statsCard">
            <div class="stats-header">
                <h3>📊 This Month Total</h3>
            </div>
            <div class="total-amount" id="totalAmount">EGP 0</div>
            <div class="month-badge" id="monthBadge"></div>
        </div>

        <!-- Pie Chart Card -->
        <div class="chart-card" id="chartCard" style="display: none;">
            <h3>📈 This Month by Category</h3>
            <div class="chart-container">
                <canvas id="categoryChart"></canvas>
            </div>
            <div id="chartLegend" class="chart-legend"></div>
        </div>

        <!-- Expenses List -->
        <div class="expenses-card">
            <div class="expenses-header">
                <h3>📋 Recent Expenses</h3>
                <button class="see-all-btn" id="seeAllBtn">See All →</button>
            </div>
            <div id="expensesList">
                <div class="empty-state">
                    <span>📭</span>
                    <p>No expenses yet</p>
                    <p style="font-size: 12px; margin-top: 8px;">Add your first expense above</p>
                </div>
            </div>
        </div>
    </div>

    <div class="status" id="statusMsg"></div>

    <script>
        // Load expenses from localStorage
        let expenses = [];
        let categoryChart = null;

        // Get current month range
        function getCurrentMonthRange() {
            const now = new Date();
            const start = new Date(now.getFullYear(), now.getMonth(), 1);
            const end = new Date(now.getFullYear(), now.getMonth() + 1, 0);
            return { start, end, month: now.toLocaleString('default', { month: 'long', year: 'numeric' }) };
        }

        // Check if expense is in current month
        function isInCurrentMonth(expenseDate) {
            const now = new Date();
            const expense = new Date(expenseDate);
            return expense.getMonth() === now.getMonth() && expense.getFullYear() === now.getFullYear();
        }

        // Load expenses from localStorage
        function loadExpenses() {
            const saved = localStorage.getItem('private_expenses');
            if (saved) {
                expenses = JSON.parse(saved);
            }
            renderAll();
        }

        // Save to localStorage
        function saveExpenses() {
            localStorage.setItem('private_expenses', JSON.stringify(expenses));
        }

        // Format date for display
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        // Get current month total
        function getCurrentMonthTotal() {
            return expenses
                .filter(exp => isInCurrentMonth(exp.date))
                .reduce((sum, exp) => sum + exp.amount, 0);
        }

        // Get category totals for current month
        function getCategoryTotals() {
            const totals = {};
            expenses.forEach(exp => {
                if (isInCurrentMonth(exp.date)) {
                    const category = exp.category;
                    totals[category] = (totals[category] || 0) + exp.amount;
                }
            });
            return totals;
        }

        // Get icon for category
        function getCategoryIcon(category) {
            const icons = {
                'Car Repairs': '🚗',
                'Cafe': '☕',
                'Clothes': '👕',
                'Entertainment': '🎬',
                'Electronics': '📱',
                'Games': '🎮',
                'Gym': '🏋️',
                'Health': '💊',
                'Home Repairs': '🛠️',
                'Internet': '📶',
                'Personal Care': '🧴',
                'Pets': '🐾',
                'Petrol': '⛽',
                'Ride Hailing': '🚕',
                'Smoking': '🚬',
                'Subscriptions': '💻',
                'Supermarket': '🛒',
                'Travel': '✈️',
                'Utilities': '⚡'
            };
            return icons[category] || '💰';
        }

        // Get background color for category icon
        function getCategoryColor(category) {
            const colors = {
                'Car Repairs': '#ffd1d1',
                'Cafe': '#d4e8d4',
                'Clothes': '#e8d5b7',
                'Entertainment': '#d4b8ff',
                'Electronics': '#d4e8ff',
                'Games': '#d4b8ff',
                'Gym': '#ffe5b4',
                'Health': '#ffccd9',
                'Home Repairs': '#ffd1d1',
                'Internet': '#cce0ff',
                'Personal Care': '#ffccd9',
                'Pets': '#e8d5b7',
                'Petrol': '#ffd1d1',
                'Ride Hailing': '#ffe5b4',
                'Smoking': '#e0e0e0',
                'Subscriptions': '#cce7ff',
                'Supermarket': '#ffe0b5',
                'Travel': '#d4e8ff',
                'Utilities': '#ffe5b4'
            };
            return colors[category] || '#f0f0f0';
        }

        // Get chart color
        function getChartColor(category, index) {
            const chartColors = {
                'Car Repairs': '#e57373',
                'Cafe': '#81c784',
                'Clothes': '#d4a574',
                'Entertainment': '#b39ddb',
                'Electronics': '#7986cb',
                'Games': '#b39ddb',
                'Gym': '#f4c542',
                'Health': '#f48fb1',
                'Home Repairs': '#e57373',
                'Internet': '#4fc3f7',
                'Personal Care': '#f48fb1',
                'Pets': '#d4a574',
                'Petrol': '#e57373',
                'Ride Hailing': '#f4c542',
                'Smoking': '#9e9e9e',
                'Subscriptions': '#64b5f6',
                'Supermarket': '#ffb74d',
                'Travel': '#4fc3f7',
                'Utilities': '#f4c542'
            };
            return chartColors[category] || `hsl(${index * 30}, 70%, 60%)`;
        }

        // Update pie chart
        function updatePieChart() {
            const chartCard = document.getElementById('chartCard');
            const totals = getCategoryTotals();
            const categories = Object.keys(totals);
            
            if (categories.length === 0) {
                chartCard.style.display = 'none';
                return;
            }
            
            chartCard.style.display = 'block';
            
            const amounts = categories.map(cat => totals[cat]);
            const colors = categories.map((cat, idx) => getChartColor(cat, idx));
            
            const ctx = document.getElementById('categoryChart').getContext('2d');
            
            if (categoryChart) {
                categoryChart.destroy();
            }
            
            categoryChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: categories,
                    datasets: [{
                        data: amounts,
                        backgroundColor: colors,
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const label = context.label;
                                    const value = context.raw;
                                    const total = amounts.reduce((a, b) => a + b, 0);
                                    const percentage = ((value / total) * 100).toFixed(1);
                                    return `${label}: EGP ${value.toFixed(2)} (${percentage}%)`;
                                }
                            }
                        }
                    }
                }
            });
            
            // Build custom legend - text only, no category icon
            const legendDiv = document.getElementById('chartLegend');
            legendDiv.innerHTML = categories.map((cat, idx) => `
                <div class="legend-item">
                    <div class="legend-color" style="background: ${colors[idx]}"></div>
                    <span>${cat}</span>
                </div>
            `).join('');
        }

        // Render expenses list (showing only last 5)
        function renderExpensesList() {
            const expensesDiv = document.getElementById('expensesList');
            const recentExpenses = expenses.slice(0, 5);
            
            if (recentExpenses.length === 0) {
                expensesDiv.innerHTML = `
                    <div class="empty-state">
                        <span>📭</span>
                        <p>No expenses yet</p>
                        <p style="font-size: 12px; margin-top: 8px;">Add your first expense above</p>
                    </div>
                `;
                return;
            }
            
            expensesDiv.innerHTML = recentExpenses.map(exp => `
                <div class="expense-item">
                    <div class="expense-left">
                        <div class="category-icon" style="background: ${getCategoryColor(exp.category)};">
                            ${getCategoryIcon(exp.category)}
                        </div>
                        <div class="expense-details">
                            <div class="expense-category">${exp.category}</div>
                            <div class="expense-date">📅 ${formatDate(exp.date)}</div>
                            ${exp.notes ? `<div class="expense-note">📝 ${exp.notes.substring(0, 30)}${exp.notes.length > 30 ? '...' : ''}</div>` : ''}
                        </div>
                    </div>
                    <div class="expense-right">
                        <div class="expense-amount">EGP ${exp.amount.toFixed(2)}</div>
                        <button class="action-btn edit-btn" onclick="editExpense(${exp.id})">✏️</button>
                        <button class="action-btn delete-btn" onclick="deleteExpense(${exp.id})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        // Update stats
        function updateStats() {
            const total = getCurrentMonthTotal();
            const { month } = getCurrentMonthRange();
            document.getElementById('totalAmount').textContent = `EGP ${total.toFixed(2)}`;
            document.getElementById('monthBadge').textContent = month;
        }

        // Show status message
        function showStatus(message, isError = false) {
            const statusDiv = document.getElementById('statusMsg');
            statusDiv.textContent = message;
            statusDiv.className = `status show ${isError ? 'error' : 'success'}`;
            setTimeout(() => {
                statusDiv.classList.remove('show');
            }, 2000);
        }

        // Add expense
        function addExpense(date, category, amount, notes) {
            const newExpense = {
                id: Date.now(),
                date: date,
                category: category,
                amount: parseFloat(amount),
                notes: notes || '',
                timestamp: new Date().toISOString()
            };
            expenses.unshift(newExpense);
            saveExpenses();
            renderAll();
            showStatus('✅ Expense added successfully!');
        }

        // Delete expense
        function deleteExpense(id) {
            if (confirm('Delete this expense?')) {
                expenses = expenses.filter(exp => exp.id !== id);
                saveExpenses();
                renderAll();
                showStatus('🗑️ Expense deleted');
            }
        }

        // Edit expense
        function editExpense(id) {
            const expense = expenses.find(exp => exp.id === id);
            if (expense) {
                const newAmount = prompt('Edit amount (EGP):', expense.amount);
                if (newAmount !== null && !isNaN(newAmount) && parseFloat(newAmount) > 0) {
                    expense.amount = parseFloat(newAmount);
                    const newNotes = prompt('Edit notes:', expense.notes);
                    if (newNotes !== null) {
                        expense.notes = newNotes;
                    }
                    saveExpenses();
                    renderAll();
                    showStatus('✏️ Expense updated');
                }
            }
        }

        // Render everything
        function renderAll() {
            updateStats();
            updatePieChart();
            renderExpensesList();
        }

        // Set today's date as default
        function setDefaultDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;
        }

        // Handle form submission
        document.getElementById('submitBtn').addEventListener('click', function(e) {
            e.preventDefault();
            
            const date = document.getElementById('date').value;
            const category = document.getElementById('category').value;
            const amount = document.getElementById('amount').value;
            const notes = document.getElementById('notes').value;
            
            if (!date) {
                showStatus('❌ Please select a date', true);
                return;
            }
            
            if (!category) {
                showStatus('❌ Please select a category', true);
                return;
            }
            
            if (!amount || amount <= 0) {
                showStatus('❌ Please enter a valid amount', true);
                return;
            }
            
            addExpense(date, category, amount, notes);
            
            // Reset form
            document.getElementById('category').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('notes').value = '';
            setDefaultDate();
            
            document.getElementById('category').focus();
        });
        
        // See All button
        document.getElementById('seeAllBtn').addEventListener('click', function() {
            showStatus('📄 All expenses page coming soon!');

        setDefaultDate();
        loadExpenses();
    </script>
