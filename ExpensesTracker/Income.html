<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Income Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <link rel="icon" type="image/png" sizes="180x180" href="icon.png">
  <link rel="shortcut icon" href="icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="utils.js"></script>
  <script src="auth.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    /* Income page specific styles */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .header h1 {
      font-family: 'Sora', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }

    /* Stats banner */
    .stats-card-income {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border-radius: var(--radius-lg);
      padding: 20px 22px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(16,185,129,0.25);
    }
    .stats-label-income {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .stats-total-income {
      font-family: 'Sora', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      line-height: 1.1;
      margin-top: 6px;
    }
    .stats-period {
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      margin-top: 4px;
    }

    /* Add button */
    .add-income-btn {
      width: 100%;
      padding: 13px;
      background: #fff;
      color: var(--brand);
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 700;
      font-family: 'Sora', sans-serif;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
      transition: opacity 0.15s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 18px;
    }
    .add-income-btn:hover { opacity: 0.92; }
    .add-income-btn:active { transform: scale(0.97); }

    /* Pill-style tabs - matching Expenses.html */
    .income-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 18px;
    }
    .income-tab-btn {
      flex: 1;
      padding: 11px 6px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.25) !important;
      border-bottom: 1px solid rgba(255,255,255,0.25) !important;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
      margin-bottom: 0;
    }
    .income-tab-btn.active {
      background: #fff;
      color: var(--brand);
      border-color: transparent !important;
      box-shadow: 0 4px 14px rgba(0,0,0,0.10);
    }

    /* Filter row */
    .filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .filter-row select {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      background: var(--surface-2);
      color: var(--text);
    }
    .filter-row select:focus {
      outline: none;
      border-color: var(--brand);
      background: #fff;
    }

    /* Income item row */
    .income-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }
    .income-item:last-child {
      border-bottom: none;
    }
    .income-icon {
      width: 42px;
      height: 42px;
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .income-details {
      flex: 1;
      min-width: 0;
    }
    .income-category {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
    }
    .income-meta {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 2px;
    }
    .income-notes {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .income-amount {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: #10b981;
      flex-shrink: 0;
    }
    .income-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    /* Section divider */
    .section-divider {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 10px 0 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    /* Summary card */
    .summary-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .summary-card .card-title {
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      padding: 18px 20px 12px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }
    .summary-card .card-title-icon {
      width: 28px;
      height: 28px;
      border-radius: 9px;
      background: var(--brand-grad);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    /* Year selector */
    .year-selector-wrap {
      padding: 0 20px 16px 20px;
    }
    .year-selector {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      background: var(--surface-2);
      color: var(--text);
    }
    .year-selector:focus {
      outline: none;
      border-color: var(--brand);
      background: #fff;
    }

    /* Summary month rows */
    .summary-month-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
    }
    .summary-month-row:hover {
      background: var(--surface-2);
    }
    .summary-month-row:active {
      background: #ededff;
    }
    .summary-month-left {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }
    .summary-month-name {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
    }
    .summary-month-count {
      font-size: 11px;
      color: var(--text-3);
    }
    .summary-month-amount {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--brand);
    }
    .summary-empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-3);
    }
    .summary-empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .summary-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      background: var(--surface-2);
      border-top: 1px solid var(--border);
      font-weight: 700;
    }
    .summary-total-label {
      font-size: 13px;
      color: var(--text-2);
    }
    .summary-total-amount {
      font-family: 'Sora', sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: var(--brand);
    }

    /* Month detail modal */
    .detail-income-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .detail-income-item:last-child {
      border-bottom: none;
    }
    .detail-income-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .detail-income-info {
      flex: 1;
    }
    .detail-income-category {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
    }
    .detail-income-date {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 2px;
    }
    .detail-income-amount {
      font-weight: 700;
      font-size: 15px;
      color: #10b981;
    }

    /* Modal form grid */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 0;
    }
    .form-group label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-2);
      margin-bottom: 5px;
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .amount-wrap {
      position: relative;
    }
    .amount-wrap input {
      padding-left: 48px;
    }
    .currency-flag {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-box">
      <div class="spinner"></div>
      <p>Loading income data...</p>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <h1>💰 Income</h1>
    <div class="header-actions">
      <button class="hdr-icon-btn" id="syncBtn" title="Sync">↻</button>
      <button class="hdr-icon-btn danger" onclick="logout()" title="Logout">⏻</button>
    </div>
  </div>

  <!-- Stats Card -->
  <div class="stats-card-income" id="statsCard" style="display:none">
    <div class="stats-label-income">Total Income</div>
    <div class="stats-total-income" id="totalIncome">EGP 0</div>
    <div class="stats-period" id="periodDisplay"></div>
  </div>

  <!-- Add Income Button -->
  <button class="add-income-btn" onclick="openAddIncomeModal()">➕ Add Income</button>

  <!-- Pill-style Tabs (matching Expenses.html) -->
  <div class="income-tabs">
    <button class="income-tab-btn active" data-tab="monthly">📊 Monthly Details</button>
    <button class="income-tab-btn" data-tab="summary">📅 Year Summary</button>
  </div>

  <!-- Monthly Details Panel -->
  <div id="monthlyPanel" class="income-panel active">
    <div class="card">
      <div class="card-title">
        <span class="card-title-icon">📅</span>
        Filter by Month
      </div>
      <div class="filter-row">
        <select id="monthSelect">
          <option value="0">January</option><option value="1">February</option>
          <option value="2">March</option><option value="3">April</option>
          <option value="4">May</option><option value="5">June</option>
          <option value="6">July</option><option value="7">August</option>
          <option value="8">September</option><option value="9">October</option>
          <option value="10">November</option><option value="11">December</option>
        </select>
        <select id="yearSelect"></select>
      </div>
      <div class="section-divider">Income entries</div>
      <div id="incomeList"></div>
    </div>
  </div>

  <!-- Year Summary Panel -->
  <div id="summaryPanel" class="income-panel">
    <div class="summary-card">
      <div class="card-title">
        <span class="card-title-icon">📊</span>
        Income Summary
      </div>
      <div class="year-selector-wrap">
        <select class="year-selector" id="summaryYearSelect">
          <option value="">Select year</option>
        </select>
      </div>
      <div id="summaryContainer"></div>
    </div>
  </div>

</div>

<div id="bottomNavMount"></div>
<div class="toast" id="toast"></div>

<!-- Add/Edit Income Modal -->
<div class="modal-backdrop" id="incomeModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">➕ Add Income</div>
    
    <div class="form-grid">
      <div class="form-group">
        <label class="required">Date</label>
        <input type="date" id="incomeDate" required>
      </div>
      <div class="form-group">
        <label class="required">Category</label>
        <select id="incomeCategory" required>
          <option value="" disabled selected>Select…</option>
        </select>
      </div>
      <div class="form-group">
        <label class="required">Amount (EGP)</label>
        <div class="amount-wrap">
          <span class="currency-flag">🇪🇬</span>
          <input type="number" id="incomeAmount" placeholder="0.00" step="0.01" min="0.01" inputmode="decimal" required>
        </div>
      </div>
      <div class="form-group">
        <label>Notes <span style="font-weight:400;text-transform:none">(optional)</span></label>
        <input type="text" id="incomeNotes" placeholder="e.g., monthly salary">
      </div>
    </div>
    
    <div class="modal-footer" id="modalFooter">
      <button class="btn-cancel" onclick="closeIncomeModal()">Cancel</button>
      <button class="btn-save" onclick="saveIncome()">Save</button>
    </div>
  </div>
</div>

<!-- Month Detail Modal -->
<div class="modal-backdrop" id="monthDetailModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="monthDetailTitle">Income Entries</div>
    <div id="monthDetailList"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeMonthDetailModal()">Close</button>
    </div>
  </div>
</div>

<!-- Edit/Delete Sheet Menu -->
<div class="sheet-backdrop" id="incomeSheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Options</div>
    <button class="sheet-action" id="sheetEditBtn">
      <span class="sheet-action-icon">✏️</span> Edit
    </button>
    <button class="sheet-action danger" id="sheetDeleteBtn">
      <span class="sheet-action-icon">🗑️</span> Delete
    </button>
  </div>
</div>

<script>
// ======================== STATE ==========================
let incomes = [];
let spreadsheetId = null;
let currentUserEmail = null;
let currentAccessToken = null;
let editingIncomeId = null;
let selectedIncomeId = null;

const INCOME_SHEET = 'Income Log';

// Use genIncomeId from utils.js (separate counter from expenses)
// If genIncomeId doesn't exist yet, fallback to a simple implementation
const genIncomeId = (typeof window.genIncomeId === 'function') ? window.genIncomeId : function() {
  const key = 'income_id_counter';
  const next = parseInt(localStorage.getItem(key) || '0') + 1;
  localStorage.setItem(key, next);
  return next;
};

// ======================== HELPERS ========================
function getFilteredIncomes() {
  const month = parseInt(document.getElementById('monthSelect').value);
  const year = parseInt(document.getElementById('yearSelect').value);
  return incomes.filter(inc => {
    const d = parseLocalDate(inc.date);
    return d.getMonth() === month && d.getFullYear() === year;
  });
}

function updateStats() {
  const filtered = getFilteredIncomes();
  const total = filtered.reduce((sum, inc) => sum + inc.amount, 0);
  const statsCard = document.getElementById('statsCard');
  const monthName = MONTHS_FULL[parseInt(document.getElementById('monthSelect').value)];
  const year = parseInt(document.getElementById('yearSelect').value);
  
  if (filtered.length === 0) {
    statsCard.style.display = 'none';
    return;
  }
  
  statsCard.style.display = 'block';
  document.getElementById('totalIncome').textContent = formatMoney(total);
  document.getElementById('periodDisplay').textContent = `${monthName} ${year}`;
}

function renderIncomeList() {
  const container = document.getElementById('incomeList');
  const filtered = getFilteredIncomes();
  const sorted = [...filtered].sort((a, b) => new Date(b.date) - new Date(a.date));
  
  if (sorted.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">💰</div><p>No income entries for this period</p></div>';
    return;
  }
  
  container.innerHTML = sorted.map(inc => {
    const icon = getCategoryIcon(inc.category);
    const bgColor = getCategoryColor(inc.category);
    return `
      <div class="income-item">
        <div class="income-icon" style="background:${bgColor}">${icon}</div>
        <div class="income-details">
          <div class="income-category">${escapeHtml(inc.category)}</div>
          <div class="income-meta">${formatDate(inc.date)}</div>
          ${inc.notes ? `<div class="income-notes">📝 ${escapeHtml(inc.notes)}</div>` : ''}
        </div>
        <div class="income-right">
          <div class="income-amount">${formatMoney(inc.amount)}</div>
          <button class="action-icon" onclick="openIncomeMenu(${inc.id})">⋮</button>
        </div>
      </div>`;
  }).join('');
}

// ======================== YEAR SUMMARY ========================
function getYearSummary(year) {
  const monthlyTotals = {};
  const monthlyCounts = {};
  
  for (let i = 0; i < 12; i++) {
    monthlyTotals[i] = 0;
    monthlyCounts[i] = 0;
  }
  
  incomes.forEach(inc => {
    const d = parseLocalDate(inc.date);
    if (d.getFullYear() === year) {
      const month = d.getMonth();
      monthlyTotals[month] += inc.amount;
      monthlyCounts[month]++;
    }
  });
  
  return { monthlyTotals, monthlyCounts };
}

function getYearTotal(year) {
  const summary = getYearSummary(year);
  return Object.values(summary.monthlyTotals).reduce((sum, val) => sum + val, 0);
}

function populateSummaryYearSelect() {
  const select = document.getElementById('summaryYearSelect');
  const yearsSet = new Set();
  incomes.forEach(inc => {
    const d = parseLocalDate(inc.date);
    yearsSet.add(d.getFullYear());
  });
  
  const currentYear = new Date().getFullYear();
  if (yearsSet.size === 0) yearsSet.add(currentYear);
  
  const years = Array.from(yearsSet).sort((a, b) => b - a);
  select.innerHTML = '<option value="">Select year</option>' + 
    years.map(y => `<option value="${y}" ${y === currentYear ? 'selected' : ''}>${y}</option>`).join('');
}

function renderSummary() {
  const select = document.getElementById('summaryYearSelect');
  const year = parseInt(select.value);
  const container = document.getElementById('summaryContainer');
  
  if (!year) {
    container.innerHTML = `
      <div class="summary-empty">
        <div class="summary-empty-icon">📭</div>
        <p>Select a year to view summary</p>
      </div>
    `;
    return;
  }
  
  const summary = getYearSummary(year);
  const monthlyTotals = summary.monthlyTotals;
  const monthlyCounts = summary.monthlyCounts;
  const yearTotal = getYearTotal(year);
  const hasData = Object.values(monthlyTotals).some(v => v > 0);
  
  if (!hasData) {
    container.innerHTML = `
      <div class="summary-empty">
        <div class="summary-empty-icon">📭</div>
        <p>No income entries for ${year}</p>
      </div>
    `;
    return;
  }
  
  let html = '';
  for (let i = 0; i < 12; i++) {
    const amount = monthlyTotals[i];
    const count = monthlyCounts[i];
    const monthName = MONTHS_FULL[i];
    
    html += `
      <div class="summary-month-row" onclick="openMonthDetail(${year}, ${i})">
        <div class="summary-month-left">
          <span class="summary-month-name">${monthName}</span>
          ${count > 0 ? `<span class="summary-month-count">${count} ${count === 1 ? 'entry' : 'entries'}</span>` : ''}
        </div>
        <div class="summary-month-amount">${amount > 0 ? formatMoney(amount) : '—'}</div>
      </div>`;
  }
  
  html += `
    <div class="summary-total-row">
      <span class="summary-total-label">Total ${year}</span>
      <span class="summary-total-amount">${formatMoney(yearTotal)}</span>
    </div>`;
  
  container.innerHTML = html;
}

function openMonthDetail(year, month) {
  const entries = incomes.filter(inc => {
    const d = parseLocalDate(inc.date);
    return d.getFullYear() === year && d.getMonth() === month;
  }).sort((a, b) => new Date(b.date) - new Date(a.date));
  
  const monthName = MONTHS_FULL[month];
  document.getElementById('monthDetailTitle').innerHTML = `📅 ${monthName} ${year}`;
  
  const container = document.getElementById('monthDetailList');
  
  if (entries.length === 0) {
    container.innerHTML = '<div class="empty-state">No income entries for this month</div>';
  } else {
    container.innerHTML = entries.map(inc => {
      const icon = getCategoryIcon(inc.category);
      const bgColor = getCategoryColor(inc.category);
      return `
        <div class="detail-income-item">
          <div class="detail-income-icon" style="background:${bgColor}">${icon}</div>
          <div class="detail-income-info">
            <div class="detail-income-category">${escapeHtml(inc.category)}</div>
            <div class="detail-income-date">${formatDate(inc.date)}</div>
            ${inc.notes ? `<div style="font-size:11px;color:var(--text-3);margin-top:2px">📝 ${escapeHtml(inc.notes)}</div>` : ''}
          </div>
          <div class="detail-income-amount">${formatMoney(inc.amount)}</div>
        </div>`;
    }).join('');
  }
  
  document.getElementById('monthDetailModal').classList.add('open');
}

function closeMonthDetailModal() {
  document.getElementById('monthDetailModal').classList.remove('open');
}

// ======================== CRUD OPERATIONS ========================
async function saveIncome() {
  const date = document.getElementById('incomeDate').value;
  const category = document.getElementById('incomeCategory').value;
  const amount = parseFloat(document.getElementById('incomeAmount').value);
  const notes = document.getElementById('incomeNotes').value.trim();
  
  if (!date) { showToast('❌ Select date', 'error'); return; }
  if (!category) { showToast('❌ Select category', 'error'); return; }
  if (!amount || amount <= 0) { showToast('❌ Enter valid amount', 'error'); return; }
  
  if (editingIncomeId !== null) {
    const index = incomes.findIndex(i => i.id === editingIncomeId);
    if (index !== -1) {
      incomes[index] = { ...incomes[index], date, category, amount, notes };
      await persistIncomesToSheet();
      showToast('✅ Income updated');
    }
  } else {
    const newIncome = {
      id: genIncomeId(),
      date,
      category,
      amount,
      notes: notes || '',
      timestamp: new Date().toISOString()
    };
    incomes.unshift(newIncome);
    await addIncomeToSheet(newIncome);
    showToast('✅ Income added');
  }
  
  closeIncomeModal();
  updateStats();
  renderIncomeList();
  populateSummaryYearSelect();
  renderSummary();
}

async function deleteIncome(id) {
  if (!confirm('Delete this income entry?')) return;
  
  incomes = incomes.filter(i => i.id !== id);
  await deleteIncomeFromSheet(id);
  showToast('🗑️ Income deleted');
  updateStats();
  renderIncomeList();
  populateSummaryYearSelect();
  renderSummary();
}

// ======================== SHEET OPERATIONS ========================
function incomeToRow(inc) {
  return [inc.timestamp || new Date().toISOString(), inc.date, inc.category, inc.amount, inc.notes || '', inc.id];
}

function parseIncomeRow(row, idx) {
  return {
    timestamp: row[0] || '',
    date: row[1] || '',
    category: row[2] || '',
    amount: parseFloat(row[3]) || 0,
    notes: row[4] || '',
    id: (row[5] && !isNaN(parseInt(row[5]))) ? parseInt(row[5]) : -(idx + 1)
  };
}

async function ensureIncomeTab() {
  try {
    const meta = await gapi.client.sheets.spreadsheets.get({ spreadsheetId });
    const exists = meta.result.sheets.some(s => s.properties.title === INCOME_SHEET);
    if (!exists) {
      await gapi.client.sheets.spreadsheets.batchUpdate({
        spreadsheetId,
        resource: { requests: [{ addSheet: { properties: { title: INCOME_SHEET } } }] }
      });
      await gapi.client.sheets.spreadsheets.values.update({
        spreadsheetId,
        range: `${INCOME_SHEET}!A1:F1`,
        valueInputOption: 'RAW',
        resource: { values: [['Timestamp', 'Date', 'Category', 'Amount', 'Notes', 'ID']] }
      });
    }
  } catch (e) {
    console.warn(e);
  }
}

async function loadIncomesFromSheet() {
  if (!spreadsheetId) return;
  try {
    const res = await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId,
      range: `${INCOME_SHEET}!A2:F`
    });
    const rows = res.result.values || [];
    incomes = rows.map((row, idx) => parseIncomeRow(row, idx));
    
    // Update income ID counter to the largest existing ID
    const maxId = incomes.reduce((m, i) => Math.max(m, Number(i.id) || 0), 0);
    const stored = parseInt(localStorage.getItem('income_id_counter') || '0');
    if (maxId > stored) localStorage.setItem('income_id_counter', maxId);
    
    if (currentUserEmail) {
      localStorage.setItem(`incomes_${currentUserEmail}`, JSON.stringify(incomes));
    }
  } catch (e) {
    console.error(e);
    incomes = [];
  }
}

async function persistIncomesToSheet() {
  if (!spreadsheetId) return false;
  await gapi.client.sheets.spreadsheets.values.clear({
    spreadsheetId,
    range: `${INCOME_SHEET}!A2:F`
  });
  if (incomes.length) {
    await gapi.client.sheets.spreadsheets.values.update({
      spreadsheetId,
      range: `${INCOME_SHEET}!A2:F`,
      valueInputOption: 'RAW',
      resource: { values: incomes.map(incomeToRow) }
    });
  }
  if (currentUserEmail) {
    localStorage.setItem(`incomes_${currentUserEmail}`, JSON.stringify(incomes));
  }
  return true;
}

async function addIncomeToSheet(inc) {
  if (!spreadsheetId) return false;
  try {
    await gapi.client.sheets.spreadsheets.values.append({
      spreadsheetId,
      range: `${INCOME_SHEET}!A2:F`,
      valueInputOption: 'RAW',
      resource: { values: [[inc.timestamp, inc.date, inc.category, inc.amount, inc.notes || '', inc.id]] }
    });
    return true;
  } catch (err) {
    console.error(err);
    return false;
  }
}

async function deleteIncomeFromSheet(incId) {
  if (!spreadsheetId) return false;
  try {
    const res = await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId,
      range: `${INCOME_SHEET}!A2:F`
    });
    const rows = res.result.values || [];
    let rowIndex = -1;
    for (let i = 0; i < rows.length; i++) {
      if (rows[i][5] && parseInt(rows[i][5]) === incId) {
        rowIndex = i + 2;
        break;
      }
    }
    if (rowIndex < 2) return false;
    await gapi.client.sheets.spreadsheets.batchUpdate({
      spreadsheetId,
      resource: {
        requests: [{ deleteDimension: { range: { sheetId: 0, dimension: 'ROWS', startIndex: rowIndex - 1, endIndex: rowIndex } } }]
      }
    });
    return true;
  } catch (err) {
    console.error(err);
    return false;
  }
}

// ======================== CATEGORY SELECT ========================
function buildIncomeCategorySelect() {
  const select = document.getElementById('incomeCategory');
  const incomeCats = getIncomeCategories();
  select.innerHTML = '<option value="" disabled selected>Select…</option>' + 
    incomeCats.map(c => `<option value="${c.value}">${c.icon} ${c.value}</option>`).join('');
}

function populateYearSelect() {
  const yearSelect = document.getElementById('yearSelect');
  const currentYear = new Date().getFullYear();
  yearSelect.innerHTML = '';
  for (let y = currentYear - 5; y <= currentYear + 1; y++) {
    const option = document.createElement('option');
    option.value = y;
    option.textContent = y;
    if (y === currentYear) option.selected = true;
    yearSelect.appendChild(option);
  }
}

// ======================== MODAL FUNCTIONS ========================
function openAddIncomeModal() {
  editingIncomeId = null;
  document.getElementById('modalTitle').textContent = '➕ Add Income';
  document.getElementById('incomeDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('incomeCategory').value = '';
  document.getElementById('incomeAmount').value = '';
  document.getElementById('incomeNotes').value = '';
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn-cancel" onclick="closeIncomeModal()">Cancel</button>
    <button class="btn-save" onclick="saveIncome()">Save</button>
  `;
  document.getElementById('incomeModal').classList.add('open');
}

function openEditIncomeModal(id) {
  editingIncomeId = id;
  const inc = incomes.find(i => i.id === id);
  if (!inc) return;
  
  document.getElementById('modalTitle').textContent = '✏️ Edit Income';
  document.getElementById('incomeDate').value = inc.date;
  document.getElementById('incomeCategory').value = inc.category;
  document.getElementById('incomeAmount').value = inc.amount;
  document.getElementById('incomeNotes').value = inc.notes || '';
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn-cancel" onclick="closeIncomeModal()">Cancel</button>
    <button class="btn-save" onclick="saveIncome()">Update</button>
  `;
  document.getElementById('incomeModal').classList.add('open');
}

function closeIncomeModal() {
  document.getElementById('incomeModal').classList.remove('open');
  editingIncomeId = null;
}

function openIncomeMenu(id) {
  selectedIncomeId = id;
  document.getElementById('incomeSheet').classList.add('open');
}

function closeIncomeSheet() {
  document.getElementById('incomeSheet').classList.remove('open');
  selectedIncomeId = null;
}

// ======================== TAB HANDLERS ========================
function setupTabs() {
  document.querySelectorAll('.income-tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      document.querySelectorAll('.income-tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      
      if (tab === 'monthly') {
        document.getElementById('monthlyPanel').style.display = 'block';
        document.getElementById('summaryPanel').style.display = 'none';
      } else {
        document.getElementById('monthlyPanel').style.display = 'none';
        document.getElementById('summaryPanel').style.display = 'block';
        populateSummaryYearSelect();
        renderSummary();
      }
    });
  });
}

// ======================== SYNC ========================
async function manualSync() {
  if (!spreadsheetId) {
    showToast('⚠️ No spreadsheet connected', 'error');
    return;
  }
  showToast('🔄 Syncing...', 'info');
  await loadIncomesFromSheet();
  updateStats();
  renderIncomeList();
  populateSummaryYearSelect();
  renderSummary();
  showToast(`✅ Synced ${incomes.length} income entries`);
}

// ======================== AUTH & INIT ========================
async function initPage() {
  await initPageAuth({
    onLoadLocal: (email, sheetId) => {
      currentUserEmail = email;
      spreadsheetId = sheetId;
      const localData = localStorage.getItem(`incomes_${currentUserEmail}`);
      if (localData) {
        incomes = JSON.parse(localData);
        updateStats();
        renderIncomeList();
      }
      document.getElementById('loadingOverlay').style.display = 'flex';
    },
    onReady: async (sheetId, email, token) => {
      currentUserEmail = email;
      spreadsheetId = sheetId;
      currentAccessToken = token;
      await ensureIncomeTab();
      await loadIncomesFromSheet();
      
      const now = new Date();
      document.getElementById('monthSelect').value = now.getMonth();
      document.getElementById('yearSelect').value = now.getFullYear();
      
      updateStats();
      renderIncomeList();
      populateSummaryYearSelect();
      renderSummary();
      
      document.getElementById('loadingOverlay').style.display = 'none';
    }
  });
}

// ======================== EVENT LISTENERS ========================
document.getElementById('monthSelect').addEventListener('change', () => {
  updateStats();
  renderIncomeList();
});
document.getElementById('yearSelect').addEventListener('change', () => {
  updateStats();
  renderIncomeList();
});
document.getElementById('summaryYearSelect').addEventListener('change', () => renderSummary());
document.getElementById('syncBtn').addEventListener('click', manualSync);
document.getElementById('incomeSheet').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeIncomeSheet();
});
document.getElementById('sheetEditBtn').addEventListener('click', () => {
  if (selectedIncomeId) {
    closeIncomeSheet();
    setTimeout(() => openEditIncomeModal(selectedIncomeId), 100);
  }
});
document.getElementById('sheetDeleteBtn').addEventListener('click', async () => {
  if (selectedIncomeId) {
    const id = selectedIncomeId;
    closeIncomeSheet();
    await deleteIncome(id);
  }
});
document.getElementById('incomeModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeIncomeModal();
});
document.getElementById('monthDetailModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeMonthDetailModal();
});

// ======================== START ========================
setTimeout(() => {
  if (typeof getIncomeCategories !== 'undefined') {
    buildIncomeCategorySelect();
  } else {
    const checkInterval = setInterval(() => {
      if (typeof getIncomeCategories !== 'undefined') {
        buildIncomeCategorySelect();
        clearInterval(checkInterval);
      }
    }, 100);
  }
}, 100);

// Initialize panels
document.getElementById('monthlyPanel').style.display = 'block';
document.getElementById('summaryPanel').style.display = 'none';

populateYearSelect();
setupTabs();
renderBottomNav('income');
initPage();
</script>
