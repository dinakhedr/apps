<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="../manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="../images/icon.png">
  <link rel="icon" type="image/png" href="../images/icon.png">
  <title>New Session</title>
  <link rel="stylesheet" href="../styles.css">
  <script src="../assets/utils.js"></script>
  <script src="../assets/auth.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-box"><div class="spinner"></div><p>Loading…</p></div>
</div>

<div class="container" id="mainApp" style="display:none">
  <div class="header">
    <button class="back-btn" onclick="history.back()">←</button>
    <h1>➕ New Session</h1>
  </div>

  <div class="card">
    <div class="form-group">
      <label>Game</label>
      <select id="gameSelect"></select>
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="sessionDate">
    </div>
    <div class="form-group">
      <label>Mode</label>
      <select id="typeSelect">
        <option value="Individual">Individual</option>
        <option value="Team">Team</option>
      </select>
    </div>
    <div id="participantsArea"></div>
    <button class="submit-btn" id="createBtn">🎮 Start Session</button>
  </div>
</div>

<script>
  let games = [], allPlayers = [], allTeams = [];

  async function loadData() {
    games     = await loadGames();
    allPlayers = await loadPlayers();
    allTeams  = await loadTeams();
    const gameSelect = document.getElementById('gameSelect');
    gameSelect.innerHTML = games.map(g =>
      `<option value="${g.GameID}" data-ind="${g.AllowsIndividual}" data-team="${g.AllowsTeam}" data-players="${g.TotalPlayers}">${escapeHtml(g.GameName)}</option>`
    ).join('');
    gameSelect.addEventListener('change', updateParticipantsForm);
    document.getElementById('typeSelect').addEventListener('change', updateParticipantsForm);
    document.getElementById('sessionDate').value = new Date().toISOString().slice(0, 10);
    updateParticipantsForm();
  }

  function updateParticipantsForm() {
    const gameId = document.getElementById('gameSelect').value;
    const game = games.find(g => g.GameID === gameId);
    if (!game) return;
    const type = document.getElementById('typeSelect').value;
    const container = document.getElementById('participantsArea');

    if (type === 'Individual' && game.AllowsIndividual !== 'TRUE') {
      container.innerHTML = `<div class="warn-box">⚠️ This game does not support Individual mode.</div>`;
      return;
    }
    if (type === 'Team' && game.AllowsTeam !== 'TRUE') {
      container.innerHTML = `<div class="warn-box">⚠️ This game does not support Team mode.</div>`;
      return;
    }

    if (type === 'Individual') {
      const needed = parseInt(game.TotalPlayers);
      const active = allPlayers.filter(p => p.Status === 'Active');
      container.innerHTML = `
        <div class="form-group">
          <label>Select exactly ${needed} players</label>
          <div id="playerCheckboxes" style="display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:8px"></div>
          <div id="playerError" style="color:var(--danger);font-size:12px;margin-top:6px;display:none">
            Please select exactly ${needed} players.
          </div>
        </div>`;
      document.getElementById('playerCheckboxes').innerHTML = active.map(p => {
        const icon = p.Gender === 'Male' ? '👨' : p.Gender === 'Female' ? '👩' : '🧑';
        return `<label style="display:inline-flex;align-items:center;font-size:14px;font-weight:600;color:var(--text);text-transform:none;letter-spacing:0;cursor:pointer">
          <input type="checkbox" value="${p.PlayerID}" style="width:auto;margin-right:6px;accent-color:var(--brand)"> ${icon} ${escapeHtml(p.PlayerName)}
        </label>`;
      }).join('');
    } else {
      const gameTeams = allTeams.filter(t => t.GameID === gameId && t.Status === 'Active');
      if (gameTeams.length < 2) {
        container.innerHTML = `<div class="warn-box">⚠️ Need at least 2 active teams for this game. <a href="teams.html" style="color:var(--brand);font-weight:700">Create teams →</a></div>`;
      } else {
        const opts = gameTeams.map(t => `<option value="${t.TeamID}">${escapeHtml(t.TeamName)}</option>`).join('');
        container.innerHTML = `
          <div class="form-group">
            <label>Team A</label>
            <select id="teamASelect"><option value="">Select team…</option>${opts}</select>
          </div>
          <div class="form-group">
            <label>Team B</label>
            <select id="teamBSelect"><option value="">Select team…</option>${opts}</select>
          </div>`;
      }
    }
  }

  window.onload = async () => {
    await initPageAuth({
      onNeedLogin: () => { location.href = '../Home.html'; },
      onReady: async () => {
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        await loadData();
      }
    });

    document.getElementById('createBtn').onclick = async () => {
      const gameId = document.getElementById('gameSelect').value;
      const date   = document.getElementById('sessionDate').value;
      const type   = document.getElementById('typeSelect').value;
      if (!gameId || !date) return showToast('Select a game and date', 'error');

      let participantIds = [];
      if (type === 'Individual') {
        const checked = Array.from(document.querySelectorAll('#playerCheckboxes input:checked')).map(cb => cb.value);
        const game = games.find(g => g.GameID === gameId);
        const needed = parseInt(game.TotalPlayers);
        if (checked.length !== needed) {
          document.getElementById('playerError').style.display = 'block';
          return;
        }
        document.getElementById('playerError').style.display = 'none';
        participantIds = checked;
      } else {
        const a = document.getElementById('teamASelect')?.value;
        const b = document.getElementById('teamBSelect')?.value;
        if (!a || !b) return showToast('Select both teams', 'error');
        if (a === b) return showToast('Teams must be different', 'error');
        participantIds = [a, b];
      }

      const btn = document.getElementById('createBtn');
      btn.textContent = 'Creating…'; btn.disabled = true;
      try {
        const sessionId = await addSession(gameId, date, type);
        await addSessionParticipants(sessionId, participantIds, type);
        showToast('Session created! Starting…');
        setTimeout(() => { location.href = `record_round.html?session=${sessionId}`; }, 800);
      } catch(e) {
        showToast('Error creating session', 'error');
        btn.textContent = '🎮 Start Session'; btn.disabled = false;
      }
    };
    renderBottomNav('sessions');
  };
</script>
</body>
</html>
