<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="../manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="../images/icon.png">
  <link rel="icon" type="image/png" href="../images/icon.png">
  <title>New Session</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="../assets/styles.css">
  <script src="../assets/utils.js"></script>
  <script src="../assets/auth.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-box"><div class="spinner"></div><p>Loading…</p></div>
</div>

<div class="container" id="mainApp" style="display:none">
  <div class="header">
    <button class="back-btn" onclick="history.back()">←</button>
    <h1>➕ New Session</h1>
  </div>

  <div class="card">

    <!-- Game -->
    <div class="form-group">
      <label>Game</label>
      <select id="gameSelect"></select>
    </div>

    <!-- Date -->
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="sessionDate">
    </div>

    <!-- Mode type pills -->
    <span class="section-label">Mode</span>
    <div class="type-row">
      <div class="type-pill active" id="pillInd" onclick="selectType('Individual')">
        <div class="type-pill-check" id="checkInd"></div>
        <div>
          <span class="type-pill-title">Individual</span>
          <span class="type-pill-sub">Players compete solo</span>
        </div>
      </div>
      <div class="type-pill" id="pillTeam" onclick="selectType('Team')">
        <div class="type-pill-check" id="checkTeam"></div>
        <div>
          <span class="type-pill-title">Team</span>
          <span class="type-pill-sub">Teams compete together</span>
        </div>
      </div>
    </div>

    <!-- Participants area -->
    <div id="participantsArea"></div>

    <button class="submit-btn" id="createBtn">🎮 Start Session</button>
  </div>
</div>

<script>
  let games = [], allPlayers = [], allTeams = [];
  let selectedType = 'Individual';
  let selectedPlayerIds = new Set();
  let selectedTeamIds   = [null, null];

  /* ════════════════════════════
     TYPE PILLS
  ════════════════════════════ */
  function selectType(type) {
    selectedType = type;
    document.getElementById('pillInd').classList.toggle('active',  type === 'Individual');
    document.getElementById('pillTeam').classList.toggle('active', type === 'Team');
    selectedPlayerIds.clear();
    selectedTeamIds = [null, null];
    updateParticipantsForm();
  }

  /* ════════════════════════════
     LOAD DATA — single batch call
  ════════════════════════════ */
  async function loadData() {
    const sheets = await batchGetSheets(['Games', 'Players', 'Teams']);
    games      = sheets.Games;
    allPlayers = sheets.Players;
    allTeams   = sheets.Teams;

    const gameSelect = document.getElementById('gameSelect');
    gameSelect.innerHTML = games.map(g =>
      `<option value="${g.GameID}"
         data-ind="${g.AllowsIndividual}"
         data-team="${g.AllowsTeam}"
         data-players="${g.TotalPlayers}">
         ${escapeHtml(g.GameName)}
       </option>`
    ).join('');

    gameSelect.addEventListener('change', () => {
      selectedPlayerIds.clear();
      selectedTeamIds = [null, null];
      updateParticipantsForm();
    });

    document.getElementById('sessionDate').value = new Date().toISOString().slice(0, 10);
    updateParticipantsForm();
  }

  /* ════════════════════════════
     PARTICIPANTS FORM
  ════════════════════════════ */
  function updateParticipantsForm() {
    const gameId  = document.getElementById('gameSelect').value;
    const game    = games.find(g => g.GameID === gameId);
    const container = document.getElementById('participantsArea');
    if (!game) { container.innerHTML = ''; return; }

    if (selectedType === 'Individual' && game.AllowsIndividual !== 'TRUE') {
      container.innerHTML = `<div class="warn-box">⚠️ This game does not support Individual mode.</div>`;
      return;
    }
    if (selectedType === 'Team' && game.AllowsTeam !== 'TRUE') {
      container.innerHTML = `<div class="warn-box">⚠️ This game does not support Team mode.</div>`;
      return;
    }

    if (selectedType === 'Individual') renderPlayerSelector(parseInt(game.TotalPlayers));
    else                               renderTeamSelector(gameId);
  }

  /* ── Player selector ── */
  function renderPlayerSelector(needed) {
    const active = allPlayers.filter(p => p.Status === 'Active');
    const container = document.getElementById('participantsArea');

    if (!active.length) {
      container.innerHTML = `<div class="warn-box">⚠️ No active players. <a href="players-teams.html" style="color:var(--brand);font-weight:700">Add players →</a></div>`;
      return;
    }

    container.innerHTML = `
      <span class="section-label">Select exactly ${needed} players</span>
      <div class="player-selector" id="playerGrid"></div>
      <div class="sel-count" id="selCount">0 of ${needed} selected</div>`;

    document.getElementById('playerGrid').innerHTML = active.map(p => {
      const ic  = p.Icon || (p.Gender === 'Female' ? '👩' : '👨');
      const bg  = p.BG   || '#f3f4f6';
      const sel = selectedPlayerIds.has(p.PlayerID);
      return `
        <div class="player-sel-card${sel?' selected':''}"
             onclick="togglePlayer(this,'${p.PlayerID}',${needed})">
          <div class="player-sel-icon" style="background:${bg}">${ic}</div>
          <span class="player-sel-name">${escapeHtml(p.PlayerName)}</span>
          <div class="player-sel-check">${sel?'✓':''}</div>
        </div>`;
    }).join('');

    updatePlayerCount(needed);
  }

  function togglePlayer(card, pid, needed) {
    if (selectedPlayerIds.has(pid)) {
      selectedPlayerIds.delete(pid);
      card.classList.remove('selected');
      card.querySelector('.player-sel-check').textContent = '';
    } else {
      if (selectedPlayerIds.size >= needed) {
        showToast(`Select exactly ${needed} players`, 'error'); return;
      }
      selectedPlayerIds.add(pid);
      card.classList.add('selected');
      card.querySelector('.player-sel-check').textContent = '✓';
    }
    updatePlayerCount(needed);
  }

  function updatePlayerCount(needed) {
    const el = document.getElementById('selCount');
    if (!el) return;
    const n = selectedPlayerIds.size;
    el.textContent = `${n} of ${needed} selected`;
    el.className = `sel-count${n === needed ? ' ready' : ''}`;
  }

  /* ── Team selector ── */
  function renderTeamSelector(gameId) {
    const gameTeams = allTeams.filter(t => t.GameID === gameId);
    const container = document.getElementById('participantsArea');

    if (gameTeams.length < 2) {
      container.innerHTML = `<div class="warn-box">⚠️ Need at least 2 teams for this game.
        <a href="players-teams.html" style="color:var(--brand);font-weight:700">Create teams →</a></div>`;
      return;
    }

    container.innerHTML = `
      <span class="section-label">Select 2 teams</span>
      <div class="team-selector" id="teamGrid"></div>
      <div class="sel-count" id="teamSelCount">0 of 2 selected</div>`;

    document.getElementById('teamGrid').innerHTML = gameTeams.map(t => {
      const ic  = t.Icon || '🏅';
      const bg  = t.BG   || '#fef3c7';
      const playerNames = (t.PlayerIDs || '').split(',')
        .map(pid => allPlayers.find(p => p.PlayerID === pid.trim())?.PlayerName || null)
        .filter(Boolean).join(', ');
      const idx = selectedTeamIds.indexOf(t.TeamID);
      const sel = idx !== -1;
      const label = idx === 0 ? 'A' : idx === 1 ? 'B' : '';
      return `
        <div class="team-sel-card${sel?' selected':''}"
             onclick="toggleTeam(this,'${t.TeamID}')">
          <div class="team-sel-icon" style="background:${bg}">${ic}</div>
          <div class="team-sel-info">
            <div class="team-sel-name">${escapeHtml(t.TeamName)}</div>
            <div class="team-sel-players">${escapeHtml(playerNames)}</div>
          </div>
          <div class="team-sel-badge">${label}</div>
        </div>`;
    }).join('');

    updateTeamCount();
  }

  function toggleTeam(card, tid) {
    const idx = selectedTeamIds.indexOf(tid);
    if (idx !== -1) {
      selectedTeamIds[idx] = null;
      card.classList.remove('selected');
      card.querySelector('.team-sel-badge').textContent = '';
    } else {
      const slot = selectedTeamIds.indexOf(null);
      if (slot === -1) { showToast('Deselect a team first', 'error'); return; }
      selectedTeamIds[slot] = tid;
      card.classList.add('selected');
      card.querySelector('.team-sel-badge').textContent = slot === 0 ? 'A' : 'B';
    }
    updateTeamCount();
  }

  function updateTeamCount() {
    const el = document.getElementById('teamSelCount');
    if (!el) return;
    const n = selectedTeamIds.filter(Boolean).length;
    el.textContent = `${n} of 2 selected`;
    el.className = `sel-count${n === 2 ? ' ready' : ''}`;
  }

  /* ════════════════════════════
     PAGE INIT
  ════════════════════════════ */
  window.onload = async () => {
    await initPageAuth({
      onNeedLogin: () => { location.href = '../Home.html'; },
      onReady: async () => {
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        await loadData();
      }
    });

    document.getElementById('createBtn').onclick = async () => {
      const gameId = document.getElementById('gameSelect').value;
      const date   = document.getElementById('sessionDate').value;
      if (!gameId || !date) return showToast('Select a game and date', 'error');

      let participantIds = [];
      const game = games.find(g => g.GameID === gameId);

      if (selectedType === 'Individual') {
        const needed = parseInt(game.TotalPlayers);
        if (selectedPlayerIds.size !== needed)
          return showToast(`Select exactly ${needed} players`, 'error');
        participantIds = Array.from(selectedPlayerIds);
      } else {
        const [a, b] = selectedTeamIds;
        if (!a || !b) return showToast('Select 2 teams', 'error');
        participantIds = [a, b];
      }

      const btn = document.getElementById('createBtn');
      btn.textContent = 'Creating…'; btn.disabled = true;
      try {
        const sessionId = await addSession(gameId, date, selectedType);
        await addSessionParticipants(sessionId, participantIds, selectedType);
        showToast('Session created! Starting…');
        setTimeout(() => { location.href = `record_round.html?session=${sessionId}`; }, 700);
      } catch(e) {
        showToast('Error creating session', 'error');
        btn.textContent = '🎮 Start Session'; btn.disabled = false;
      }
    };

    renderBottomNav('sessions');
  };
</script>
</body>
</html>
