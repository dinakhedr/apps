<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="../manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="../images/icon.png">
  <link rel="icon" type="image/png" href="../images/icon.png">
  <title>Teams</title>
  <link rel="stylesheet" href="../styles.css">
  <script src="../assets/utils.js"></script>
  <script src="../assets/auth.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-box"><div class="spinner"></div><p>Loading…</p></div>
</div>

<div class="container" id="mainApp" style="display:none">
  <div class="header">
    <button class="back-btn" onclick="history.back()">←</button>
    <h1>🏆 Teams</h1>
  </div>

  <div class="card">
    <div class="card-title">Create Team</div>
    <div class="form-group">
      <label>Game</label>
      <select id="gameSelect"><option value="">Select a game…</option></select>
    </div>
    <div class="form-group">
      <label>Team Name</label>
      <input type="text" id="teamName" placeholder="e.g. Spade Kings">
    </div>
    <div class="form-group" id="playerCheckboxArea" style="display:none">
      <label id="playerCheckboxLabel">Select Players</label>
      <div id="playerCheckboxes" style="display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:8px"></div>
    </div>
    <button class="submit-btn" id="createBtn">+ Create Team</button>
  </div>

  <div class="card">
    <div class="card-title">All Teams</div>
    <div id="teamsList"></div>
  </div>
</div>

<script>
  let allPlayers  = [];
  let allGames    = [];
  let neededPlayers = 2;

  async function loadData() {
    allPlayers = await loadPlayers();
    allGames   = await loadGames();
    const teamGames = allGames.filter(g => g.AllowsTeam === 'TRUE');
    const sel = document.getElementById('gameSelect');
    sel.innerHTML = '<option value="">Select a game…</option>' +
      teamGames.map(g =>
        `<option value="${g.GameID}" data-ppt="${g.PlayersPerTeam || 2}">${escapeHtml(g.GameName)}</option>`
      ).join('');
    sel.addEventListener('change', () => {
      const opt = sel.options[sel.selectedIndex];
      neededPlayers = parseInt(opt.dataset.ppt) || 2;
      if (sel.value) renderCheckboxes(neededPlayers);
      else document.getElementById('playerCheckboxArea').style.display = 'none';
    });
    await loadTeamsList();
  }

  function renderCheckboxes(needed) {
    document.getElementById('playerCheckboxLabel').textContent = `Select exactly ${needed} players`;
    document.getElementById('playerCheckboxArea').style.display = 'block';
    const active = allPlayers.filter(p => p.Status === 'Active');
    document.getElementById('playerCheckboxes').innerHTML = active.map(p => {
      const icon = p.Gender === 'Male' ? '👨' : p.Gender === 'Female' ? '👩' : '🧑';
      return `<label style="display:inline-flex;align-items:center;font-size:14px;font-weight:600;
                color:var(--text);text-transform:none;letter-spacing:0;cursor:pointer;margin-bottom:4px">
        <input type="checkbox" value="${p.PlayerID}"
          style="width:auto;margin-right:6px;accent-color:var(--brand)">
        ${icon} ${escapeHtml(p.PlayerName)}
      </label>`;
    }).join('');
  }

  async function loadTeamsList() {
    const teams   = await loadTeams();
    const gameMap = Object.fromEntries(allGames.map(g => [g.GameID, g.GameName]));

    if (!teams.length) {
      document.getElementById('teamsList').innerHTML =
        `<div class="empty-state"><span class="empty-icon">🏆</span><p>No teams yet. Create one above!</p></div>`;
      return;
    }

    // Group by game
    const grouped = {};
    teams.forEach(t => {
      const gid = t.GameID || 'unknown';
      if (!grouped[gid]) grouped[gid] = [];
      grouped[gid].push(t);
    });

    let html = '';
    for (const gid in grouped) {
      html += `<div style="margin-bottom:20px">
        <div style="font-family:'Sora',sans-serif;font-size:11px;font-weight:700;
          color:var(--text-2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px">
          🎮 ${escapeHtml(gameMap[gid] || 'Unknown Game')}
        </div>`;
      grouped[gid].forEach(t => {
        const playerNames = (t.PlayerIDs || '').split(',')
          .map(pid => allPlayers.find(p => p.PlayerID === pid)?.PlayerName || pid)
          .filter(Boolean).join(', ');
        html += `
          <div class="expense-item no-tap">
            <div class="cat-icon" style="background:#fef3c7">🏅</div>
            <div class="exp-details">
              <div class="exp-cat">${escapeHtml(t.TeamName)}</div>
              <div class="exp-meta">${escapeHtml(playerNames)}</div>
            </div>
            <div class="row-actions">
              <span class="badge ${t.Status === 'Active' ? 'badge-active' : 'badge-inactive'}"
                style="margin-right:6px">${t.Status}</span>
              <button class="row-btn delete" title="Delete"
                onclick="confirmDelete('${t.TeamID}','${escapeHtml(t.TeamName).replace(/'/g,"\\'")}')">🗑️</button>
            </div>
          </div>`;
      });
      html += `</div>`;
    }
    document.getElementById('teamsList').innerHTML = html;
  }

  async function confirmDelete(id, name) {
    if (!confirm(`Delete team "${name}"? This cannot be undone.`)) return;
    try {
      await deleteTeam(id);
      showToast('Team deleted');
      await loadTeamsList();
    } catch(e) {
      showToast('Error deleting team', 'error');
    }
  }

  window.onload = async () => {
    await initPageAuth({
      onNeedLogin: () => { location.href = '../Home.html'; },
      onReady: async () => {
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        await loadData();
      }
    });

    document.getElementById('createBtn').onclick = async () => {
      const gameId = document.getElementById('gameSelect').value;
      const name   = document.getElementById('teamName').value.trim();
      if (!gameId) return showToast('Select a game', 'error');
      if (!name)   return showToast('Enter a team name', 'error');
      const checked = Array.from(
        document.querySelectorAll('#playerCheckboxes input:checked')
      ).map(cb => cb.value);
      if (checked.length !== neededPlayers)
        return showToast(`Select exactly ${neededPlayers} players`, 'error');

      const btn = document.getElementById('createBtn');
      btn.textContent = 'Creating…'; btn.disabled = true;
      try {
        await addTeam(gameId, name, checked);
        document.getElementById('teamName').value = '';
        document.querySelectorAll('#playerCheckboxes input').forEach(cb => cb.checked = false);
        showToast(`${name} created ✓`);
        await loadTeamsList();
      } catch(e) {
        showToast('Error creating team', 'error');
      } finally {
        btn.textContent = '+ Create Team'; btn.disabled = false;
      }
    };

    renderBottomNav('');
  };
</script>
</body>
</html>
