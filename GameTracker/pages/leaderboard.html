<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="../manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="../images/icon.png">
  <link rel="icon" type="image/png" href="../images/icon.png">
  <title>Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="../assets/styles.css">
  <script src="../assets/utils.js"></script>
  <script src="../assets/auth.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-box"><div class="spinner"></div><p>Loading…</p></div>
</div>

<div class="container" id="mainApp" style="display:none">

  <div class="header" style="justify-content:flex-start; gap:14px">
    <button class="back-btn" onclick="history.back()">←</button>
    <h1>📊 Leaderboard</h1>
  </div>

  <!-- Filter card -->
  <div class="filter-card">
    <div class="filter-row">
      <div class="form-group">
        <label>Month</label>
        <input type="month" id="monthPicker">
      </div>
      <div class="form-group">
        <label>Game</label>
        <select id="gameSelect"></select>
      </div>
    </div>
  </div>

  <div id="boardsArea"></div>
</div>

<script>
  /* ════════════════════════════
     LOAD LEADERBOARD — single batchGetSheets for all data
  ════════════════════════════ */
  async function loadLeaderboard() {
    const gameId = document.getElementById('gameSelect').value;
    const month  = document.getElementById('monthPicker').value;
    const area   = document.getElementById('boardsArea');
    if (!gameId || !month) { area.innerHTML = ''; return; }

    area.innerHTML = `<div style="text-align:center;padding:30px"><div class="spinner"></div></div>`;

    const [year, monthNum] = month.split('-');

    // All 5 sheets in one API call
    const sheets = await batchGetSheets([
      'Sessions', 'Players', 'Teams', 'Rounds_Individual', 'Rounds_Team'
    ]);
    const { Sessions: sessions, Players: players, Teams: teams,
            Rounds_Individual: roundsInd, Rounds_Team: roundsTeam } = sheets;

    const closedSessions = sessions.filter(s =>
      s.GameID === gameId &&
      s.Status === 'Closed' &&
      s.Date && s.Date.startsWith(`${year}-${monthNum}`)
    );

    if (!closedSessions.length) {
      const d = new Date(`${year}-${monthNum}-01`);
      const label = d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      area.innerHTML = `<div class="card">
        <div class="empty-state"><span class="empty-icon">📭</span>
        <p>No closed sessions for ${label}.</p></div></div>`;
      return;
    }

    /* ── Individual scores ── */
    const playerScores = {};
    for (const sess of closedSessions.filter(s => s.Type === 'Individual')) {
      for (const r of roundsInd.filter(r => r.SessionID === sess.SessionID)) {
        for (let i = 1; i <= 4; i++) {
          const pid = r[`Player${i}_ID`];
          if (pid) playerScores[pid] = (playerScores[pid] || 0) + parseFloat(r[`Points${i}`] || 0);
        }
      }
    }

    /* ── Team scores ── */
    const teamScores = {};
    for (const sess of closedSessions.filter(s => s.Type === 'Team')) {
      for (const r of roundsTeam.filter(r => r.SessionID === sess.SessionID)) {
        teamScores[r.TeamA_ID] = (teamScores[r.TeamA_ID] || 0) + parseFloat(r.PointsA || 0);
        teamScores[r.TeamB_ID] = (teamScores[r.TeamB_ID] || 0) + parseFloat(r.PointsB || 0);
      }
    }

    const playerBoard = Object.entries(playerScores)
      .map(([id, pts]) => {
        const p = players.find(pl => pl.PlayerID === id);
        return { name: p?.PlayerName || id, icon: p?.Icon || '🧑', bg: p?.BG || '#f3f4f6', points: pts };
      })
      .sort((a, b) => a.points - b.points);

    const teamBoard = Object.entries(teamScores)
      .map(([id, pts]) => {
        const t = teams.find(tm => tm.TeamID === id);
        const memberNames = (t?.PlayerIDs || '').split(',')
          .map(pid => players.find(p => p.PlayerID === pid.trim())?.PlayerName || null)
          .filter(Boolean).join(' · ');
        return { name: t?.TeamName || id, icon: t?.Icon || '🏅', bg: t?.BG || '#fef3c7', members: memberNames, points: pts };
      })
      .sort((a, b) => a.points - b.points);

    /* ── Render ── */
    const badgeClass = i => i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
    const minPts = arr => arr.length ? arr[0].points : null;

    function renderPlayerRow(item, i) {
      const isWinner = item.points === minPts(playerBoard);
      return `
        <div class="rank-row">
          <div class="rank-badge ${badgeClass(i)}">${i + 1}</div>
          <div class="rank-pip" style="background:${item.bg}">${item.icon}</div>
          <div class="rank-name">${escapeHtml(item.name)}</div>
          <div class="rank-pts${isWinner?' winner':''}">${item.points} pts</div>
        </div>`;
    }

    function renderTeamRow(item, i) {
      const isWinner = item.points === minPts(teamBoard);
      return `
        <div class="rank-row">
          <div class="rank-badge ${badgeClass(i)}">${i + 1}</div>
          <div class="rank-pip" style="background:${item.bg}">${item.icon}</div>
          <div class="rank-name">
            <div>${escapeHtml(item.name)}</div>
            ${item.members ? `<div style="font-size:11px;color:var(--text-3);font-weight:500;margin-top:1px">${escapeHtml(item.members)}</div>` : ''}
          </div>
          <div class="rank-pts${isWinner?' winner':''}">${item.points} pts</div>
        </div>`;
    }

    let html = '<div class="card">';

    if (playerBoard.length) {
      html += `<div class="mode-section">
        <div class="mode-section-title">👤 Individual</div>
        ${playerBoard.map(renderPlayerRow).join('')}
      </div>`;
    }
    if (playerBoard.length && teamBoard.length) html += `<hr class="mode-divider">`;
    if (teamBoard.length) {
      html += `<div class="mode-section">
        <div class="mode-section-title">🏆 Team</div>
        ${teamBoard.map(renderTeamRow).join('')}
      </div>`;
    }

    html += '</div>';
    area.innerHTML = html;
  }

  /* ════════════════════════════
     PAGE INIT
  ════════════════════════════ */
  window.onload = async () => {
    await initPageAuth({
      onNeedLogin: () => { location.href = '../Home.html'; },
      onReady: async () => {
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';

        const games = await loadGames();
        const gameSelect = document.getElementById('gameSelect');
        gameSelect.innerHTML = games.map(g =>
          `<option value="${g.GameID}">${escapeHtml(g.GameName)}</option>`
        ).join('');
        document.getElementById('monthPicker').value = new Date().toISOString().slice(0, 7);

        gameSelect.addEventListener('change', loadLeaderboard);
        document.getElementById('monthPicker').addEventListener('change', loadLeaderboard);
        await loadLeaderboard();
      }
    });
    renderBottomNav('leaderboard');
  };
</script>
</body>
</html>
