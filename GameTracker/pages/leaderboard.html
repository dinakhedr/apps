<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="images/icon.png">
  <link rel="icon" type="image/png" sizes="180x180" href="images/icon.png">
  <link rel="shortcut icon" href="images/icon.png">
  <link rel="icon" type="image/png" href="images/icon.png">
  <title>Leaderboard</title>
  <link rel="stylesheet" href="styles.css">
  <script src="utils.js"></script>
  <script src="auth.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
</head>
<body>
<div id="loadingOverlay" class="loading-overlay"><div class="loading-box"><div class="spinner"></div><p>Loading...</p></div></div>
<div class="container" id="mainApp" style="display:none">
  <div class="header"><button class="back-btn" onclick="history.back()">←</button><h1>📊 Leaderboard</h1></div>
  <div class="card">
    <div class="form-row">
      <select id="gameSelect"></select>
      <input type="month" id="monthPicker">
    </div>
    <div id="individualBoard" style="display:none"><div class="card-title">Individual Leaderboard</div><div id="individualList"></div></div>
    <div id="teamBoard" style="display:none"><div class="card-title">Team Leaderboard</div><div id="teamList"></div></div>
  </div>
</div>
<script>
  async function loadLeaderboard() {
    const gameId = document.getElementById('gameSelect').value;
    const month = document.getElementById('monthPicker').value;
    if (!gameId || !month) return;
    const [year, monthNum] = month.split('-');
    const sessions = await loadSessions();
    const closedSessions = sessions.filter(s => s.GameID === gameId && s.Status === 'Closed' && s.Date.startsWith(`${year}-${monthNum}`));
    const participantsAll = await loadSessionParticipants();
    const roundsInd = await loadRoundsIndividual();
    const roundsTeam = await loadRoundsTeam();
    const players = await loadPlayers();
    const teams = await loadTeams();
    // Individual scores
    let playerScores = {};
    for (let sess of closedSessions.filter(s => s.Type === 'Individual')) {
      const sessionRounds = roundsInd.filter(r => r.SessionID === sess.SessionID);
      for (let r of sessionRounds) {
        for (let i=1; i<=4; i++) {
          let pid = r[`Player${i}_ID`];
          if (pid) playerScores[pid] = (playerScores[pid] || 0) + parseFloat(r[`Points${i}`] || 0);
        }
      }
    }
    const playerBoard = Object.entries(playerScores).map(([id, pts]) => ({ name: players.find(p => p.PlayerID === id)?.PlayerName || id, points: pts })).sort((a,b) => a.points - b.points);
    document.getElementById('individualList').innerHTML = playerBoard.map((p,idx) => `<div class="expense-item"><div class="exp-cat">${idx+1}. ${escapeHtml(p.name)}</div><div class="exp-amount">${p.points} pts</div></div>`).join('') || '<div class="empty-state">No individual matches this month</div>';
    document.getElementById('individualBoard').style.display = playerBoard.length ? 'block' : 'none';
    // Team scores
    let teamScores = {};
    for (let sess of closedSessions.filter(s => s.Type === 'Team')) {
      const sessionRounds = roundsTeam.filter(r => r.SessionID === sess.SessionID);
      for (let r of sessionRounds) {
        teamScores[r.TeamA_ID] = (teamScores[r.TeamA_ID] || 0) + parseFloat(r.PointsA || 0);
        teamScores[r.TeamB_ID] = (teamScores[r.TeamB_ID] || 0) + parseFloat(r.PointsB || 0);
      }
    }
    const teamBoard = Object.entries(teamScores).map(([id, pts]) => ({ name: teams.find(t => t.TeamID === id)?.TeamName || id, points: pts })).sort((a,b) => a.points - b.points);
    document.getElementById('teamList').innerHTML = teamBoard.map((t,idx) => `<div class="expense-item"><div class="exp-cat">${idx+1}. ${escapeHtml(t.name)}</div><div class="exp-amount">${t.points} pts</div></div>`).join('') || '<div class="empty-state">No team matches this month</div>';
    document.getElementById('teamBoard').style.display = teamBoard.length ? 'block' : 'none';
  }
  window.onload = async () => {
    await initPageAuth({
      onNeedLogin: () => { window.location.href = 'index.html'; },
      onReady: async () => {
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        const games = await loadGames();
        const gameSelect = document.getElementById('gameSelect');
        gameSelect.innerHTML = games.map(g => `<option value="${g.GameID}">${g.GameName}</option>`).join('');
        document.getElementById('monthPicker').value = new Date().toISOString().slice(0,7);
        gameSelect.addEventListener('change', loadLeaderboard);
        document.getElementById('monthPicker').addEventListener('change', loadLeaderboard);
        await loadLeaderboard();
      }
    });
  };
</script>
</body>
</html>
