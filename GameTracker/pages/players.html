<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="../manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="../images/icon.png">
  <link rel="icon" type="image/png" sizes="180x180" href="../images/icon.png">
  <link rel="shortcut icon" href="../images/icon.png">
  <link rel="icon" type="image/png" href="../images/icon.png">
  <title>Players</title>
  <link rel="stylesheet" href="../assets/styles.css">
  <script src="../assets/utils.js"></script>
  <script src="../assets/auth.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
</head>
<body>
<div id="loadingOverlay" class="loading-overlay"><div class="loading-box"><div class="spinner"></div><p>Loading...</p></div></div>
<div class="container" id="mainApp" style="display:none">
  <div class="header"><button class="back-btn" onclick="history.back()">←</button><h1>👥 Players</h1></div>
  <div class="card">
    <div class="card-title">Add New Player</div>
    <div class="form-group"><label>Player Name</label><input type="text" id="playerName" placeholder="e.g. Alice"></div>
    <div class="form-group"><label>Gender</label>
      <select id="playerGender">
        <option value="Male">♂️ Male</option>
        <option value="Female">♀️ Female</option>
        <option value="Other">⚧ Other</option>
      </select>
    </div>
    <button class="submit-btn" id="addBtn">+ Add Player</button>
  </div>
  <div class="card">
    <div class="card-title">All Players</div>
    <div id="playerList"></div>
  </div>
</div>
<script>
  function getGenderIcon(gender) {
    if (gender === 'Male') return '👨';
    if (gender === 'Female') return '👩';
    return '🧑';
  }

  async function loadPlayersList() {
    const players = await loadPlayers();
    document.getElementById('playerList').innerHTML = players.map(p => `
      <div class="expense-item">
        <div class="cat-icon" style="background:#d1fae5">${getGenderIcon(p.Gender)}</div>
        <div class="exp-details">
          <div class="exp-cat">${escapeHtml(p.PlayerName)}</div>
          <div class="exp-meta">ID: ${p.PlayerID} | ${p.Gender || 'Not set'}</div>
        </div>
        <div><span class="badge" style="background:${p.Status==='Active'?'#d1fae5':'#fee2e2'}">${p.Status}</span></div>
      </div>
    `).join('') || '<div class="empty-state">No players yet</div>';
  }

  window.onload = async () => {
    await initPageAuth({
      onNeedLogin: () => { window.location.href = 'index.html'; },
      onReady: async () => {
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        await loadPlayersList();
      }
    });
    document.getElementById('addBtn').onclick = async () => {
      const name = document.getElementById('playerName').value.trim();
      const gender = document.getElementById('playerGender').value;
      if (!name) return alert('Enter a name');
      await addPlayer(name, gender);
      document.getElementById('playerName').value = '';
      await loadPlayersList();
    };
  };
</script>
</body>
</html>
