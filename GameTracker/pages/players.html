<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="../manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="../images/icon.png">
  <link rel="icon" type="image/png" href="../images/icon.png">
  <title>Players</title>
  <link rel="stylesheet" href="../assets/styles.css">
  <script src="../assets/utils.js"></script>
  <script src="../assets/auth.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-box"><div class="spinner"></div><p>Loading…</p></div>
</div>

<div class="container" id="mainApp" style="display:none">
  <div class="header">
    <button class="back-btn" onclick="history.back()">←</button>
    <h1>👥 Players</h1>
  </div>

  <div class="card">
    <div class="card-title">Add Player</div>
    <div class="form-group">
      <label>Player Name</label>
      <input type="text" id="playerName" placeholder="e.g. Alice">
    </div>
    <div class="form-group">
      <label>Gender</label>
      <select id="playerGender">
        <option value="Male">♂ Male</option>
        <option value="Female">♀ Female</option>
        <option value="Other">⚧ Other</option>
      </select>
    </div>
    <button class="submit-btn" id="addBtn">+ Add Player</button>
  </div>

  <div class="card">
    <div class="card-title">All Players</div>
    <div id="playerList"></div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-backdrop" id="editModal" onclick="closeEditModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">Edit Player</div>
    <div class="form-group">
      <label>Player Name</label>
      <input type="text" id="editName" placeholder="Player name">
    </div>
    <div class="form-group">
      <label>Gender</label>
      <select id="editGender">
        <option value="Male">♂ Male</option>
        <option value="Female">♀ Female</option>
        <option value="Other">⚧ Other</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn-save" id="editSaveBtn" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
  let selectedPlayer = null;

  const genderIcon = g => g === 'Male' ? '👨' : g === 'Female' ? '👩' : '🧑';
  const genderBg   = g => g === 'Male' ? '#dbeafe' : g === 'Female' ? '#fce7f3' : '#f3f4f6';

  async function loadPlayersList() {
    const players = await loadPlayers();
    if (!players.length) {
      document.getElementById('playerList').innerHTML =
        `<div class="empty-state"><span class="empty-icon">👥</span><p>No players yet. Add one above!</p></div>`;
      return;
    }
    document.getElementById('playerList').innerHTML = players.map(p => `
      <div class="expense-item no-tap">
        <div class="cat-icon" style="background:${genderBg(p.Gender)}">${genderIcon(p.Gender)}</div>
        <div class="exp-details">
          <div class="exp-cat">${escapeHtml(p.PlayerName)}</div>
          <div class="exp-meta">
            ${p.Gender || 'Not set'} &nbsp;·&nbsp;
            <span class="badge ${p.Status === 'Active' ? 'badge-active' : 'badge-inactive'}">${p.Status}</span>
          </div>
        </div>
        <div class="row-actions">
          <button class="row-btn edit" title="Edit" onclick="openEditModal('${p.PlayerID}','${escapeHtml(p.PlayerName).replace(/'/g,"\\'")}','${p.Gender || ''}')">✏️</button>
          <button class="row-btn delete" title="Delete" onclick="confirmDelete('${p.PlayerID}','${escapeHtml(p.PlayerName).replace(/'/g,"\\'")}')">🗑️</button>
        </div>
      </div>
    `).join('');
  }

  function openEditModal(id, name, gender) {
    selectedPlayer = { id, name, gender };
    document.getElementById('editName').value = name;
    document.getElementById('editGender').value = gender || 'Male';
    document.getElementById('editModal').classList.add('open');
  }
  function closeEditModal() {
    document.getElementById('editModal').classList.remove('open');
  }

  async function saveEdit() {
    const name   = document.getElementById('editName').value.trim();
    const gender = document.getElementById('editGender').value;
    if (!name) return showToast('Enter a name', 'error');
    const btn = document.getElementById('editSaveBtn');
    btn.textContent = 'Saving…'; btn.disabled = true;
    try {
      await editPlayer(selectedPlayer.id, name, gender);
      closeEditModal();
      showToast('Player updated ✓');
      await loadPlayersList();
    } catch(e) {
      showToast('Error saving', 'error');
    } finally {
      btn.textContent = 'Save Changes'; btn.disabled = false;
    }
  }

  async function confirmDelete(id, name) {
    if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
    try {
      await deletePlayer(id);
      showToast('Player deleted');
      await loadPlayersList();
    } catch(e) {
      showToast('Error deleting', 'error');
    }
  }

  window.onload = async () => {
    await initPageAuth({
      onNeedLogin: () => { location.href = '../Home.html'; },
      onReady: async () => {
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        await loadPlayersList();
      }
    });
    document.getElementById('addBtn').onclick = async () => {
      const name   = document.getElementById('playerName').value.trim();
      const gender = document.getElementById('playerGender').value;
      if (!name) return showToast('Enter a player name', 'error');
      const btn = document.getElementById('addBtn');
      btn.textContent = 'Adding…'; btn.disabled = true;
      try {
        await addPlayer(name, gender);
        document.getElementById('playerName').value = '';
        showToast(`${name} added ✓`);
        await loadPlayersList();
      } catch(e) {
        showToast('Error adding player', 'error');
      } finally {
        btn.textContent = '+ Add Player'; btn.disabled = false;
      }
    };
    renderBottomNav('players');
  };
</script>
</body>
</html>
