<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="../manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="../images/icon.png">
  <link rel="icon" type="image/png" href="../images/icon.png">
  <title>Players</title>
  <link rel="stylesheet" href="../assets/styles.css">
  <script src="../assets/utils.js"></script>
  <script src="../assets/auth.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    /* layout for label‑left rows */
    .label-left-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }
    .label-left-row label {
      min-width: 60px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0;
    }
    .controls {
      flex: 1;
      display: flex;
      align-items: center;
    }
  </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-box"><div class="spinner"></div><p>Loading…</p></div>
</div>

<div class="container" id="mainApp" style="display:none">
  <div class="header">
    <button class="back-btn" onclick="history.back()">←</button>
    <h1>👥 Players</h1>
  </div>

  <!-- ADD PLAYER CARD -->
  <div class="card">
    <div class="card-title">Add Player</div>

    <!-- Row 1: Player Name (label above still ok, but we'll keep consistent) -->
    <div class="label-left-row">
      <label>Name</label>
      <div class="controls">
        <input type="text" id="playerName" placeholder="e.g. Alice" style="margin-bottom:0;">
      </div>
    </div>

    <!-- Row 2: Gender -->
    <div class="label-left-row">
      <label>Gender</label>
      <div class="controls radio-group">
        <label style="display:flex; align-items:center; font-size:14px; font-weight:600; color:var(--text); cursor:pointer; margin-bottom:0;">
          <input type="radio" name="addGender" value="Male" checked style="width:auto; margin-right:4px; accent-color:var(--brand);"> ♂ Male
        </label>
        <label style="display:flex; align-items:center; font-size:14px; font-weight:600; color:var(--text); cursor:pointer; margin-bottom:0; margin-left:20px;">
          <input type="radio" name="addGender" value="Female" style="width:auto; margin-right:4px; accent-color:var(--brand);"> ♀ Female
        </label>
      </div>
    </div>

    <!-- Row 3: Status -->
    <div class="label-left-row">
      <label>Status</label>
      <div class="controls">
        <div class="toggle-switch" style="margin-bottom:0;">
          <input type="checkbox" id="addStatusToggle" checked>
          <label for="addStatusToggle" class="toggle-label">Active</label>
        </div>
      </div>
    </div>

    <button class="submit-btn" id="addBtn">+ Add Player</button>
  </div>

  <!-- ALL PLAYERS CARD -->
  <div class="card">
    <div class="card-title">All Players</div>
    <div id="playerList"></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-backdrop" id="editModal" onclick="closeEditModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">Edit Player</div>

    <!-- Row 1: Name -->
    <div class="label-left-row">
      <label>Name</label>
      <div class="controls">
        <input type="text" id="editName" placeholder="Player name" style="margin-bottom:0;">
      </div>
    </div>

    <!-- Row 2: Gender -->
    <div class="label-left-row">
      <label>Gender</label>
      <div class="controls radio-group">
        <label style="display:flex; align-items:center; font-size:14px; font-weight:600; color:var(--text); cursor:pointer; margin-bottom:0;">
          <input type="radio" name="editGender" value="Male" style="width:auto; margin-right:4px; accent-color:var(--brand);"> ♂ Male
        </label>
        <label style="display:flex; align-items:center; font-size:14px; font-weight:600; color:var(--text); cursor:pointer; margin-bottom:0; margin-left:20px;">
          <input type="radio" name="editGender" value="Female" style="width:auto; margin-right:4px; accent-color:var(--brand);"> ♀ Female
        </label>
      </div>
    </div>

    <!-- Row 3: Status -->
    <div class="label-left-row">
      <label>Status</label>
      <div class="controls">
        <div class="toggle-switch" style="margin-bottom:0;">
          <input type="checkbox" id="editStatusToggle">
          <label for="editStatusToggle" class="toggle-label">Active</label>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn-save" id="editSaveBtn" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
  let selectedPlayer = null;

  const genderIcon = g => g === 'Male' ? '👨' : g === 'Female' ? '👩' : '🧑';
  const genderBg   = g => g === 'Male' ? '#dbeafe' : g === 'Female' ? '#fce7f3' : '#f3f4f6';

  async function loadPlayersList() {
    const players = await loadPlayers();
    if (!players.length) {
      document.getElementById('playerList').innerHTML =
        `<div class="empty-state"><span class="empty-icon">👥</span><p>No players yet. Add one above!</p></div>`;
      return;
    }
    document.getElementById('playerList').innerHTML = players.map(p => `
      <div class="expense-item no-tap">
        <div class="cat-icon" style="background:${genderBg(p.Gender)}">${genderIcon(p.Gender)}</div>
        <div class="exp-details">
          <div class="exp-cat">${escapeHtml(p.PlayerName)}</div>
          <div class="exp-meta">
            ${p.Gender || 'Not set'} &nbsp;·&nbsp;
            <span class="badge ${p.Status === 'Active' ? 'badge-active' : 'badge-inactive'}">${p.Status}</span>
          </div>
        </div>
        <div class="row-actions">
          <button class="row-btn edit" title="Edit" onclick="openEditModal('${p.PlayerID}','${escapeHtml(p.PlayerName).replace(/'/g,"\\'")}','${p.Gender || ''}')">✏️</button>
          <button class="row-btn delete" title="Delete" onclick="confirmDelete('${p.PlayerID}','${escapeHtml(p.PlayerName).replace(/'/g,"\\'")}')">🗑️</button>
        </div>
      </div>
    `).join('');
  }

  async function openEditModal(id, name, gender) {
    // Fetch current status from sheet
    const players = await loadPlayers();
    const player = players.find(p => p.PlayerID === id);
    const status = player ? player.Status : 'Active';

    selectedPlayer = { id, name, gender, status };
    document.getElementById('editName').value = name;

    // Set gender radio
    const maleRadio = document.querySelector('input[name="editGender"][value="Male"]');
    const femaleRadio = document.querySelector('input[name="editGender"][value="Female"]');
    if (gender === 'Female' && femaleRadio) femaleRadio.checked = true;
    else if (maleRadio) maleRadio.checked = true;

    // Set status toggle
    const toggle = document.getElementById('editStatusToggle');
    if (toggle) toggle.checked = (status === 'Active');

    document.getElementById('editModal').classList.add('open');
  }

  function closeEditModal() {
    document.getElementById('editModal').classList.remove('open');
  }

  async function saveEdit() {
    const name   = document.getElementById('editName').value.trim();
    const gender = document.querySelector('input[name="editGender"]:checked')?.value || 'Male';
    const status = document.getElementById('editStatusToggle').checked ? 'Active' : 'Inactive';

    if (!name) return showToast('Enter a name', 'error');
    const btn = document.getElementById('editSaveBtn');
    btn.textContent = 'Saving…'; btn.disabled = true;
    try {
      await editPlayer(selectedPlayer.id, name, gender, status);
      closeEditModal();
      showToast('Player updated ✓');
      await loadPlayersList();
    } catch(e) {
      showToast('Error saving', 'error');
    } finally {
      btn.textContent = 'Save Changes'; btn.disabled = false;
    }
  }

  async function confirmDelete(id, name) {
    if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
    try {
      await deletePlayer(id);
      showToast('Player deleted');
      await loadPlayersList();
    } catch(e) {
      showToast('Error deleting', 'error');
    }
  }

  window.onload = async () => {
    await initPageAuth({
      onNeedLogin: () => { location.href = '../Home.html'; },
      onReady: async () => {
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        await loadPlayersList();
      }
    });

    document.getElementById('addBtn').onclick = async () => {
      const name   = document.getElementById('playerName').value.trim();
      const gender = document.querySelector('input[name="addGender"]:checked')?.value || 'Male';
      const status = document.getElementById('addStatusToggle').checked ? 'Active' : 'Inactive';

      if (!name) return showToast('Enter a player name', 'error');
      const btn = document.getElementById('addBtn');
      btn.textContent = 'Adding…'; btn.disabled = true;
      try {
        await addPlayer(name, gender, status);
        document.getElementById('playerName').value = '';
        // Reset radio to Male
        const maleRadio = document.querySelector('input[name="addGender"][value="Male"]');
        if (maleRadio) maleRadio.checked = true;
        document.getElementById('addStatusToggle').checked = true;
        showToast(`${name} added ✓`);
        await loadPlayersList();
      } catch(e) {
        showToast('Error adding player', 'error');
      } finally {
        btn.textContent = '+ Add Player'; btn.disabled = false;
      }
    };

    renderBottomNav('players');
  };
</script>
</body>
</html>
