<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="../manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="../images/icon.png">
  <link rel="icon" type="image/png" href="../images/icon.png">
  <title>Close Session</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="../assets/styles.css">
  <script src="../assets/utils.js"></script>
  <script src="../assets/auth.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-box"><div class="spinner"></div><p>Loading…</p></div>
</div>

<div class="container" id="mainApp" style="display:none">
  <div class="header">
    <button class="back-btn" onclick="history.back()">←</button>
    <h1>🏁 Close Session</h1>
  </div>

  <div class="card">
    <div class="card-title">Select Active Session</div>
    <div id="noSessions" style="display:none">
      <div class="empty-state"><span class="empty-icon">😴</span><p>No active sessions to close.</p></div>
    </div>
    <div id="sessionPickerWrap">
      <div class="form-group"><select id="sessionSelect"></select></div>
      <div id="summary" style="margin-top:16px"></div>
      <button class="submit-btn" id="closeBtn" style="margin-top:8px">🏁 Close &amp; Calculate Winner</button>
    </div>
  </div>
</div>

<script>
  // All data loaded once and reused — no re-fetching on dropdown change
  let _games = [], _allPlayers = [], _allTeams = [];
  let _sessions = [], _participants = [], _roundsInd = [], _roundsTeam = [];
  let _activeSessions = [];

  async function loadActiveSessions() {
    // Single batchGetSheets for everything needed across all views
    const sheets = await batchGetSheets([
      'Games', 'Players', 'Teams', 'Sessions',
      'SessionParticipants', 'Rounds_Individual', 'Rounds_Team'
    ]);
    _games        = sheets.Games;
    _allPlayers   = sheets.Players;
    _allTeams     = sheets.Teams;
    _sessions     = sheets.Sessions;
    _participants = sheets.SessionParticipants;
    _roundsInd    = sheets.Rounds_Individual;
    _roundsTeam   = sheets.Rounds_Team;

    _activeSessions = _sessions.filter(s => s.Status === 'Active');
    const gameMap = Object.fromEntries(_games.map(g => [g.GameID, g.GameName]));
    const sel = document.getElementById('sessionSelect');

    if (!_activeSessions.length) {
      document.getElementById('sessionPickerWrap').style.display = 'none';
      document.getElementById('noSessions').style.display = 'block';
      return;
    }

    sel.innerHTML = _activeSessions.map(s =>
      `<option value="${s.SessionID}">${escapeHtml(gameMap[s.GameID] || 'Unknown')} · ${s.Type} · ${formatDate(s.Date)}</option>`
    ).join('');
    sel.addEventListener('change', showSummary);
    showSummary(); // No await needed — uses pre-loaded data
  }

  // Uses only already-loaded data — no API calls
  function showSummary() {
    const sessionId  = document.getElementById('sessionSelect').value;
    if (!sessionId) return;
    const summaryDiv = document.getElementById('summary');

    const session = _sessions.find(s => s.SessionID === sessionId);
    const partRow = _participants.find(p => p.SessionID === sessionId);
    const participantIds = partRow
      ? partRow.ParticipantID.split(',').map(s => s.trim()).filter(Boolean)
      : [];

    let totals = {};
    participantIds.forEach(id => totals[id] = 0);

    if (session.Type === 'Individual') {
      const rounds = _roundsInd.filter(r => r.SessionID === sessionId);
      rounds.forEach(r => {
        for (let i = 1; i <= 4; i++) {
          const pid = r[`Player${i}_ID`];
          if (pid && totals[pid] !== undefined) totals[pid] += parseFloat(r[`Points${i}`] || 0);
        }
      });
      const sorted = Object.entries(totals).sort((a, b) => a[1] - b[1]);
      const minPts = sorted[0]?.[1] ?? 0;
      summaryDiv.innerHTML = `<div class="card-title" style="margin-bottom:12px">Current Scores</div>` +
        sorted.map(([pid, pts]) => {
          const name = _allPlayers.find(p => p.PlayerID === pid)?.PlayerName || pid;
          const isLeading = pts === minPts;
          return `<div class="expense-item" style="cursor:default">
            <div class="cat-icon" style="background:${isLeading ? '#d1fae5' : '#f5f5fa'}">${isLeading ? '🥇' : '▪️'}</div>
            <div class="exp-details"><div class="exp-cat">${escapeHtml(name)}</div></div>
            <div class="exp-amount" style="color:${isLeading ? 'var(--success)' : 'var(--text)'}">${pts} pts</div>
          </div>`;
        }).join('');
    } else {
      const rounds = _roundsTeam.filter(r => r.SessionID === sessionId);
      rounds.forEach(r => {
        if (totals[r.TeamA_ID] !== undefined) totals[r.TeamA_ID] += parseFloat(r.PointsA || 0);
        if (totals[r.TeamB_ID] !== undefined) totals[r.TeamB_ID] += parseFloat(r.PointsB || 0);
      });
      const sorted = Object.entries(totals).sort((a, b) => a[1] - b[1]);
      const minPts = sorted[0]?.[1] ?? 0;
      summaryDiv.innerHTML = `<div class="card-title" style="margin-bottom:12px">Current Scores</div>` +
        sorted.map(([tid, pts]) => {
          const name = _allTeams.find(t => t.TeamID === tid)?.TeamName || tid;
          const isLeading = pts === minPts;
          return `<div class="expense-item" style="cursor:default">
            <div class="cat-icon" style="background:${isLeading ? '#d1fae5' : '#f5f5fa'}">${isLeading ? '🥇' : '🅱️'}</div>
            <div class="exp-details"><div class="exp-cat">${escapeHtml(name)}</div></div>
            <div class="exp-amount" style="color:${isLeading ? 'var(--success)' : 'var(--text)'}">${pts} pts</div>
          </div>`;
        }).join('');
    }
  }

  window.onload = async () => {
    await initPageAuth({
      onNeedLogin: () => { location.href = '../Home.html'; },
      onReady: async () => {
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        await loadActiveSessions();
      }
    });

    document.getElementById('closeBtn').onclick = async () => {
      const sessionId = document.getElementById('sessionSelect').value;
      if (!sessionId) return;
      if (!confirm('Close this session? Winner = lowest total points.')) return;
      const btn = document.getElementById('closeBtn');
      btn.textContent = 'Closing…'; btn.disabled = true;
      try {
        await closeSession(sessionId);
        showToast('Session closed! 🏆');
        setTimeout(() => location.reload(), 1200);
      } catch(e) {
        showToast('Error closing session', 'error');
        btn.textContent = '🏁 Close & Calculate Winner'; btn.disabled = false;
      }
    };
    renderBottomNav('');
  };
</script>
</body>
</html>
