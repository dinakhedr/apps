<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="images/icon.png">
  <link rel="icon" type="image/png" sizes="180x180" href="images/icon.png">
  <link rel="shortcut icon" href="images/icon.png">
  <link rel="icon" type="image/png" href="images/icon.png">
  <title>Close Session</title>
  <link rel="stylesheet" href="styles.css">
  <script src="utils.js"></script>
  <script src="auth.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
</head>
<body>
<div id="loadingOverlay" class="loading-overlay"><div class="loading-box"><div class="spinner"></div><p>Loading...</p></div></div>
<div class="container" id="mainApp" style="display:none">
  <div class="header"><button class="back-btn" onclick="history.back()">←</button><h1>🏁 Close Session</h1></div>
  <div class="card">
    <div class="card-title">Select Session to Close</div>
    <select id="sessionSelect"></select>
    <div id="summary"></div>
    <button class="submit-btn" id="closeBtn">Close & Calculate Winner</button>
  </div>
</div>
<script>
  async function loadActiveSessions() {
    const sessions = await loadSessions();
    const active = sessions.filter(s => s.Status === 'Active');
    const select = document.getElementById('sessionSelect');
    select.innerHTML = active.map(s => `<option value="${s.SessionID}">${s.SessionID} - ${s.Date}</option>`).join('');
    if (active.length) select.dispatchEvent(new Event('change'));
  }
  async function showSummary() {
    const sessionId = document.getElementById('sessionSelect').value;
    if (!sessionId) return;
    const summaryDiv = document.getElementById('summary');
    summaryDiv.innerHTML = '<div class="spinner"></div>';
    const sessions = await loadSessions();
    const session = sessions.find(s => s.SessionID === sessionId);
    const participants = (await loadSessionParticipants()).filter(p => p.SessionID === sessionId);
    let totals = {};
    if (session.Type === 'Individual') {
      const rounds = await loadRoundsIndividual();
      const sessionRounds = rounds.filter(r => r.SessionID === sessionId);
      for (let r of sessionRounds) {
        for (let i=1; i<=4; i++) {
          let pid = r[`Player${i}_ID`];
          if (pid) totals[pid] = (totals[pid] || 0) + parseFloat(r[`Points${i}`] || 0);
        }
      }
      const players = await loadPlayers();
      let html = '<div class="card-title">Individual Scores</div>';
      for (let pid in totals) {
        let name = players.find(p => p.PlayerID === pid)?.PlayerName || pid;
        html += `<div class="expense-item"><div class="exp-cat">${escapeHtml(name)}</div><div class="exp-amount">${totals[pid]}</div></div>`;
      }
      summaryDiv.innerHTML = html;
    } else {
      const rounds = await loadRoundsTeam();
      const sessionRounds = rounds.filter(r => r.SessionID === sessionId);
      for (let r of sessionRounds) {
        totals[r.TeamA_ID] = (totals[r.TeamA_ID] || 0) + parseFloat(r.PointsA || 0);
        totals[r.TeamB_ID] = (totals[r.TeamB_ID] || 0) + parseFloat(r.PointsB || 0);
      }
      const teams = await loadTeams();
      let html = '<div class="card-title">Team Scores</div>';
      for (let tid in totals) {
        let name = teams.find(t => t.TeamID === tid)?.TeamName || tid;
        html += `<div class="expense-item"><div class="exp-cat">${escapeHtml(name)}</div><div class="exp-amount">${totals[tid]}</div></div>`;
      }
      summaryDiv.innerHTML = html;
    }
  }
  window.onload = async () => {
    await initPageAuth({
      onNeedLogin: () => { window.location.href = 'index.html'; },
      onReady: async () => {
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        await loadActiveSessions();
      }
    });
    document.getElementById('sessionSelect').addEventListener('change', showSummary);
    document.getElementById('closeBtn').onclick = async () => {
      const sessionId = document.getElementById('sessionSelect').value;
      if (!sessionId) return;
      if (confirm('Close this session? Winner will be determined by lowest total points.')) {
        await closeSession(sessionId);
        alert('Session closed');
        await loadActiveSessions();
      }
    };
  };
</script>
</body>
</html>
