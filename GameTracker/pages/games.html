<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="../manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="../images/icon.png">
  <link rel="icon" type="image/png" href="../images/icon.png">
  <title>Games</title>
  <link rel="stylesheet" href="../assets/styles.css">
  <script src="../assets/utils.js"></script>
  <script src="../assets/auth.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    /* ── Mode toggle pills ── */
    .mode-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      margin-bottom: 14px;
    }
    .mode-pill {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 14px; border-radius: var(--radius-sm);
      border: 2px solid var(--border); background: var(--surface-2);
      cursor: pointer; transition: all 0.18s; user-select: none;
      position: relative;
    }
    .mode-pill.active {
      border-color: var(--brand); background: #ededff;
    }
    /* Custom checkbox circle */
    .mode-pill-check {
      width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
      border: 2px solid var(--border); background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; color: #fff;
      transition: all 0.15s;
    }
    .mode-pill.active .mode-pill-check {
      background: var(--brand); border-color: var(--brand);
    }
    .mode-pill.active .mode-pill-check::after { content: '✓'; }
    .mode-pill-text { flex: 1; }
    .mode-pill-title {
      font-size: 14px; font-weight: 700; color: var(--text);
      display: block; line-height: 1.2;
    }
    .mode-pill-sub {
      font-size: 11px; color: var(--text-3); margin-top: 2px; display: block;
    }

    /* ── Expandable sub-section ── */
    .mode-sub {
      border-radius: var(--radius-sm); border: 1.5px solid var(--brand);
      background: #f5f4ff; overflow: hidden;
      max-height: 0; opacity: 0;
      transition: max-height 0.28s ease, opacity 0.22s ease, margin 0.2s ease;
      margin-bottom: 0;
    }
    .mode-sub.open {
      max-height: 160px; opacity: 1;
      padding: 14px 16px; margin-bottom: 14px;
    }
    .mode-sub .sub-label {
      font-size: 11px; font-weight: 700; color: var(--brand);
      text-transform: uppercase; letter-spacing: 0.05em;
      display: block; margin-bottom: 10px;
    }
    .mode-sub .sub-row {
      display: flex; align-items: center; gap: 12px;
    }
    .mode-sub .sub-row input {
      width: 72px; text-align: center;
      font-family: 'Sora', sans-serif; font-size: 20px; font-weight: 800;
      padding: 8px; flex-shrink: 0; border-radius: 8px;
    }
    .mode-sub .sub-desc {
      font-size: 12px; color: var(--text-2); line-height: 1.5;
    }

    /* ── Game list item ── */
    .game-item {
      padding: 14px 0; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .game-item:last-child { border-bottom: none; }
    .game-icon-bubble {
      width: 46px; height: 46px; border-radius: 13px;
      background: #ede9fe; display: flex; align-items: center;
      justify-content: center; font-size: 24px; flex-shrink: 0;
    }
    .game-details { flex: 1; min-width: 0; }
    .game-name { font-weight: 700; font-size: 15px; color: var(--text); }
    .game-meta { font-size: 11px; color: var(--text-3); margin-top: 2px; }
    .game-mode-chips { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
    .game-mode-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700;
    }
    .chip-ind  { background: #dbeafe; color: #1e40af; }
    .chip-team { background: #d1fae5; color: #065f46; }
  </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-box"><div class="spinner"></div><p>Loading…</p></div>
</div>

<div class="container" id="mainApp" style="display:none">
  <div class="header">
    <button class="back-btn" onclick="history.back()">←</button>
    <h1>🎮 Games</h1>
  </div>

  <!-- ── Add Game ── -->
  <div class="card">
    <div class="card-title">Add Game</div>

    <div class="form-group">
      <label>Game Name</label>
      <input type="text" id="gameName" placeholder="e.g. Backgammon">
    </div>
    <div class="form-group">
      <label>Total Players per Match</label>
      <input type="number" id="totalPlayers" min="2" max="20" value="4">
    </div>

    <label style="font-size:11px;font-weight:700;color:var(--text-2);text-transform:uppercase;
      letter-spacing:0.05em;margin-bottom:8px;display:block">Game Modes</label>

    <div class="mode-row">
      <div class="mode-pill" id="addIndPill" onclick="toggleMode('add','ind')">
        <div class="mode-pill-check" id="addIndCheck"></div>
        <div class="mode-pill-text">
          <span class="mode-pill-title">Individual</span>
          <span class="mode-pill-sub">1 vs 1 vs …</span>
        </div>
      </div>
      <div class="mode-pill" id="addTeamPill" onclick="toggleMode('add','team')">
        <div class="mode-pill-check" id="addTeamCheck"></div>
        <div class="mode-pill-text">
          <span class="mode-pill-title">Team</span>
          <span class="mode-pill-sub">Team vs Team</span>
        </div>
      </div>
    </div>

    <!-- Team sub-section -->
    <div class="mode-sub" id="addTeamSub">
      <span class="sub-label">Players per Team</span>
      <div class="sub-row">
        <input type="number" id="playersPerTeam" min="1" max="10" value="2">
        <span class="sub-desc">How many players make up each team in this game?</span>
      </div>
    </div>

    <button class="submit-btn" id="addBtn">+ Add Game</button>
  </div>

  <!-- ── All Games ── -->
  <div class="card">
    <div class="card-title">All Games</div>
    <div id="gamesList"></div>
  </div>
</div>

<!-- ── Edit Modal ── -->
<div class="modal-backdrop" id="editModal" onclick="closeEditModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">Edit Game</div>

    <div class="form-group">
      <label>Game Name</label>
      <input type="text" id="editGameName">
    </div>
    <div class="form-group">
      <label>Total Players per Match</label>
      <input type="number" id="editTotalPlayers" min="2" max="20">
    </div>

    <label style="font-size:11px;font-weight:700;color:var(--text-2);text-transform:uppercase;
      letter-spacing:0.05em;margin-bottom:8px;display:block">Game Modes</label>

    <div class="mode-row">
      <div class="mode-pill" id="editIndPill" onclick="toggleMode('edit','ind')">
        <div class="mode-pill-check" id="editIndCheck"></div>
        <div class="mode-pill-text">
          <span class="mode-pill-title">Individual</span>
          <span class="mode-pill-sub">1 vs 1 vs …</span>
        </div>
      </div>
      <div class="mode-pill" id="editTeamPill" onclick="toggleMode('edit','team')">
        <div class="mode-pill-check" id="editTeamCheck"></div>
        <div class="mode-pill-text">
          <span class="mode-pill-title">Team</span>
          <span class="mode-pill-sub">Team vs Team</span>
        </div>
      </div>
    </div>

    <div class="mode-sub" id="editTeamSub">
      <span class="sub-label">Players per Team</span>
      <div class="sub-row">
        <input type="number" id="editPlayersPerTeam" min="1" max="10" value="2">
        <span class="sub-desc">How many players make up each team in this game?</span>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn-save" id="editSaveBtn" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
  /* ─── state ─── */
  let selectedGame = null;
  const addState  = { ind: false, team: false };
  const editState = { ind: false, team: false };

  /* ════════════════════════════
     MODE PILLS
  ════════════════════════════ */
  function toggleMode(prefix, mode) {
    const state = prefix === 'add' ? addState : editState;
    state[mode] = !state[mode];
    applyPillState(prefix);
  }

  function applyPillState(prefix) {
    const state  = prefix === 'add' ? addState : editState;
    const pillInd  = document.getElementById(`${prefix}IndPill`);
    const pillTeam = document.getElementById(`${prefix}TeamPill`);
    const subTeam  = document.getElementById(`${prefix}TeamSub`);

    pillInd .classList.toggle('active', state.ind);
    pillTeam.classList.toggle('active', state.team);
    subTeam .classList.toggle('open',   state.team);
  }

  function setPillState(prefix, ind, team) {
    const state = prefix === 'add' ? addState : editState;
    state.ind  = ind;
    state.team = team;
    applyPillState(prefix);
  }

  /* ════════════════════════════
     GAME LIST
  ════════════════════════════ */
  const gameIcon = name => {
    const n = (name || '').toLowerCase();
    if (n.includes('backgammon'))                              return '🎲';
    if (n.includes('chess'))                                   return '♟️';
    if (n.includes('screw')||n.includes('card')||n.includes('uno')) return '🃏';
    if (n.includes('pool')||n.includes('billiard'))            return '🎱';
    if (n.includes('dart'))                                    return '🎯';
    if (n.includes('ping')||n.includes('table'))               return '🏓';
    if (n.includes('domino'))                                  return '🁣';
    return '🎮';
  };

  async function loadGamesList() {
    const games = await loadGames();
    const el = document.getElementById('gamesList');
    if (!games.length) {
      el.innerHTML = `<div class="empty-state"><span class="empty-icon">🎮</span>
        <p>No games yet. Add one above!</p></div>`;
      return;
    }
    el.innerHTML = games.map(g => {
      const safeG = encodeURIComponent(JSON.stringify(g));
      const indChip  = g.AllowsIndividual === 'TRUE'
        ? `<span class="game-mode-chip chip-ind">Individual</span>` : '';
      const teamChip = g.AllowsTeam === 'TRUE'
        ? `<span class="game-mode-chip chip-team">Team · ${g.PlayersPerTeam||'?'}/team</span>` : '';
      return `
        <div class="game-item">
          <div class="game-icon-bubble">${gameIcon(g.GameName)}</div>
          <div class="game-details">
            <div class="game-name">${escapeHtml(g.GameName)}</div>
            <div class="game-meta">${g.TotalPlayers} players per match</div>
            <div class="game-mode-chips">${indChip}${teamChip}</div>
          </div>
          <div class="row-actions">
            <button class="row-btn edit" title="Edit"
              onclick="openEditModal(decodeURIComponent('${safeG}'))">✏️</button>
            <button class="row-btn delete" title="Delete"
              onclick="confirmDelete('${g.GameID}','${escapeHtml(g.GameName).replace(/'/g,"\\'")}')">🗑️</button>
          </div>
        </div>`;
    }).join('');
  }

  /* ════════════════════════════
     EDIT MODAL
  ════════════════════════════ */
  function openEditModal(gRaw) {
    selectedGame = typeof gRaw === 'string' ? JSON.parse(gRaw) : gRaw;
    document.getElementById('editGameName').value       = selectedGame.GameName;
    document.getElementById('editTotalPlayers').value   = selectedGame.TotalPlayers;
    document.getElementById('editPlayersPerTeam').value = selectedGame.PlayersPerTeam || 2;
    setPillState('edit',
      selectedGame.AllowsIndividual === 'TRUE',
      selectedGame.AllowsTeam === 'TRUE'
    );
    document.getElementById('editModal').classList.add('open');
  }

  function closeEditModal() {
    document.getElementById('editModal').classList.remove('open');
  }

  async function saveEdit() {
    const name    = document.getElementById('editGameName').value.trim();
    const total   = parseInt(document.getElementById('editTotalPlayers').value);
    const ind     = editState.ind;
    const team    = editState.team;
    const perTeam = team ? parseInt(document.getElementById('editPlayersPerTeam').value) : null;

    if (!name || total < 2) return showToast('Check name and player count', 'error');
    if (!ind && !team)      return showToast('Select at least one mode', 'error');

    const btn = document.getElementById('editSaveBtn');
    btn.textContent = 'Saving…'; btn.disabled = true;

    // Close modal immediately — don't wait for API
    closeEditModal();

    try {
      await editGame(selectedGame.GameID, name, total, ind, team, perTeam);
      showToast('Game updated ✓');
      await loadGamesList();
    } catch(e) {
      showToast('Error saving — please try again', 'error');
    } finally {
      btn.textContent = 'Save Changes'; btn.disabled = false;
    }
  }

  async function confirmDelete(id, name) {
    if (!confirm(`Delete "${name}"? Sessions using this game won't be affected.`)) return;
    try {
      await deleteGame(id);
      showToast('Game deleted');
      await loadGamesList();
    } catch(e) {
      showToast('Error deleting', 'error');
    }
  }

  /* ════════════════════════════
     PAGE INIT
  ════════════════════════════ */
  window.onload = async () => {
    await initPageAuth({
      onNeedLogin: () => { location.href = '../Home.html'; },
      onReady: async () => {
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        await loadGamesList();
      }
    });

    document.getElementById('addBtn').onclick = async () => {
      const name    = document.getElementById('gameName').value.trim();
      const total   = parseInt(document.getElementById('totalPlayers').value);
      const ind     = addState.ind;
      const team    = addState.team;
      const perTeam = team ? parseInt(document.getElementById('playersPerTeam').value) : null;

      if (!name || total < 2) return showToast('Enter a valid name and player count', 'error');
      if (!ind && !team)      return showToast('Select at least one mode', 'error');

      const btn = document.getElementById('addBtn');
      btn.textContent = 'Adding…'; btn.disabled = true;
      try {
        await addGame(name, total, ind, team, perTeam);
        document.getElementById('gameName').value = '';
        document.getElementById('totalPlayers').value = '4';
        setPillState('add', false, false);
        showToast(`${name} added ✓`);
        await loadGamesList();
      } catch(e) {
        showToast('Error adding game', 'error');
      } finally {
        btn.textContent = '+ Add Game'; btn.disabled = false;
      }
    };

    renderBottomNav('');
  };
</script>
</body>
</html>
